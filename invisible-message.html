<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invisible Unicode Message Hider</title>
  <style>
    :root {
      --bg-a: #07121f;
      --bg-b: #0f172a;
      --panel: rgba(7, 17, 32, 0.82);
      --border: #22324a;
      --text: #e5eefc;
      --muted: #9eb1cc;
      --accent: #38bdf8;
      --accent-2: #14b8a6;
      --danger: #fb7185;
      --ok: #34d399;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Consolas, "Cascadia Code", ui-monospace, monospace;
      background:
        radial-gradient(circle at 10% 15%, rgba(56, 189, 248, 0.18), transparent 36%),
        radial-gradient(circle at 85% 18%, rgba(20, 184, 166, 0.14), transparent 34%),
        linear-gradient(180deg, var(--bg-a), var(--bg-b));
      padding: 22px;
      display: grid;
      place-items: center;
    }

    .app {
      width: min(1100px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.1rem, 2vw, 1.45rem);
    }

    p.note {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.35;
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1fr;
    }

    @media (min-width: 900px) {
      .grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(2, 6, 23, 0.45);
      padding: 14px;
    }

    h2 {
      margin: 0 0 10px;
      font-size: 1rem;
    }

    label {
      display: block;
      margin: 0 0 6px;
      color: #cfe0f7;
      font-size: 0.88rem;
    }

    textarea {
      width: 100%;
      min-height: 104px;
      border-radius: 10px;
      border: 1px solid #2a3a55;
      background: #030712;
      color: var(--text);
      font: inherit;
      line-height: 1.38;
      padding: 10px 11px;
      resize: vertical;
    }

    textarea.small {
      min-height: 72px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 12px;
    }

    button {
      border-radius: 10px;
      border: 1px solid #155e75;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #061018;
      font: inherit;
      font-weight: 700;
      padding: 9px 12px;
      cursor: pointer;
    }

    button.secondary {
      background: #0b1220;
      color: #d4def0;
      border-color: #304159;
      font-weight: 600;
    }

    .status {
      min-height: 1.2em;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--danger); }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 8px;
    }

    code {
      background: rgba(148, 163, 184, 0.12);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: 6px;
      padding: 1px 5px;
      color: #dbeafe;
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Invisible Unicode Message Hider</h1>
    <p class="note">
      Hides a message in invisible Unicode characters and can decode it later. This tool uses
      <code>U+200B</code>, <code>U+200C</code>, <code>U+200D</code>, and <code>U+2060</code>.
    </p>

    <div class="grid">
      <section class="panel">
        <h2>Encode</h2>

        <label for="coverText">Visible cover text (optional)</label>
        <textarea id="coverText" class="small" placeholder="Visible text to carry the hidden message...">normal sentence here</textarea>

        <label for="secretText">Secret message</label>
        <textarea id="secretText" placeholder="Type the hidden message...">meet at midnight</textarea>

        <div class="buttons">
          <button id="encodeBtn" type="button">Encode Hidden Message</button>
          <button id="copyEncodedBtn" type="button" class="secondary">Copy Encoded Text</button>
          <button id="clearBtn" type="button" class="secondary">Clear</button>
        </div>

        <div id="encodeStatus" class="status"></div>

        <label for="encodedText">Encoded output (looks normal if a cover text was used)</label>
        <textarea id="encodedText" readonly></textarea>

        <label for="escapedPayload" style="margin-top: 10px;">Escaped hidden payload (for inspection)</label>
        <textarea id="escapedPayload" readonly></textarea>

        <div class="meta">
          <div>Payload chars: <span id="payloadChars">0</span></div>
          <div>Encoded length: <span id="encodedLen">0</span></div>
        </div>
      </section>

      <section class="panel">
        <h2>Decode</h2>

        <label for="decodeInput">Paste text to decode (can include visible cover text)</label>
        <textarea id="decodeInput" placeholder="Paste encoded text here..."></textarea>

        <div class="buttons">
          <button id="decodeBtn" type="button">Decode Hidden Message</button>
          <button id="copyDecodedBtn" type="button" class="secondary">Copy Decoded Message</button>
        </div>

        <div id="decodeStatus" class="status"></div>

        <label for="decodedSecret">Decoded secret message</label>
        <textarea id="decodedSecret" readonly class="small"></textarea>

        <label for="visibleOnly" style="margin-top: 10px;">Visible text with hidden chars stripped</label>
        <textarea id="visibleOnly" readonly class="small"></textarea>

        <div class="meta">
          <div>Invisible chars found: <span id="foundInvisible">0</span></div>
          <div>Hidden bytes decoded: <span id="decodedBytes">0</span></div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const ZW0 = "\u200B";   // zero-width space (0)
    const ZW1 = "\u200C";   // zero-width non-joiner (1)
    const SEP = "\u200D";   // zero-width joiner (byte separator)
    const MARK = "\u2060";  // word joiner (start/end marker)

    const INVISIBLE_SET = new Set([ZW0, ZW1, SEP, MARK]);
    const MAGIC = new Uint8Array([0x49, 0x4E, 0x56, 0x31]); // "INV1"

    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    const coverTextEl = document.getElementById("coverText");
    const secretTextEl = document.getElementById("secretText");
    const encodedTextEl = document.getElementById("encodedText");
    const escapedPayloadEl = document.getElementById("escapedPayload");
    const payloadCharsEl = document.getElementById("payloadChars");
    const encodedLenEl = document.getElementById("encodedLen");
    const encodeStatusEl = document.getElementById("encodeStatus");

    const decodeInputEl = document.getElementById("decodeInput");
    const decodedSecretEl = document.getElementById("decodedSecret");
    const visibleOnlyEl = document.getElementById("visibleOnly");
    const foundInvisibleEl = document.getElementById("foundInvisible");
    const decodedBytesEl = document.getElementById("decodedBytes");
    const decodeStatusEl = document.getElementById("decodeStatus");

    const encodeBtn = document.getElementById("encodeBtn");
    const decodeBtn = document.getElementById("decodeBtn");
    const copyEncodedBtn = document.getElementById("copyEncodedBtn");
    const copyDecodedBtn = document.getElementById("copyDecodedBtn");
    const clearBtn = document.getElementById("clearBtn");

    function setStatus(el, message, kind = "") {
      el.textContent = message;
      el.className = `status${kind ? ` ${kind}` : ""}`;
    }

    function concatBytes(...arrays) {
      const total = arrays.reduce((sum, arr) => sum + arr.length, 0);
      const out = new Uint8Array(total);
      let offset = 0;

      for (const arr of arrays) {
        out.set(arr, offset);
        offset += arr.length;
      }

      return out;
    }

    function u32ToBytes(value) {
      const bytes = new Uint8Array(4);
      bytes[0] = (value >>> 24) & 0xff;
      bytes[1] = (value >>> 16) & 0xff;
      bytes[2] = (value >>> 8) & 0xff;
      bytes[3] = value & 0xff;
      return bytes;
    }

    function bytesToU32(bytes) {
      return (
        (bytes[0] << 24) >>> 0 |
        (bytes[1] << 16) |
        (bytes[2] << 8) |
        bytes[3]
      ) >>> 0;
    }

    function byteToInvisible(byte) {
      const bits = byte.toString(2).padStart(8, "0");
      return bits.replaceAll("0", ZW0).replaceAll("1", ZW1);
    }

    function invisibleToByte(segment) {
      if (segment.length !== 8) {
        throw new Error("Corrupt payload segment length.");
      }

      let bits = "";
      for (const ch of segment) {
        if (ch === ZW0) bits += "0";
        else if (ch === ZW1) bits += "1";
        else throw new Error("Unexpected invisible codepoint in payload.");
      }

      return Number.parseInt(bits, 2);
    }

    function buildHiddenPayload(secretText) {
      const secretBytes = encoder.encode(secretText);
      const lengthBytes = u32ToBytes(secretBytes.length);
      const packed = concatBytes(MAGIC, lengthBytes, secretBytes);
      const body = Array.from(packed, byteToInvisible).join(SEP);
      return MARK + body + MARK;
    }

    function visibleAndInvisibleParts(text) {
      let invisible = "";
      let visible = "";

      for (const ch of text) {
        if (INVISIBLE_SET.has(ch)) invisible += ch;
        else visible += ch;
      }

      return { visible, invisible };
    }

    function escapeInvisibleChars(text) {
      return Array.from(text).map((ch) => {
        if (ch === ZW0) return "\\u200B";
        if (ch === ZW1) return "\\u200C";
        if (ch === SEP) return "\\u200D";
        if (ch === MARK) return "\\u2060";
        return ch;
      }).join("");
    }

    function decodeHiddenPayloadFromText(text) {
      const { visible, invisible } = visibleAndInvisibleParts(text);

      const start = invisible.indexOf(MARK);
      const end = invisible.lastIndexOf(MARK);
      if (start === -1 || end === -1 || end <= start) {
        throw new Error("No hidden payload markers found.");
      }

      const payloadBody = invisible.slice(start + 1, end);
      if (!payloadBody) {
        throw new Error("Hidden payload is empty.");
      }

      const segments = payloadBody.split(SEP);
      const bytes = new Uint8Array(segments.map(invisibleToByte));

      if (bytes.length < 8) {
        throw new Error("Payload too short.");
      }

      for (let i = 0; i < MAGIC.length; i += 1) {
        if (bytes[i] !== MAGIC[i]) {
          throw new Error("Payload signature mismatch.");
        }
      }

      const declaredLen = bytesToU32(bytes.slice(4, 8));
      const secretBytes = bytes.slice(8);

      if (secretBytes.length !== declaredLen) {
        throw new Error("Payload length mismatch.");
      }

      return {
        secret: decoder.decode(secretBytes),
        visible,
        invisible,
        secretByteLength: secretBytes.length
      };
    }

    function encodeNow() {
      const secret = secretTextEl.value;
      const cover = coverTextEl.value;

      if (!secret) {
        setStatus(encodeStatusEl, "Secret message is empty.", "error");
        return;
      }

      try {
        const payload = buildHiddenPayload(secret);
        const encoded = cover + payload;
        encodedTextEl.value = encoded;
        escapedPayloadEl.value = escapeInvisibleChars(payload);
        payloadCharsEl.textContent = String(payload.length);
        encodedLenEl.textContent = String(encoded.length);
        decodeInputEl.value = encoded;
        setStatus(encodeStatusEl, "Hidden message encoded into invisible Unicode.", "ok");
      } catch (error) {
        setStatus(encodeStatusEl, error.message || "Encode failed.", "error");
      }
    }

    function decodeNow() {
      const input = decodeInputEl.value;
      if (!input) {
        setStatus(decodeStatusEl, "Nothing to decode.", "error");
        return;
      }

      try {
        const result = decodeHiddenPayloadFromText(input);
        decodedSecretEl.value = result.secret;
        visibleOnlyEl.value = result.visible;
        foundInvisibleEl.textContent = String(result.invisible.length);
        decodedBytesEl.textContent = String(result.secretByteLength);
        setStatus(decodeStatusEl, "Hidden message decoded.", "ok");
      } catch (error) {
        decodedSecretEl.value = "";
        visibleOnlyEl.value = visibleAndInvisibleParts(input).visible;
        foundInvisibleEl.textContent = String(visibleAndInvisibleParts(input).invisible.length);
        decodedBytesEl.textContent = "0";
        setStatus(decodeStatusEl, error.message || "Decode failed.", "error");
      }
    }

    async function copyText(text, statusEl, okMessage) {
      if (!text) {
        setStatus(statusEl, "Nothing to copy.", "error");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus(statusEl, okMessage, "ok");
      } catch {
        setStatus(statusEl, "Clipboard copy failed.", "error");
      }
    }

    function clearAll() {
      coverTextEl.value = "";
      secretTextEl.value = "";
      encodedTextEl.value = "";
      escapedPayloadEl.value = "";
      decodeInputEl.value = "";
      decodedSecretEl.value = "";
      visibleOnlyEl.value = "";
      payloadCharsEl.textContent = "0";
      encodedLenEl.textContent = "0";
      foundInvisibleEl.textContent = "0";
      decodedBytesEl.textContent = "0";
      setStatus(encodeStatusEl, "");
      setStatus(decodeStatusEl, "");
    }

    encodeBtn.addEventListener("click", encodeNow);
    decodeBtn.addEventListener("click", decodeNow);
    copyEncodedBtn.addEventListener("click", () => copyText(encodedTextEl.value, encodeStatusEl, "Encoded text copied."));
    copyDecodedBtn.addEventListener("click", () => copyText(decodedSecretEl.value, decodeStatusEl, "Decoded message copied."));
    clearBtn.addEventListener("click", clearAll);

    encodeNow();
  </script>
</body>
</html>
