<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evolutionary Site Lab</title>

  <style>
    :root {
      --bg: hsl(230 35% 8%);
      --surface: hsl(230 30% 13%);
      --surface-2: hsl(230 28% 18%);
      --text: hsl(220 40% 96%);
      --muted: hsl(220 18% 72%);
      --primary: hsl(174 92% 56%);
      --secondary: hsl(281 89% 66%);
      --radius: 24px;
      --gap: 18px;
      --shadow: 0 20px 60px hsl(0 0% 0% / 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, color-mix(in srgb, var(--primary), transparent 75%), transparent 30%),
        radial-gradient(circle at 90% 20%, color-mix(in srgb, var(--secondary), transparent 78%), transparent 32%),
        linear-gradient(135deg, var(--bg), hsl(240 35% 5%));
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      padding: 0.75rem 1rem;
      background: var(--surface-2);
      color: var(--text);
      box-shadow: inset 0 0 0 1px hsl(0 0% 100% / 0.08);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      background: color-mix(in srgb, var(--surface-2), var(--primary) 12%);
      box-shadow:
        inset 0 0 0 1px hsl(0 0% 100% / 0.12),
        0 10px 30px hsl(0 0% 0% / 0.25);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: hsl(230 35% 6%);
      font-weight: 800;
    }

    .danger-btn {
      background: hsl(0 70% 45%);
    }

    .ghost-btn {
      background: transparent;
      box-shadow: inset 0 0 0 1px hsl(0 0% 100% / 0.12);
    }

    .app {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 70px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      position: sticky;
      top: 12px;
      z-index: 20;
      padding: 12px;
      border-radius: 999px;
      background: hsl(0 0% 0% / 0.22);
      backdrop-filter: blur(18px);
      box-shadow: inset 0 0 0 1px hsl(0 0% 100% / 0.09);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, white, transparent 24%),
        linear-gradient(135deg, var(--primary), var(--secondary));
      box-shadow: 0 0 25px color-mix(in srgb, var(--primary), transparent 50%);
    }

    .nav-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: var(--gap);
      align-items: stretch;
      margin-bottom: var(--gap);
    }

    .hero-card,
    .panel,
    .feature-card,
    .history-card,
    .stat-card {
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, hsl(0 0% 100% / 0.08), transparent),
        var(--surface);
      box-shadow:
        var(--shadow),
        inset 0 0 0 1px hsl(0 0% 100% / 0.08);
    }

    .hero-card {
      padding: clamp(28px, 6vw, 72px);
      position: relative;
      overflow: hidden;
      min-height: 460px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: -35%;
      background:
        conic-gradient(from 90deg, transparent, var(--primary), transparent, var(--secondary), transparent);
      opacity: 0.17;
      animation: spin 18s linear infinite;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 0.45rem 0.75rem;
      border-radius: 999px;
      background: hsl(0 0% 100% / 0.08);
      color: var(--muted);
      box-shadow: inset 0 0 0 1px hsl(0 0% 100% / 0.08);
      margin-bottom: 18px;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 18px var(--primary);
      animation: pulse 1.4s ease infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 8vw, 6.8rem);
      line-height: 0.9;
      letter-spacing: -0.09em;
    }

    .gradient-text {
      background: linear-gradient(135deg, var(--text), var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(1.05rem, 2vw, 1.35rem);
      line-height: 1.65;
      margin: 22px 0 0;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .panel {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel h2,
    .section-title {
      margin: 0;
      letter-spacing: -0.04em;
    }

    .dna-box {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .dna-row {
      display: grid;
      grid-template-columns: 110px 1fr auto;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: hsl(0 0% 100% / 0.09);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .generation-number {
      font-size: clamp(3rem, 9vw, 6rem);
      line-height: 1;
      font-weight: 950;
      letter-spacing: -0.08em;
    }

    .score {
      color: var(--primary);
      font-weight: 900;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
      margin-bottom: var(--gap);
    }

    .stat-card,
    .feature-card,
    .history-card {
      padding: 22px;
    }

    .stat-card strong {
      display: block;
      font-size: 2rem;
      letter-spacing: -0.06em;
    }

    .stat-card span,
    .feature-card p,
    .history-card p {
      color: var(--muted);
      line-height: 1.5;
    }

    .feature-card {
      position: relative;
      overflow: hidden;
    }

    .feature-card::after {
      content: "";
      position: absolute;
      width: 120px;
      height: 120px;
      right: -50px;
      top: -50px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--primary), transparent 75%);
      filter: blur(4px);
    }

    .feature-icon {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: hsl(230 35% 6%);
      font-weight: 950;
      margin-bottom: 16px;
    }

    .history-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
      max-height: 270px;
      overflow: auto;
      padding-right: 6px;
    }

    .history-item {
      padding: 12px;
      border-radius: 16px;
      background: hsl(0 0% 100% / 0.06);
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .mutation-log {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.6;
      padding-left: 20px;
    }

    .hidden-file {
      display: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse {
      50% {
        transform: scale(1.35);
        opacity: 0.55;
      }
    }

    @media (max-width: 900px) {
      .hero,
      .grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
        border-radius: 24px;
        flex-direction: column;
      }

      .nav-buttons {
        justify-content: flex-start;
      }

      .hero-card {
        min-height: auto;
      }
    }
  </style>
</head>

<body>
  <main id="app" class="app"></main>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "evolutionary-site-v2";
      const HISTORY_KEY = "evolutionary-site-v2-history";

      const copyBank = {
        titles: [
          "Evolutionary Site",
          "Living Website",
          "Mutant Interface",
          "Adaptive Web Lab",
          "Self-Improving Page",
          "Digital Organism",
          "Generative Site Engine"
        ],
        subtitles: [
          "A website that mutates its visual DNA, tests new versions, scores them, and keeps the strongest design.",
          "Each click breeds a fresh generation of layouts, colours, motion, spacing, and content.",
          "This page no longer stores unsafe raw HTML. It evolves structured design DNA instead.",
          "Generate, score, save, export, reset, and watch your website slowly become weirder and better.",
          "A tiny browser-based design experiment using mutation, selection, memory, and visual fitness."
        ],
        ctas: [
          "Evolve now",
          "Mutate design",
          "Breed next version",
          "Improve this site",
          "Generate stronger DNA"
        ],
        features: [
          ["DNA Storage", "The site stores a structured genome instead of raw executable HTML."],
          ["Fitness Score", "Each generation is scored for contrast, balance, variety, and readability."],
          ["Mutation Engine", "Colours, spacing, text, layout density, motion, and cards can all change."],
          ["History Trail", "Every generation is remembered so you can see how the design developed."],
          ["Auto Evolution", "Let the page keep evolving on its own until you stop it."],
          ["Export System", "Download the current evolved site as a separate static HTML file."]
        ]
      };

      const palettes = [
        {
          name: "Aurora",
          bg: "hsl(230 35% 8%)",
          surface: "hsl(230 30% 13%)",
          surface2: "hsl(230 28% 18%)",
          text: "hsl(220 40% 96%)",
          muted: "hsl(220 18% 72%)",
          primary: "hsl(174 92% 56%)",
          secondary: "hsl(281 89% 66%)"
        },
        {
          name: "Lava",
          bg: "hsl(18 56% 7%)",
          surface: "hsl(18 44% 12%)",
          surface2: "hsl(18 36% 18%)",
          text: "hsl(35 80% 96%)",
          muted: "hsl(32 28% 74%)",
          primary: "hsl(18 96% 58%)",
          secondary: "hsl(46 98% 62%)"
        },
        {
          name: "Cyber Mint",
          bg: "hsl(166 58% 6%)",
          surface: "hsl(166 42% 11%)",
          surface2: "hsl(166 35% 17%)",
          text: "hsl(165 55% 96%)",
          muted: "hsl(164 22% 73%)",
          primary: "hsl(149 94% 58%)",
          secondary: "hsl(195 96% 62%)"
        },
        {
          name: "Royal Glitch",
          bg: "hsl(260 44% 8%)",
          surface: "hsl(260 34% 13%)",
          surface2: "hsl(260 28% 19%)",
          text: "hsl(260 50% 97%)",
          muted: "hsl(260 20% 76%)",
          primary: "hsl(287 92% 66%)",
          secondary: "hsl(217 96% 66%)"
        }
      ];

      const app = document.getElementById("app");
      let autoTimer = null;

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function randomInt(min, max) {
        return Math.floor(random(min, max + 1));
      }

      function pick(array) {
        return array[Math.floor(Math.random() * array.length)];
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function parseHsl(value) {
        const match = String(value).match(/hsl\(([\d.]+)\s+([\d.]+)%\s+([\d.]+)%\)/);
        if (!match) return [220, 50, 50];
        return [
          Number(match[1]),
          Number(match[2]),
          Number(match[3])
        ];
      }

      function hsl(h, s, l) {
        return `hsl(${Math.round(((h % 360) + 360) % 360)} ${Math.round(clamp(s, 0, 100))}% ${Math.round(clamp(l, 0, 100))}%)`;
      }

      function tweakHsl(value, hueShift = 0, satShift = 0, lightShift = 0) {
        const [h, s, l] = parseHsl(value);
        return hsl(h + hueShift, s + satShift, l + lightShift);
      }

      function hslToRgb(h, s, l) {
        s /= 100;
        l /= 100;

        const c = (1 - Math.abs(2 * l - 1)) * s;
        const x = c * (1 - Math.abs((h / 60) % 2 - 1));
        const m = l - c / 2;

        let r = 0;
        let g = 0;
        let b = 0;

        if (h < 60) [r, g, b] = [c, x, 0];
        else if (h < 120) [r, g, b] = [x, c, 0];
        else if (h < 180) [r, g, b] = [0, c, x];
        else if (h < 240) [r, g, b] = [0, x, c];
        else if (h < 300) [r, g, b] = [x, 0, c];
        else [r, g, b] = [c, 0, x];

        return [
          Math.round((r + m) * 255),
          Math.round((g + m) * 255),
          Math.round((b + m) * 255)
        ];
      }

      function luminanceFromHsl(value) {
        const [h, s, l] = parseHsl(value);
        const rgb = hslToRgb(h, s, l).map(channel => {
          const normalized = channel / 255;
          return normalized <= 0.03928
            ? normalized / 12.92
            : Math.pow((normalized + 0.055) / 1.055, 2.4);
        });

        return 0.2126 * rgb[0] + 0.7152 * rgb[1] + 0.0722 * rgb[2];
      }

      function contrastRatio(a, b) {
        const l1 = luminanceFromHsl(a);
        const l2 = luminanceFromHsl(b);
        const bright = Math.max(l1, l2);
        const dark = Math.min(l1, l2);
        return (bright + 0.05) / (dark + 0.05);
      }

      function createDefaultGenome() {
        const palette = palettes[0];

        return {
          paletteName: palette.name,
          bg: palette.bg,
          surface: palette.surface,
          surface2: palette.surface2,
          text: palette.text,
          muted: palette.muted,
          primary: palette.primary,
          secondary: palette.secondary,
          radius: 24,
          gap: 18,
          density: 3,
          motion: 5,
          complexity: 5,
          title: "Evolutionary Site",
          subtitle: "A website that mutates its visual DNA, tests new versions, scores them, and keeps the strongest design.",
          cta: "Evolve now",
          featureSeed: 0
        };
      }

      function createDefaultState() {
        const genome = createDefaultGenome();

        return {
          generation: 1,
          genome,
          fitness: scoreGenome(genome),
          lastMutations: ["Initial organism created."]
        };
      }

      function loadState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
          if (!saved || !saved.genome) return createDefaultState();
          return sanitizeState(saved);
        } catch {
          return createDefaultState();
        }
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function loadHistory() {
        try {
          return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
        } catch {
          return [];
        }
      }

      function saveHistory(history) {
        localStorage.setItem(HISTORY_KEY, JSON.stringify(history.slice(-20)));
      }

      function sanitizeState(input) {
        const fallback = createDefaultState();
        const source = input || {};
        const genome = { ...fallback.genome, ...(source.genome || {}) };

        const colourKeys = ["bg", "surface", "surface2", "text", "muted", "primary", "secondary"];
        for (const key of colourKeys) {
          if (!/^hsl\([\d.]+\s+[\d.]+%\s+[\d.]+%\)$/.test(String(genome[key]))) {
            genome[key] = fallback.genome[key];
          }
        }

        genome.radius = clamp(Number(genome.radius) || fallback.genome.radius, 8, 44);
        genome.gap = clamp(Number(genome.gap) || fallback.genome.gap, 8, 34);
        genome.density = clamp(Number(genome.density) || fallback.genome.density, 1, 6);
        genome.motion = clamp(Number(genome.motion) || fallback.genome.motion, 0, 10);
        genome.complexity = clamp(Number(genome.complexity) || fallback.genome.complexity, 1, 10);
        genome.featureSeed = clamp(Number(genome.featureSeed) || 0, 0, 9999);

        genome.title = String(genome.title || fallback.genome.title).slice(0, 80);
        genome.subtitle = String(genome.subtitle || fallback.genome.subtitle).slice(0, 220);
        genome.cta = String(genome.cta || fallback.genome.cta).slice(0, 40);
        genome.paletteName = String(genome.paletteName || "Custom").slice(0, 40);

        return {
          generation: Math.max(1, Number(source.generation) || 1),
          genome,
          fitness: scoreGenome(genome),
          lastMutations: Array.isArray(source.lastMutations)
            ? source.lastMutations.map(item => String(item).slice(0, 120)).slice(0, 8)
            : fallback.lastMutations
        };
      }

      function scoreGenome(genome) {
        const textContrast = contrastRatio(genome.bg, genome.text);
        const cardContrast = contrastRatio(genome.surface, genome.text);
        const primaryContrast = contrastRatio(genome.bg, genome.primary);

        const contrastScore =
          clamp(textContrast / 7, 0, 1) * 35 +
          clamp(cardContrast / 6, 0, 1) * 25 +
          clamp(primaryContrast / 4.5, 0, 1) * 15;

        const spacingScore = 15 - Math.abs(20 - genome.gap) * 0.55;
        const radiusScore = 10 - Math.abs(24 - genome.radius) * 0.25;
        const densityScore = 10 - Math.abs(4 - genome.density) * 1.6;
        const complexityScore = 10 - Math.abs(6 - genome.complexity) * 0.9;

        return Math.round(clamp(
          contrastScore + spacingScore + radiusScore + densityScore + complexityScore,
          0,
          100
        ));
      }

      function mutateGenome(original, intensity = 1) {
        const genome = structuredClone(original);
        const mutations = [];
        const mutationCount = randomInt(2, 5 + Math.round(intensity));

        for (let i = 0; i < mutationCount; i++) {
          const type = pick([
            "palette",
            "primaryHue",
            "secondaryHue",
            "spacing",
            "radius",
            "density",
            "motion",
            "complexity",
            "copy",
            "surface"
          ]);

          if (type === "palette") {
            const palette = pick(palettes);
            Object.assign(genome, palette);
            genome.paletteName = palette.name;
            mutations.push(`Palette changed to ${palette.name}.`);
          }

          if (type === "primaryHue") {
            genome.primary = tweakHsl(genome.primary, randomInt(-45, 45), randomInt(-8, 8), randomInt(-7, 7));
            mutations.push("Primary colour hue shifted.");
          }

          if (type === "secondaryHue") {
            genome.secondary = tweakHsl(genome.secondary, randomInt(-55, 55), randomInt(-8, 8), randomInt(-7, 7));
            mutations.push("Secondary colour evolved.");
          }

          if (type === "surface") {
            genome.surface = tweakHsl(genome.surface, randomInt(-10, 10), randomInt(-4, 4), randomInt(-3, 4));
            genome.surface2 = tweakHsl(genome.surface2, randomInt(-10, 10), randomInt(-4, 4), randomInt(-3, 4));
            mutations.push("Panel surfaces adapted.");
          }

          if (type === "spacing") {
            genome.gap = clamp(genome.gap + randomInt(-5, 5), 8, 34);
            mutations.push("Layout spacing mutated.");
          }

          if (type === "radius") {
            genome.radius = clamp(genome.radius + randomInt(-7, 7), 8, 44);
            mutations.push("Corner roundness changed.");
          }

          if (type === "density") {
            genome.density = clamp(genome.density + randomInt(-1, 1), 1, 6);
            mutations.push("Information density adjusted.");
          }

          if (type === "motion") {
            genome.motion = clamp(genome.motion + randomInt(-2, 2), 0, 10);
            mutations.push("Motion energy changed.");
          }

          if (type === "complexity") {
            genome.complexity = clamp(genome.complexity + randomInt(-2, 2), 1, 10);
            mutations.push("Visual complexity mutated.");
          }

          if (type === "copy") {
            genome.title = pick(copyBank.titles);
            genome.subtitle = pick(copyBank.subtitles);
            genome.cta = pick(copyBank.ctas);
            genome.featureSeed = randomInt(0, 9999);
            mutations.push("Text content regenerated.");
          }
        }

        return {
          genome,
          mutations: [...new Set(mutations)]
        };
      }

      function evolve(populationSize = 14, intensity = 1) {
        const state = loadState();
        const candidates = [
          {
            genome: state.genome,
            fitness: scoreGenome(state.genome),
            mutations: ["Current version survived."]
          }
        ];

        for (let i = 0; i < populationSize; i++) {
          const candidate = mutateGenome(state.genome, intensity);
          candidates.push({
            ...candidate,
            fitness: scoreGenome(candidate.genome)
          });
        }

        candidates.sort((a, b) => b.fitness - a.fitness);
        const winner = candidates[0];

        const nextState = {
          generation: state.generation + 1,
          genome: winner.genome,
          fitness: winner.fitness,
          lastMutations: winner.mutations
        };

        const history = loadHistory();
        history.push({
          generation: nextState.generation,
          fitness: nextState.fitness,
          palette: nextState.genome.paletteName,
          time: new Date().toLocaleTimeString()
        });

        saveHistory(history);
        saveState(nextState);
        render();
      }

      function applyTheme(genome) {
        document.documentElement.style.setProperty("--bg", genome.bg);
        document.documentElement.style.setProperty("--surface", genome.surface);
        document.documentElement.style.setProperty("--surface-2", genome.surface2);
        document.documentElement.style.setProperty("--text", genome.text);
        document.documentElement.style.setProperty("--muted", genome.muted);
        document.documentElement.style.setProperty("--primary", genome.primary);
        document.documentElement.style.setProperty("--secondary", genome.secondary);
        document.documentElement.style.setProperty("--radius", `${genome.radius}px`);
        document.documentElement.style.setProperty("--gap", `${genome.gap}px`);
      }

      function getVisibleFeatures(genome) {
        const start = genome.featureSeed % copyBank.features.length;
        const rotated = [
          ...copyBank.features.slice(start),
          ...copyBank.features.slice(0, start)
        ];

        return rotated.slice(0, clamp(genome.density + 1, 3, 6));
      }

      function render() {
        const state = loadState();
        const genome = state.genome;
        const history = loadHistory();

        applyTheme(genome);

        const featureCards = getVisibleFeatures(genome).map((feature, index) => `
          <article class="feature-card">
            <div class="feature-icon">${index + 1}</div>
            <h3>${escapeHtml(feature[0])}</h3>
            <p>${escapeHtml(feature[1])}</p>
          </article>
        `).join("");

        const historyItems = history.slice(-8).reverse().map(item => `
          <div class="history-item">
            <span>Gen ${escapeHtml(item.generation)} · ${escapeHtml(item.palette)}</span>
            <strong>${escapeHtml(item.fitness)}%</strong>
          </div>
        `).join("");

        const mutationItems = state.lastMutations.map(item => `
          <li>${escapeHtml(item)}</li>
        `).join("");

        app.innerHTML = `
          <header class="topbar">
            <div class="brand">
              <div class="brand-mark"></div>
              <span>Evolution Lab</span>
            </div>

            <div class="nav-buttons">
              <button class="primary-btn" data-action="evolve-one">Evolve x1</button>
              <button data-action="evolve-ten">Evolve x10</button>
              <button data-action="auto">${autoTimer ? "Stop auto" : "Auto evolve"}</button>
              <button class="ghost-btn" data-action="export-json">Export DNA</button>
              <button class="ghost-btn" data-action="import-json">Import DNA</button>
              <button class="ghost-btn" data-action="download-html">Download HTML</button>
              <button class="danger-btn" data-action="reset">Reset</button>
              <input class="hidden-file" id="importFile" type="file" accept="application/json" />
            </div>
          </header>

          <section class="hero">
            <div class="hero-card">
              <div class="hero-content">
                <div class="badge">
                  <span class="pulse-dot"></span>
                  Generation ${escapeHtml(state.generation)} · ${escapeHtml(genome.paletteName)} genome
                </div>

                <h1>
                  <span class="gradient-text">${escapeHtml(genome.title)}</span>
                </h1>

                <p class="subtitle">${escapeHtml(genome.subtitle)}</p>

                <div class="hero-actions">
                  <button class="primary-btn" data-action="evolve-one">${escapeHtml(genome.cta)}</button>
                  <button data-action="evolve-fifty">Breed 50 variants</button>
                </div>
              </div>
            </div>

            <aside class="panel">
              <h2>Current DNA</h2>

              <div class="generation-number">${escapeHtml(state.fitness)}<span class="score">%</span></div>
              <p class="subtitle">Fitness score based on readability, contrast, spacing, card balance, and useful complexity.</p>

              <div class="dna-box">
                ${dnaRow("Contrast", Math.round(contrastRatio(genome.bg, genome.text) * 10))}
                ${dnaRow("Density", genome.density * 16)}
                ${dnaRow("Motion", genome.motion * 10)}
                ${dnaRow("Complexity", genome.complexity * 10)}
                ${dnaRow("Spacing", genome.gap * 3)}
              </div>

              <h3>Last mutation</h3>
              <ul class="mutation-log">${mutationItems}</ul>
            </aside>
          </section>

          <section class="grid">
            <div class="stat-card">
              <strong>${escapeHtml(state.generation)}</strong>
              <span>Generations created</span>
            </div>

            <div class="stat-card">
              <strong>${escapeHtml(genome.paletteName)}</strong>
              <span>Active colour species</span>
            </div>

            <div class="stat-card">
              <strong>${escapeHtml(history.length)}</strong>
              <span>Saved history points</span>
            </div>
          </section>

          <section class="grid">
            ${featureCards}
          </section>

          <section class="history-card">
            <h2 class="section-title">Evolution History</h2>
            <p>The strongest recent generations are kept here.</p>
            <div class="history-list">
              ${historyItems || "<p>No history yet. Evolve the page to start tracking generations.</p>"}
            </div>
          </section>
        `;

        const importFile = document.getElementById("importFile");
        importFile.addEventListener("change", handleImportFile);
      }

      function dnaRow(label, value) {
        const safeValue = clamp(value, 0, 100);

        return `
          <div class="dna-row">
            <span>${escapeHtml(label)}</span>
            <div class="bar">
              <div class="bar-fill" style="width:${safeValue}%"></div>
            </div>
            <strong>${safeValue}</strong>
          </div>
        `;
      }

      function exportJson() {
        const state = loadState();
        const blob = new Blob([JSON.stringify(state, null, 2)], {
          type: "application/json"
        });

        downloadBlob(blob, "evolutionary-site-dna.json");
      }

      function handleImportFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();

        reader.onload = () => {
          try {
            const imported = JSON.parse(reader.result);
            const clean = sanitizeState(imported);
            saveState(clean);
            render();
          } catch {
            alert("That DNA file could not be imported.");
          }
        };

        reader.readAsText(file);
      }

      function resetSite() {
        if (!confirm("Reset the evolutionary site back to generation 1?")) return;

        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(HISTORY_KEY);
        stopAuto();
        render();
      }

      function downloadStaticHtml() {
        const state = loadState();
        const genome = state.genome;
        const features = getVisibleFeatures(genome);

        const featureHtml = features.map((feature, index) => `
          <article class="card">
            <div class="icon">${index + 1}</div>
            <h3>${escapeHtml(feature[0])}</h3>
            <p>${escapeHtml(feature[1])}</p>
          </article>
        `).join("");

        const html = `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${escapeHtml(genome.title)}</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, sans-serif;
      color: ${genome.text};
      background:
        radial-gradient(circle at 15% 15%, ${genome.primary}, transparent 28%),
        radial-gradient(circle at 85% 20%, ${genome.secondary}, transparent 30%),
        ${genome.bg};
      padding: 32px;
    }

    main {
      width: min(1050px, 100%);
      margin: auto;
    }

    .hero,
    .card {
      border-radius: ${genome.radius}px;
      background: ${genome.surface};
      box-shadow: 0 24px 70px hsl(0 0% 0% / 0.35);
      padding: clamp(24px, 6vw, 72px);
      margin-bottom: ${genome.gap}px;
    }

    h1 {
      font-size: clamp(3rem, 9vw, 7rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
      margin: 0;
      background: linear-gradient(135deg, ${genome.text}, ${genome.primary}, ${genome.secondary});
      -webkit-background-clip: text;
      color: transparent;
    }

    p {
      color: ${genome.muted};
      line-height: 1.7;
      font-size: 1.15rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: ${genome.gap}px;
    }

    .icon {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: ${genome.bg};
      font-weight: 900;
      background: linear-gradient(135deg, ${genome.primary}, ${genome.secondary});
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p>Generation ${state.generation} · Fitness ${state.fitness}% · ${escapeHtml(genome.paletteName)}</p>
      <h1>${escapeHtml(genome.title)}</h1>
      <p>${escapeHtml(genome.subtitle)}</p>
    </section>

    <section class="grid">
      ${featureHtml}
    </section>
  </main>
</body>
</html>`;

        const blob = new Blob([html], {
          type: "text/html"
        });

        downloadBlob(blob, "evolved-site.html");
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");

        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();

        URL.revokeObjectURL(url);
      }

      function startAuto() {
        if (autoTimer) return;

        autoTimer = setInterval(() => {
          evolve(20, 1.5);
        }, 1200);

        render();
      }

      function stopAuto() {
        clearInterval(autoTimer);
        autoTimer = null;
      }

      function toggleAuto() {
        if (autoTimer) {
          stopAuto();
        } else {
          startAuto();
        }

        render();
      }

      document.addEventListener("click", event => {
        const button = event.target.closest("[data-action]");
        if (!button) return;

        const action = button.dataset.action;

        if (action === "evolve-one") evolve(14, 1);
        if (action === "evolve-ten") {
          for (let i = 0; i < 10; i++) evolve(16, 1.25);
        }
        if (action === "evolve-fifty") {
          for (let i = 0; i < 50; i++) evolve(20, 1.5);
        }
        if (action === "auto") toggleAuto();
        if (action === "export-json") exportJson();
        if (action === "import-json") document.getElementById("importFile").click();
        if (action === "download-html") downloadStaticHtml();
        if (action === "reset") resetSite();
      });

      render();
    })();
  </script>
</body>
</html>
