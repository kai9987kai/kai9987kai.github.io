<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Advanced Spreadsheet Pro — single-file</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#f7f8fb; --panel:#fff; --panel-2:#f8fafc; --text:#111827; --muted:#667085;
  --accent:#0b84ff; --accent-soft:rgba(11,132,255,.14); --border:#e4e7ec; --danger:#e11d48;
  --shadow:0 10px 30px rgba(16,24,40,.08); --radius:12px; --grid:#e6e8ec;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;font-family:Roboto,system-ui,-apple-system,"Segoe UI",Arial;background:var(--bg);color:var(--text)}
button,select,input{font:inherit}
button{border:1px solid var(--border);background:var(--panel);border-radius:8px;padding:7px 10px;cursor:pointer;color:var(--text)}
button:hover{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
button.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
button.danger{color:var(--danger)}
input,select{border:1px solid var(--border);border-radius:8px;padding:7px 8px;background:var(--panel);color:var(--text)}
input[type="color"]{padding:2px;width:38px;height:32px}
#app{display:flex;flex-direction:column;height:100vh;width:100%;overflow:hidden}
#titlebar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--panel);border-bottom:1px solid var(--border)}
#workbook-name{font-weight:700;border:0;background:transparent;font-size:16px;max-width:260px;padding:6px}
#titlebar .spacer{flex:1}.pill{font-size:12px;padding:4px 8px;border-radius:999px;background:var(--panel-2);border:1px solid var(--border);color:var(--muted)}
#ribbon{display:flex;gap:12px;align-items:flex-start;padding:10px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
.tabgroup{display:flex;gap:8px;align-items:center}.tab{padding:8px 12px;border-radius:8px;background:#f1f5f9;cursor:pointer;border:1px solid transparent;font-weight:500;user-select:none}.tab.active{background:var(--panel);border-color:var(--border);box-shadow:inset 0 -2px 0 var(--accent)}
.panel{display:flex;gap:12px;align-items:stretch;flex-wrap:wrap}.group{display:flex;flex-direction:column;gap:6px;background:transparent;border-right:1px solid var(--border);padding-right:12px}.group:last-child{border-right:0}.group label{font-size:12px;color:var(--muted);font-weight:500}.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
#formula-bar{display:grid;grid-template-columns:auto 1fr auto;gap:8px;padding:10px;background:var(--panel);border-bottom:1px solid var(--border);align-items:center}
#name-box{width:92px;font-family:monospace;text-align:center}#formula-input{width:100%;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
#workspace{display:flex;flex:1;overflow:hidden}#left-panel{width:62px;background:var(--panel-2);border-right:1px solid var(--border);display:flex;flex-direction:column;gap:8px;padding:8px;align-items:center}.corner-btn{width:46px;font-size:12px;padding:8px 4px}
#grid-container{flex:1;overflow:auto;padding:14px;background:linear-gradient(#fff,#fbfdff);position:relative}.gridlines-off table.sheet td,.gridlines-off table.sheet th{border-color:transparent!important}
table.sheet{border-collapse:separate;border-spacing:0;min-width:720px;background:var(--panel);box-shadow:var(--shadow)}
table.sheet th,table.sheet td{border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);padding:0 6px;min-width:90px;width:90px;height:28px;max-width:420px;vertical-align:middle;position:relative;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
table.sheet th{background:#f3f6fa;position:sticky;top:0;z-index:5;text-align:center;font-weight:500;color:#344054}.row-header{position:sticky!important;left:0;background:#f5f7fb!important;z-index:6!important;text-align:center;min-width:46px!important;width:46px!important;color:#475467}
td{outline:none}td:focus{box-shadow:inset 0 0 0 2px var(--accent)}td.selected{box-shadow:inset 0 0 0 2px var(--accent);background:rgba(11,132,255,.05)}td.range-anchor{box-shadow:inset 0 0 0 3px var(--accent)}td.merged{display:none}td.protected::after{content:"🔒";position:absolute;right:4px;top:2px;font-size:11px;opacity:.65}td.has-note::before{content:"";position:absolute;right:0;top:0;border-top:8px solid #f59e0b;border-left:8px solid transparent}td.invalid{box-shadow:inset 0 0 0 2px var(--danger)!important}.wrap-on td{white-space:normal;height:auto;min-height:28px}.find-highlight{background:rgba(255,235,59,.42)!important}.sparkline{display:block;width:100%;height:22px}
#statusbar{height:30px;display:flex;gap:16px;align-items:center;padding:5px 12px;background:var(--panel);border-top:1px solid var(--border);color:var(--muted);font-size:12px;white-space:nowrap;overflow:auto}.status-strong{color:var(--text);font-weight:500}
.context-menu,.palette,.modal-backdrop{position:fixed;z-index:9999}.context-menu{background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);display:none;border-radius:10px;padding:6px;min-width:180px}.context-menu button{display:block;width:100%;text-align:left;border:0;background:transparent;border-radius:6px}.context-menu hr{border:0;border-top:1px solid var(--border);margin:6px 0}
.modal-backdrop{inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,23,42,.32)}.modal-card{width:min(900px,92vw);max-height:86vh;overflow:auto;background:var(--panel);border-radius:16px;padding:16px;box-shadow:var(--shadow)}.modal-head{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:12px}.modal-head h2{margin:0;font-size:18px}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;border:1px solid var(--border);border-bottom-width:2px;border-radius:6px;padding:1px 5px;background:var(--panel-2);font-size:12px}.command-item{display:flex;justify-content:space-between;gap:10px;padding:10px;border-radius:10px;cursor:pointer}.command-item:hover,.command-item.active{background:var(--panel-2)}
.toast{position:fixed;right:16px;bottom:44px;background:#111827;color:#fff;padding:10px 12px;border-radius:10px;box-shadow:var(--shadow);z-index:10000;font-size:13px}.hidden{display:none!important}
.dark-mode{--bg:#0f172a;--panel:#111827;--panel-2:#0b1220;--text:#e5e7eb;--muted:#98a2b3;--border:#243041;--grid:#253044;--accent-soft:rgba(59,130,246,.18)}.dark-mode #grid-container{background:#0f172a}.dark-mode table.sheet th{background:#172033;color:#d0d5dd}.dark-mode .row-header{background:#172033!important}.dark-mode .tab{background:#172033}.dark-mode table.sheet{background:#111827}.dark-mode .toast{background:#f8fafc;color:#111827}
@media (max-width:900px){#left-panel{display:none}#formula-bar{grid-template-columns:1fr}.group{border-right:0;border-bottom:1px solid var(--border);padding-bottom:8px}}
@media print{#titlebar,#ribbon,#formula-bar,#left-panel,#statusbar{display:none!important}#workspace,#grid-container{display:block;overflow:visible;padding:0}table.sheet{box-shadow:none}}
</style>
</head>
<body>
<div id="app" role="application" aria-label="Advanced Spreadsheet Pro">
  <div id="titlebar">
    <input id="workbook-name" value="Advanced Workbook" aria-label="Workbook name" />
    <span class="pill" id="save-state">Saved locally</span>
    <span class="pill" id="selection-pill">No selection</span>
    <div class="spacer"></div>
    <button id="command-open" title="Command palette (Ctrl/⌘+K)">Commands</button>
    <button id="help-open">Help</button>
  </div>

  <div id="ribbon" role="toolbar" aria-label="Spreadsheet toolbar">
    <div class="tabgroup">
      <div class="tab active" data-tab="home">Home</div><div class="tab" data-tab="insert">Insert</div><div class="tab" data-tab="data">Data</div><div class="tab" data-tab="view">View</div><div class="tab" data-tab="dev">Dev</div>
    </div>

    <div class="panel" id="panel-home">
      <div class="group"><label>Clipboard</label><div class="row"><button id="cut">Cut</button><button id="copy">Copy</button><button id="paste">Paste</button><button id="fill-down">Fill Down</button></div></div>
      <div class="group"><label>Font</label><div class="row"><button id="bold"><b>B</b></button><button id="italic"><i>I</i></button><button id="underline"><u>U</u></button><input id="font-size" type="number" value="14" min="8" max="72" style="width:74px"></div></div>
      <div class="group"><label>Color</label><div class="row"><input id="text-color" type="color" value="#000000" title="Text color"><input id="bg-color" type="color" value="#ffffff" title="Background color"><button id="clear-format">Clear Format</button></div></div>
      <div class="group"><label>Align</label><div class="row"><button id="align-left">L</button><button id="align-center">C</button><button id="align-right">R</button><button id="wrap-text">Wrap</button></div></div>
      <div class="group"><label>Cells</label><div class="row"><button id="merge-cells">Merge</button><button id="lock-cells">Lock</button><button id="unlock-cells">Unlock</button></div></div>
      <div class="group"><label>Sheets</label><div class="row"><button id="add-sheet">+ Sheet</button><button id="rename-sheet">Rename</button><button id="duplicate-sheet">Duplicate</button><button id="delete-sheet" class="danger">Delete</button><select id="sheet-select"></select></div></div>
    </div>

    <div class="panel" id="panel-insert" style="display:none">
      <div class="group"><label>Rows / Columns</label><div class="row"><button id="add-row">Add Row</button><button id="add-col">Add Col</button><button id="del-row">Delete Row</button><button id="del-col">Delete Col</button></div></div>
      <div class="group"><label>Charts</label><div class="row"><select id="chart-type"><option value="line">Line</option><option value="bar">Bar</option><option value="pie">Pie</option><option value="doughnut">Doughnut</option><option value="scatter">Scatter</option></select><button id="chart-selection">Create Chart</button><button id="sparkline-selection">Sparkline</button></div></div>
      <div class="group"><label>Notes</label><div class="row"><button id="add-note">Add/Edit Note</button><button id="show-notes">Show Notes</button></div></div>
    </div>

    <div class="panel" id="panel-data" style="display:none">
      <div class="group"><label>Sort / Filter</label><div class="row"><button id="sort-asc">A→Z</button><button id="sort-desc">Z→A</button><button id="filter-col">Filter Column</button><button id="clear-filter">Clear Filters</button></div></div>
      <div class="group"><label>Validation</label><div class="row"><select id="validation-type"><option value="none">None</option><option value="number-range">Number Range</option><option value="list">List</option><option value="date">Date</option><option value="text-length">Text Length ≤</option></select><input id="validation-rule" placeholder="1-100 or a,b,c"><button id="validation-apply">Apply</button></div></div>
      <div class="group"><label>Conditional Format</label><div class="row"><button id="cf-add">Add Rule</button><button id="cf-clear">Clear Rules</button></div></div>
      <div class="group"><label>Find / Replace</label><div class="row"><input id="replace-input" placeholder="Replace with"><button id="replace-selection">Replace</button></div></div>
      <div class="group"><label>Import / Export</label><div class="row"><button id="export-csv">CSV</button><button id="export-xlsx">XLSX</button><button id="import-xlsx">Import</button><input id="import-file" type="file" accept=".xlsx,.xls,.csv,.txt,.json" style="display:none"/></div></div>
    </div>

    <div class="panel" id="panel-view" style="display:none">
      <div class="group"><label>Freeze</label><div class="row"><button id="freeze-row">Freeze Top</button><button id="freeze-col">Freeze First</button><button id="unfreeze">Unfreeze</button></div></div>
      <div class="group"><label>Options</label><div class="row"><button id="toggle-dark">Dark</button><button id="toggle-gridlines">Gridlines</button><button id="autosave-toggle">Autosave</button><button id="collab-toggle">Collab</button></div></div>
      <div class="group"><label>Zoom / Print</label><div class="row"><input id="zoom" type="range" min="70" max="150" value="100"><button id="print-sheet">Print</button></div></div>
    </div>

    <div class="panel" id="panel-dev" style="display:none">
      <div class="group"><label>Workbook</label><div class="row"><button id="demo-data">Demo Data</button><button id="clear-local" class="danger">Clear Storage</button><button id="export-json">Export JSON</button><button id="import-json">Import JSON</button></div></div>
      <div class="group"><label>Diagnostics</label><div class="row"><button id="recalculate">Recalculate</button><span id="history-count" class="pill">Undo 0 / Redo 0</span></div></div>
    </div>
  </div>

  <div id="formula-bar" role="region" aria-label="Formula bar">
    <input id="name-box" value="A1" aria-label="Name box" />
    <input id="formula-input" list="formula-suggestions" placeholder="Enter value or formula, e.g. =SUM(A1:A10), =IF(A1>5,'Yes','No')" />
    <datalist id="formula-suggestions"></datalist>
    <div class="row"><button id="apply-formula" class="primary">Apply</button><button id="undo">Undo</button><button id="redo">Redo</button><input id="find-input" placeholder="Find (Ctrl+F)" /></div>
  </div>

  <div id="workspace">
    <div id="left-panel" aria-hidden="true">
      <button class="corner-btn" id="new-file" title="New">New</button><button class="corner-btn" id="save-file" title="Save">Save</button><button class="corner-btn" id="download-png" title="PNG">PNG</button><button class="corner-btn" id="copy-tsv" title="Copy TSV">TSV</button>
    </div>
    <div id="grid-container" tabindex="0"><table class="sheet" id="sheet-table" role="grid" aria-label="Spreadsheet"></table></div>
  </div>
  <div id="statusbar"><span>Status: <span class="status-strong" id="status-mode">Ready</span></span><span id="status-selection">Selection: —</span><span id="status-count">Count: 0</span><span id="status-sum">Sum: 0</span><span id="status-avg">Avg: 0</span><span id="status-minmax">Min/Max: —</span></div>
</div>

<div class="context-menu" id="context-menu" role="menu">
  <button data-action="insert-row">Insert Row</button><button data-action="insert-col">Insert Column</button><button data-action="delete-row">Delete Row</button><button data-action="delete-col">Delete Column</button><hr>
  <button data-action="clear">Clear Contents</button><button data-action="clear-format">Clear Format</button><button data-action="lock">Lock Cell(s)</button><button data-action="unlock">Unlock Cell(s)</button><button data-action="note">Add/Edit Note</button><hr>
  <button data-action="copy">Copy</button><button data-action="paste">Paste</button><button data-action="fill-down">Fill Down</button>
</div>

<script>
(() => {
'use strict';

const MAX_ROWS = 500;
const MAX_COLS = 52;
const STORAGE_KEY = 'advsheet_pro_v1';
const sheetTable = document.getElementById('sheet-table');
const gridContainer = document.getElementById('grid-container');
const formulaInput = document.getElementById('formula-input');
const nameBox = document.getElementById('name-box');
const sheetSelect = document.getElementById('sheet-select');
const importFile = document.getElementById('import-file');
const contextMenu = document.getElementById('context-menu');
const saveState = document.getElementById('save-state');
const selectionPill = document.getElementById('selection-pill');
const workbookName = document.getElementById('workbook-name');

const FUNCTIONS = ['SUM','AVERAGE','MIN','MAX','MEDIAN','COUNT','COUNTA','COUNTBLANK','COUNTIF','SUMIF','IF','AND','OR','NOT','VLOOKUP','ROUND','ABS','CONCAT','LEN','TRIM','UPPER','LOWER','LEFT','RIGHT','TODAY','NOW','RAND'];
const COMMANDS = [];
let sheets = {};
let currentSheet = 'Sheet1';
let selectionStart = null;
let selectionEnd = null;
let selectedCells = [];
let activeCell = null;
let clipboard = null;
let frozenTop = 0;
let frozenLeft = 0;
let autosave = true;
let collab = false;
let gridlines = true;
let wrapText = false;
let mouseDown = false;
let lastSavedAt = 0;
let broadcast = (typeof BroadcastChannel !== 'undefined') ? new BroadcastChannel('advsheet-pro-sync') : null;
let colResizeState = null;
let rowResizeState = null;

function toast(message){
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = message;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 1800);
}
function markDirty(){
  saveState.textContent = autosave ? 'Saving…' : 'Unsaved changes';
  if(autosave){ window.clearTimeout(markDirty._timer); markDirty._timer = window.setTimeout(saveToLocal, 250); }
}
function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
function escapeHTML(str){ return String(str).replace(/[&<>"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function colName(i){ let s=''; i++; while(i>0){ const r=(i-1)%26; s=String.fromCharCode(65+r)+s; i=Math.floor((i-1)/26); } return s; }
function cellKeyFromRC(r,c){ return `${colName(c)}${r+1}`; }
function parseCellKey(key){
  const m = String(key).match(/^([A-Z]+)(\d+)$/i);
  if(!m) throw new Error('Invalid cell key: ' + key);
  const c = m[1].toUpperCase().split('').reduce((acc,ch)=>acc*26 + (ch.charCodeAt(0)-64),0)-1;
  return { r:Number(m[2])-1, c };
}
function getCellByKey(key){ const {r,c} = parseCellKey(key); const row = sheetTable.rows[r+1]; return row ? row.cells[c+1] : null; }
function current(){ return sheets[currentSheet]; }
function createBlankSheet(rows=100, cols=26){ return { rows, cols, data:{}, merges:[], validations:{}, cfRules:[], filters:{}, hiddenRows:{}, colWidths:{}, rowHeights:{}, undo:[], redo:[] }; }
function normalizeSheet(s){
  return Object.assign(createBlankSheet(), s || {}, {
    data:(s&&s.data)||{}, merges:(s&&s.merges)||[], validations:(s&&s.validations)||{}, cfRules:(s&&s.cfRules)||[], filters:(s&&s.filters)||{}, hiddenRows:(s&&s.hiddenRows)||{}, colWidths:(s&&s.colWidths)||{}, rowHeights:(s&&s.rowHeights)||{}, undo:(s&&s.undo)||[], redo:(s&&s.redo)||[]
  });
}
function ensureDefault(){
  Object.keys(sheets).forEach(k => sheets[k] = normalizeSheet(sheets[k]));
  if(Object.keys(sheets).length===0) sheets.Sheet1 = createBlankSheet();
  if(!sheets[currentSheet]) currentSheet = Object.keys(sheets)[0];
}
function loadFromLocal(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    sheets = data.sheets || {};
    currentSheet = data.currentSheet || currentSheet;
    frozenTop = data.frozenTop || 0;
    frozenLeft = data.frozenLeft || 0;
    autosave = data.autosave !== false;
    gridlines = data.gridlines !== false;
    wrapText = !!data.wrapText;
    workbookName.value = data.workbookName || 'Advanced Workbook';
    if(data.darkMode) document.body.classList.add('dark-mode');
    return true;
  }catch(e){ console.warn('load failed', e); return false; }
}
function saveToLocal(){
  try{
    const payload = { sheets, currentSheet, frozenTop, frozenLeft, autosave, gridlines, wrapText, workbookName:workbookName.value, darkMode:document.body.classList.contains('dark-mode'), ts:Date.now() };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    lastSavedAt = Date.now();
    saveState.textContent = 'Saved locally';
  }catch(e){ console.warn('save failed', e); saveState.textContent = 'Save failed'; toast('Local save failed. Workbook may be too large.'); }
}
function updateHistoryCount(){
  const el = document.getElementById('history-count');
  if(el){ const s = current(); el.textContent = `Undo ${s.undo?.length||0} / Redo ${s.redo?.length||0}`; }
}
function pushUndo(action){
  const s = current(); s.undo = s.undo || []; s.redo = s.redo || [];
  s.undo.push(action); if(s.undo.length > 250) s.undo.shift(); s.redo = [];
  updateHistoryCount(); markDirty();
}

function initGrid(name){
  currentSheet = name || currentSheet;
  ensureDefault();
  const s = current();
  sheetTable.innerHTML = '';
  sheetTable.classList.toggle('wrap-on', wrapText);
  gridContainer.classList.toggle('gridlines-off', !gridlines);

  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  const corner = document.createElement('th');
  corner.title = 'Select all';
  corner.addEventListener('click', selectUsedRange);
  headRow.appendChild(corner);
  for(let c=0;c<s.cols;c++){
    const th = document.createElement('th');
    th.textContent = colName(c); th.dataset.col = c;
    if(s.colWidths[c]) th.style.width = th.style.minWidth = s.colWidths[c] + 'px';
    th.addEventListener('click', () => selectColumn(c));
    const handle = document.createElement('div');
    Object.assign(handle.style, {position:'absolute',right:'0',top:'0',bottom:'0',width:'6px',cursor:'col-resize'});
    handle.addEventListener('mousedown', e => startColResize(e,c));
    th.appendChild(handle); headRow.appendChild(th);
  }
  thead.appendChild(headRow); sheetTable.appendChild(thead);

  const tbody = document.createElement('tbody');
  for(let r=0;r<s.rows;r++){
    const tr = document.createElement('tr'); tr.dataset.row = r;
    if(s.hiddenRows[r]) tr.style.display = 'none';
    if(s.rowHeights[r]) tr.style.height = s.rowHeights[r] + 'px';
    const rh = document.createElement('th'); rh.className='row-header'; rh.textContent = r+1; rh.dataset.row = r;
    rh.addEventListener('click', () => selectRow(r));
    const rhHandle = document.createElement('div');
    Object.assign(rhHandle.style, {position:'absolute',left:'0',right:'0',bottom:'0',height:'6px',cursor:'row-resize'});
    rhHandle.addEventListener('mousedown', e => startRowResize(e,r));
    rh.appendChild(rhHandle); tr.appendChild(rh);
    for(let c=0;c<s.cols;c++){
      const td = document.createElement('td'); td.contentEditable = true; td.dataset.row = r; td.dataset.col = c; td.setAttribute('role','gridcell');
      if(s.colWidths[c]) td.style.width = td.style.minWidth = s.colWidths[c] + 'px';
      td.addEventListener('mousedown', onCellMouseDown);
      td.addEventListener('mousemove', onCellMouseMove);
      td.addEventListener('focus', onCellFocus);
      td.addEventListener('blur', onCellBlur);
      td.addEventListener('keydown', onCellKeyDown);
      td.addEventListener('contextmenu', onCellContextMenu);
      applyCellDataToTD(td);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  sheetTable.appendChild(tbody);
  applyMerges(); applyCFAll(); applyFrozenPanes(); updateSheetSelector(); clearSelection(false); updateStatus(); updateHistoryCount();
}

function applyCellDataToTD(td){
  const key = cellKeyFromRC(+td.dataset.row, +td.dataset.col);
  const d = current().data[key] || {};
  td.classList.remove('protected','has-note','invalid'); td.title = '';
  td.style.cssText = '';
  if(current().colWidths[td.dataset.col]) td.style.width = td.style.minWidth = current().colWidths[td.dataset.col] + 'px';
  if(d.style) Object.keys(d.style).forEach(k => td.style[k] = d.style[k]);
  td.contentEditable = d.protected ? 'false' : 'true';
  if(d.protected) td.classList.add('protected');
  if(d.note){ td.classList.add('has-note'); td.title = d.note; }
  if(d.sparkline && Array.isArray(d.sparkline)){

function exportCSV(){
  const s=current(); const lines=[];

function csvEscape(v){ return '"' + String(v).replace(/"/g,'""') + '"'; }
function exportXLSX(){
  const wb=XLSX.utils.book_new();
  Object.keys(sheets).forEach(name=>{ const s=sheets[name]; const aoa=[]; for(let r=0;r<s.rows;r++){ const row=[]; for(let c=0;c<s.cols;c++) row.push(s.data[cellKeyFromRC(r,c)]?.value ?? ''); aoa.push(row); } const ws=XLSX.utils.aoa_to_sheet(aoa); XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31)); });
  XLSX.writeFile(wb, `${workbookName.value || 'workbook'}.xlsx`);

function exportJSON(){ downloadBlob('workbook.json', JSON.stringify({sheets,currentSheet,workbookName:workbookName.value},null,2), 'application/json'); }
function downloadBlob(filename,content,type){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url); }
function importFileHandler(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      if(file.name.endsWith('.json')){ const data=JSON.parse(ev.target.result); sheets=data.sheets||data; currentSheet=data.currentSheet||Object.keys(sheets)[0]||'Sheet1'; if(data.workbookName) workbookName.value=data.workbookName; ensureDefault(); initGrid(currentSheet); markDirty(); return; }
      if(file.name.endsWith('.csv')||file.name.endsWith('.txt')) importCSVText(ev.target.result, file.name);
      else importXLSXArray(ev.target.result);
      markDirty(); toast('Imported');
    }catch(err){ console.error(err); toast('Import failed'); }
  };
  if(file.name.endsWith('.csv')||file.name.endsWith('.txt')||file.name.endsWith('.json')) reader.readAsText(file); else reader.readAsArrayBuffer(file);
}
function parseCSVLine(line){
  const out=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++){ const ch=line[i]; if(ch==='"'){ if(q && line[i+1]==='"'){cur+='"'; i++;} else q=!q; } else if(ch===',' && !q){ out.push(cur); cur=''; } else cur+=ch; }
  out.push(cur); return out;
}
function importCSVText(text,name='ImportCSV'){
  const lines=text.split(/\r?\n/).filter((line,i,arr)=>!(i===arr.length-1 && line==='')); const ns=createBlankSheet(Math.max(lines.length,100),26);
  lines.forEach((line,r)=>parseCSVLine(line).forEach((v,c)=>{ if(v!=='') ns.data[cellKeyFromRC(r,c)]={value:parseValue(v),display:parseValue(v)}; }));
  const sheetName=uniqueSheetName(name.replace(/\.[^.]+$/,'').slice(0,24)||'ImportCSV'); sheets[sheetName]=ns; currentSheet=sheetName; initGrid(currentSheet);
}
function importXLSXArray(arr){
  const wb=XLSX.read(new Uint8Array(arr),{type:'array'});
  Object.keys(wb.Sheets).forEach((name,idx)=>{ const aoa=XLSX.utils.sheet_to_json(wb.Sheets[name],{header:1,raw:true}); const rows=Math.max(aoa.length,100), cols=Math.max(...aoa.map(r=>r.length),26); const ns=createBlankSheet(rows,cols); aoa.forEach((row,r)=>(row||[]).forEach((v,c)=>{ if(v!==undefined&&v!==null) ns.data[cellKeyFromRC(r,c)]={value:v,display:v}; })); sheets[uniqueSheetName(name||`Imported${idx+1}`)]=ns; });
  currentSheet=Object.keys(sheets)[0]; initGrid(currentSheet);
}

  document.getElementById('toggle-dark').onclick=()=>{document.body.classList.toggle('dark-mode'); markDirty();}; document.getElementById('toggle-gridlines').onclick=()=>{gridlines=!gridlines; initGrid(currentSheet); markDirty();}; document.getElementById('autosave-toggle').onclick=()=>{autosave=!autosave; toast('Autosave '+(autosave?'enabled':'disabled')); markDirty();}; document.getElementById('collab-toggle').onclick=()=>{collab=!collab; toast('Collab '+(collab?'enabled':'disabled'));}; document.getElementById('zoom').oninput=e=>{sheetTable.style.transform=`scale(${e.target.value/100})`; sheetTable.style.transformOrigin='top left';}; document.getElementById('print-sheet').onclick=()=>window.print();
  document.getElementById('demo-data').onclick=demoData; document.getElementById('clear-local').onclick=()=>{ if(confirm('Clear localStorage and reload?')){ localStorage.removeItem(STORAGE_KEY); location.reload(); } }; document.getElementById('recalculate').onclick=()=>{ recalculateAll(); initGrid(currentSheet); toast('Recalculated'); };
  document.getElementById('apply-formula').onclick=()=>{ if(!selectedCells.length) return toast('Select a cell'); const td=selectedCells[0]; commitValue(cellKeyFromRC(+td.dataset.row,+td.dataset.col), formulaInput.value, td); };
  document.getElementById('undo').onclick=undo; document.getElementById('redo').onclick=redo; document.getElementById('save-file').onclick=()=>{saveToLocal(); toast('Saved locally');}; document.getElementById('new-file').onclick=()=>{ if(!confirm('Create new workbook?')) return; sheets={Sheet1:createBlankSheet()}; currentSheet='Sheet1'; initGrid(currentSheet); markDirty(); }; document.getElementById('download-png').onclick=snapshotSelectionPNG;
  document.getElementById('command-open').onclick=openCommandPalette; document.getElementById('help-open').onclick=openHelp; workbookName.oninput=markDirty;
  contextMenu.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{ const a=btn.dataset.action; contextMenu.style.display='none'; ({'insert-row':insertRowAtSelection,'insert-col':insertColAtSelection,'delete-row':deleteRowAtSelection,'delete-col':deleteColAtSelection,'clear':clearSelectedContents,'clear-format':clearFormat,'copy':copySelected,'paste':pasteSelected,'fill-down':fillDown,'lock':()=>setProtection(true),'unlock':()=>setProtection(false),'note':addNote}[a]?.()); }));
  document.addEventListener('keydown', e=>{ const mod=e.ctrlKey||e.metaKey; if(mod&&e.key.toLowerCase()==='f'){e.preventDefault(); document.getElementById('find-input').focus();} if(mod&&e.key.toLowerCase()==='s'){e.preventDefault(); saveToLocal(); toast('Saved');} if(mod&&e.key.toLowerCase()==='k'){e.preventDefault(); openCommandPalette();} if(mod&&e.key.toLowerCase()==='z'){e.preventDefault(); undo();} if(mod&&e.key.toLowerCase()==='y'){e.preventDefault(); redo();} });
  window.addEventListener('beforeunload',()=>{ if(autosave) saveToLocal(); });
}
function registerCommands(){
  registerCommand('save','Save workbook',()=>{saveToLocal(); toast('Saved');},'Ctrl/⌘+S'); registerCommand('find','Focus find box',()=>document.getElementById('find-input').focus(),'Ctrl/⌘+F'); registerCommand('demo','Insert demo data',demoData); registerCommand('chart','Create chart from selection',createChartFromSelection); registerCommand('spark','Create sparkline from selection',createSparklineFromSelection); registerCommand('filter','Filter selected column',filterColumn); registerCommand('clear-filter','Clear filters',clearFilters); registerCommand('dark','Toggle dark mode',()=>document.body.classList.toggle('dark-mode')); registerCommand('export-xlsx','Export XLSX',exportXLSX); registerCommand('print','Print sheet',()=>window.print()); registerCommand('help','Open help',openHelp);
}
function buildFormulaDatalist(){ document.getElementById('formula-suggestions').innerHTML=FUNCTIONS.map(f=>`<option value="=${f}(">`).join(''); }

if(broadcast){ broadcast.onmessage=ev=>{ const msg=ev.data; if(msg.type==='edit'&&msg.sheet===currentSheet){ current().data[msg.key]=msg.data; recalculateAll(); const td=getCellByKey(msg.key); if(td) applyCellDataToTD(td); updateStatus(); } }; }

loadFromLocal(); ensureDefault(); buildFormulaDatalist(); registerCommands(); wireUI(); recalculateAll(); initGrid(currentSheet); if(autosave && !lastSavedAt) saveToLocal();
window.Spread = { get sheets(){return sheets;}, initGrid, saveToLocal, exportXLSX, exportCSV, recalculateAll, current:()=>current() };
})();
</script>
