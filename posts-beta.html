<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Posts Dashboard</title>

  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --text: #182033;
      --muted: #667085;
      --primary: #4caf50;
      --primary-dark: #3f9442;
      --danger: #ef4444;
      --border: #e5e7eb;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    [data-theme="dark"] {
      --bg: #0f172a;
      --surface: #182235;
      --text: #f8fafc;
      --muted: #94a3b8;
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --border: #334155;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(76, 175, 80, 0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    .hero {
      background: linear-gradient(135deg, var(--surface), rgba(76, 175, 80, 0.08));
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: 26px;
      padding: 28px;
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 4rem);
      letter-spacing: -0.05em;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 720px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px auto auto auto;
      gap: 10px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      position: sticky;
      top: 12px;
      z-index: 10;
    }

    input,
    select,
    button {
      font: inherit;
    }

    .search,
    .sort {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }

    .search:focus,
    .sort:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(76, 175, 80, 0.16);
    }

    .btn {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      color: white;
      background: var(--primary);
      transition: transform 0.2s ease, background 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: var(--primary-dark);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.55;
      transform: none;
    }

    .btn.secondary {
      background: #64748b;
    }

    .btn.danger {
      background: var(--danger);
    }

    .meta-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      margin: 14px 2px;
      font-size: 0.95rem;
      flex-wrap: wrap;
    }

    .status {
      min-height: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), #38bdf8);
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(76, 175, 80, 0.55);
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.15);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 6px;
    }

    .badge {
      color: var(--primary);
      background: rgba(76, 175, 80, 0.12);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    .favourite {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: transform 0.2s ease;
    }

    .favourite:hover {
      transform: scale(1.08);
    }

    .favourite.active {
      color: #f59e0b;
    }

    .card h2 {
      margin: 16px 0 10px;
      font-size: 1.15rem;
      line-height: 1.3;
      text-transform: capitalize;
    }

    .card p {
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 14px;
    }

    .card.collapsed p {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .read-more {
      border: none;
      background: transparent;
      color: var(--primary);
      font-weight: bold;
      cursor: pointer;
      padding: 0;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 48px 20px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
    }

    .skeleton {
      height: 220px;
      border-radius: var(--radius);
      background:
        linear-gradient(
          90deg,
          rgba(148, 163, 184, 0.18),
          rgba(148, 163, 184, 0.35),
          rgba(148, 163, 184, 0.18)
        );
      background-size: 200% 100%;
      animation: shimmer 1.1s infinite linear;
    }

    @keyframes shimmer {
      from {
        background-position: 200% 0;
      }

      to {
        background-position: -200% 0;
      }
    }

    @media (max-width: 820px) {
      .toolbar {
        grid-template-columns: 1fr;
        position: static;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="hero">
      <h1>Posts Dashboard</h1>
      <p>
        A faster, cleaner version of your fetch project with local caching,
        search, sorting, favourites, responsive cards, loading states and better error handling.
      </p>
    </section>

    <section class="toolbar" aria-label="Post controls">
      <input
        id="searchInput"
        class="search"
        type="search"
        placeholder="Search posts..."
        aria-label="Search posts"
      />

      <select id="sortSelect" class="sort" aria-label="Sort posts">
        <option value="id-asc">Oldest first</option>
        <option value="id-desc">Newest first</option>
        <option value="title-asc">Title A-Z</option>
        <option value="title-desc">Title Z-A</option>
        <option value="favourites">Favourites first</option>
      </select>

      <button id="fetchButton" class="btn" type="button">Refresh</button>
      <button id="clearButton" class="btn danger" type="button">Clear Cache</button>
      <button id="themeButton" class="btn secondary" type="button">Dark Mode</button>
    </section>

    <div class="meta-bar">
      <span id="stats">0 posts loaded</span>
      <span id="status" class="status" role="status" aria-live="polite"></span>
    </div>

    <section id="postsGrid" class="grid" aria-label="Posts"></section>
  </main>

  <template id="postTemplate">
    <article class="card collapsed">
      <div class="card-top">
        <span class="badge"></span>
        <button class="favourite" type="button" aria-label="Add to favourites">♡</button>
      </div>

      <h2></h2>
      <p></p>

      <button class="read-more" type="button">Read more</button>
    </article>
  </template>

  <script>
    const API_URL = "https://jsonplaceholder.typicode.com/posts";
    const POSTS_KEY = "advanced-posts-cache";
    const FAVOURITES_KEY = "advanced-posts-favourites";
    const THEME_KEY = "advanced-posts-theme";

    const grid = document.getElementById("postsGrid");
    const template = document.getElementById("postTemplate");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const fetchButton = document.getElementById("fetchButton");
    const clearButton = document.getElementById("clearButton");
    const themeButton = document.getElementById("themeButton");
    const stats = document.getElementById("stats");
    const statusText = document.getElementById("status");

    let posts = [];
    let favourites = new Set(JSON.parse(localStorage.getItem(FAVOURITES_KEY) || "[]"));

    initialiseTheme();
    loadPosts();

    fetchButton.addEventListener("click", () => fetchPosts(true));
    clearButton.addEventListener("click", clearCache);
    themeButton.addEventListener("click", toggleTheme);
    searchInput.addEventListener("input", renderPosts);
    sortSelect.addEventListener("change", renderPosts);

    function loadPosts() {
      const cached = localStorage.getItem(POSTS_KEY);

      if (cached) {
        const parsed = JSON.parse(cached);
        posts = parsed.data || [];
        renderPosts();

        const savedTime = parsed.savedAt
          ? new Date(parsed.savedAt).toLocaleString()
          : "unknown time";

        setStatus(`Loaded from cache: ${savedTime}`);
      } else {
        fetchPosts();
      }
    }

    async function fetchPosts(forceRefresh = false) {
      setLoading(true);
      showSkeletons();

      try {
        const response = await fetch(API_URL);

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        posts = await response.json();

        localStorage.setItem(
          POSTS_KEY,
          JSON.stringify({
            savedAt: new Date().toISOString(),
            data: posts
          })
        );

        renderPosts();
        setStatus(forceRefresh ? "Posts refreshed successfully." : "Posts loaded successfully.");
      } catch (error) {
        grid.innerHTML = `
          <div class="empty">
            Could not load posts. Check your connection and try again.
          </div>
        `;

        setStatus(`Error: ${error.message}`);
      } finally {
        setLoading(false);
      }
    }

    function renderPosts() {
      const query = searchInput.value.trim().toLowerCase();
      const sortMode = sortSelect.value;

      let visiblePosts = posts.filter(post => {
        const searchableText = `${post.title} ${post.body}`.toLowerCase();
        return searchableText.includes(query);
      });

      visiblePosts.sort((a, b) => {
        if (sortMode === "id-asc") return a.id - b.id;
        if (sortMode === "id-desc") return b.id - a.id;
        if (sortMode === "title-asc") return a.title.localeCompare(b.title);
        if (sortMode === "title-desc") return b.title.localeCompare(a.title);

        if (sortMode === "favourites") {
          const aFav = favourites.has(a.id);
          const bFav = favourites.has(b.id);

          if (aFav === bFav) return a.id - b.id;
          return aFav ? -1 : 1;
        }

        return 0;
      });

      grid.innerHTML = "";

      if (visiblePosts.length === 0) {
        grid.innerHTML = `<div class="empty">No posts match your search.</div>`;
      } else {
        visiblePosts.forEach(displayCard);
      }

      stats.textContent = `${visiblePosts.length} of ${posts.length} posts shown`;
    }

    function displayCard(post) {
      const clone = template.content.cloneNode(true);
      const card = clone.querySelector(".card");
      const badge = clone.querySelector(".badge");
      const favouriteButton = clone.querySelector(".favourite");
      const title = clone.querySelector("h2");
      const body = clone.querySelector("p");
      const readMore = clone.querySelector(".read-more");

      badge.textContent = `Post #${post.id}`;
      title.textContent = post.title;
      body.textContent = post.body;

      updateFavouriteButton(favouriteButton, post.id);

      favouriteButton.addEventListener("click", () => {
        if (favourites.has(post.id)) {
          favourites.delete(post.id);
        } else {
          favourites.add(post.id);
        }

        localStorage.setItem(FAVOURITES_KEY, JSON.stringify([...favourites]));
        updateFavouriteButton(favouriteButton, post.id);

        if (sortSelect.value === "favourites") {
          renderPosts();
        }
      });

      readMore.addEventListener("click", () => {
        card.classList.toggle("collapsed");
        readMore.textContent = card.classList.contains("collapsed") ? "Read more" : "Show less";
      });

      grid.appendChild(clone);
    }

    function updateFavouriteButton(button, postId) {
      const isFavourite = favourites.has(postId);

      button.classList.toggle("active", isFavourite);
      button.textContent = isFavourite ? "★" : "♡";
      button.setAttribute(
        "aria-label",
        isFavourite ? "Remove from favourites" : "Add to favourites"
      );
    }

    function showSkeletons() {
      grid.innerHTML = "";

      for (let i = 0; i < 8; i++) {
        const skeleton = document.createElement("div");
        skeleton.className = "skeleton";
        grid.appendChild(skeleton);
      }
    }

    function setLoading(isLoading) {
      fetchButton.disabled = isLoading;
      fetchButton.textContent = isLoading ? "Loading..." : "Refresh";
    }

    function setStatus(message) {
      statusText.textContent = message;
    }

    function clearCache() {
      localStorage.removeItem(POSTS_KEY);
      posts = [];
      grid.innerHTML = `<div class="empty">Cache cleared. Press Refresh to load posts again.</div>`;
      stats.textContent = "0 posts loaded";
      setStatus("Local cache cleared.");
    }

    function initialiseTheme() {
      const savedTheme = localStorage.getItem(THEME_KEY) || "light";
      document.body.dataset.theme = savedTheme;
      themeButton.textContent = savedTheme === "dark" ? "Light Mode" : "Dark Mode";
    }

    function toggleTheme() {
      const currentTheme = document.body.dataset.theme;
      const nextTheme = currentTheme === "dark" ? "light" : "dark";

      document.body.dataset.theme = nextTheme;
      localStorage.setItem(THEME_KEY, nextTheme);
      themeButton.textContent = nextTheme === "dark" ? "Light Mode" : "Dark Mode";
    }
  </script>
</body>
</html>
