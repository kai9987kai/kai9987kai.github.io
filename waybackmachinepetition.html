<script>
  (function () {
    const petitionTargetId =
      "can-petition-area-tell-new-york-times-the-atlantic-and-usa-today-to-keep-the-crucial-work-of-journalists-in-the-wayback-machine";

    const target = document.getElementById(petitionTargetId);
    const loading = document.getElementById("petitionLoading");
    const fallback = document.getElementById("petitionFallback");

    function showFallback() {
      if (!target || target.children.length === 0) {
        loading.style.display = "none";
        fallback.style.display = "block";
      }
    }

    function checkLoaded() {
      if (target && target.children.length > 0) {
        loading.style.display = "none";
        fallback.style.display = "none";
      }
    }

    const script = document.createElement("script");
    script.src =
      "https://actionnetwork.org/widgets/v6/petition/tell-new-york-times-the-atlantic-and-usa-today-to-keep-the-crucial-work-of-journalists-in-the-wayback-machine?format=js&source=widget";
    script.async = true;

    script.onload = function () {
      setTimeout(checkLoaded, 900);
    };

    script.onerror = showFallback;

    document.body.appendChild(script);

    const watcher = setInterval(function () {
      checkLoaded();

      if (target && target.children.length > 0) {
        clearInterval(watcher);
      }
    }, 500);

    setTimeout(function () {
      clearInterval(watcher);
      showFallback();
    }, 8000);
  })();
</script>
