<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Public API Chat Widget</title>

  <style>
    :root {
      --bg: #eef2f7;
      --card: rgba(255, 255, 255, 0.82);
      --card-solid: #ffffff;
      --text: #14213d;
      --muted: #64748b;
      --border: rgba(148, 163, 184, 0.28);
      --primary: #22c55e;
      --primary-dark: #16a34a;
      --user: linear-gradient(135deg, #22c55e, #16a34a);
      --bot: #ffffff;
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.16);
      --danger: #ef4444;
      --warning: #f59e0b;
      --ok: #22c55e;
    }

    body.dark {
      --bg: #07111f;
      --card: rgba(15, 23, 42, 0.78);
      --card-solid: #111827;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.18);
      --bot: #1f2937;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.25), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.22), transparent 30%),
        var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 22px;
    }

    .app {
      width: min(980px, 100%);
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .side-panel,
    .chat-container {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px);
      overflow: hidden;
    }

    .side-panel {
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .generated-art {
      position: relative;
      min-height: 230px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 25% 20%, #ffffff 0 2%, transparent 15%),
        radial-gradient(circle at 80% 25%, rgba(255, 255, 255, 0.9), transparent 10%),
        radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.95), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(59, 130, 246, 0.9), transparent 25%),
        radial-gradient(circle at 90% 95%, rgba(168, 85, 247, 0.9), transparent 30%),
        #020617;
    }

    .generated-art::before {
      content: "";
      position: absolute;
      inset: 22px;
      border-radius: 50%;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.42), transparent),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.22), transparent 55%);
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        inset 0 0 50px rgba(255, 255, 255, 0.18),
        0 0 55px rgba(34, 197, 94, 0.55);
      animation: float 4.5s ease-in-out infinite;
    }

    .generated-art::after {
      content: "PUBLIC API CHAT";
      position: absolute;
      left: 18px;
      bottom: 18px;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: white;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.5);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-8px) scale(1.02); }
    }

    h1 {
      font-size: 28px;
      line-height: 1.05;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    .quick-actions {
      display: grid;
      gap: 10px;
    }

    .quick-actions button,
    .icon-button {
      border: 1px solid var(--border);
      background: var(--card-solid);
      color: var(--text);
      padding: 11px 12px;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s ease;
    }

    .quick-actions button:hover,
    .icon-button:hover {
      transform: translateY(-1px);
      border-color: var(--primary);
    }

    .tips {
      padding: 14px;
      border-radius: 18px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
    }

    .chat-container {
      height: min(760px, calc(100vh - 44px));
      min-height: 620px;
      display: flex;
      flex-direction: column;
    }

    .chat-header {
      padding: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.95), rgba(21, 128, 61, 0.95));
      color: white;
    }

    .chat-title {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .chat-title strong {
      font-size: 18px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      opacity: 0.95;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--warning);
      box-shadow: 0 0 0 5px rgba(255, 255, 255, 0.14);
    }

    .status-dot.connected {
      background: var(--ok);
    }

    .status-dot.error {
      background: var(--danger);
    }

    .header-buttons {
      display: flex;
      gap: 8px;
    }

    .header-buttons button {
      background: rgba(255, 255, 255, 0.18);
      color: white;
      border-color: rgba(255, 255, 255, 0.24);
    }

    .chat-messages {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message {
      max-width: min(78%, 560px);
      padding: 12px 14px;
      border-radius: 18px;
      line-height: 1.45;
      word-wrap: break-word;
      white-space: pre-wrap;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.08);
      animation: pop 0.18s ease;
    }

    @keyframes pop {
      from { transform: translateY(5px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .message.user {
      background: var(--user);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .message.bot {
      background: var(--bot);
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
    }

    .meta {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.65;
    }

    .typing {
      width: fit-content;
      padding: 12px 14px;
      border-radius: 18px;
      background: var(--bot);
      border: 1px solid var(--border);
      display: none;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: blink 1s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    .chat-input-area {
      padding: 14px;
      border-top: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      padding: 13px 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      outline: none;
      font: inherit;
      color: var(--text);
      background: var(--card-solid);
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
    }

    .send-button {
      border: none;
      min-width: 54px;
      height: 46px;
      border-radius: 16px;
      background: var(--primary);
      color: white;
      cursor: pointer;
      font-size: 18px;
      font-weight: 900;
      transition: 0.2s ease;
    }

    .send-button:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    .send-button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      body {
        padding: 12px;
      }

      .app {
        grid-template-columns: 1fr;
      }

      .side-panel {
        display: none;
      }

      .chat-container {
        height: calc(100vh - 24px);
        min-height: 0;
        border-radius: 22px;
      }

      .message {
        max-width: 88%;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <aside class="side-panel">
      <div class="generated-art" aria-label="Abstract AI generated chat artwork"></div>

      <div>
        <h1>Advanced Public API Chat Widget</h1>
        <p class="subtitle">
          WebSocket chat, public API commands, saved history, dark mode,
          reconnecting, export tools, and offline fallback replies.
        </p>
      </div>

      <div class="quick-actions">
        <button data-command="/help">Show commands</button>
        <button data-command="/joke">Get a public API joke</button>
        <button data-command="/fact">Get a random fact</button>
        <button data-command="/theme">Toggle theme</button>
        <button data-command="/export">Export chat</button>
      </div>

      <div class="tips">
        Try commands like <strong>/help</strong>, <strong>/joke</strong>,
        <strong>/fact</strong>, <strong>/ping</strong>, <strong>/clear</strong>,
        and <strong>/theme</strong>.
      </div>
    </aside>

    <section class="chat-container">
      <header class="chat-header">
        <div class="chat-title">
          <strong>API Chat Widget</strong>
          <span class="status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Connecting...</span>
          </span>
        </div>

        <div class="header-buttons">
          <button class="icon-button" id="theme-button" title="Toggle theme">☾</button>
          <button class="icon-button" id="clear-button" title="Clear chat">Clear</button>
        </div>
      </header>

      <div class="chat-messages" id="chat-messages">
        <div class="typing" id="typing">
          <span></span><span></span><span></span>
        </div>
      </div>

      <footer class="chat-input-area">
        <div class="input-wrap">
          <textarea id="chat-input" rows="1" placeholder="Type a message or command..."></textarea>
          <button class="send-button" id="send-button" disabled>➤</button>
        </div>
        <div class="hint">Enter sends. Shift + Enter adds a new line.</div>
      </footer>
    </section>
  </main>

  <script>
    (() => {
      const CONFIG = {
        socketUrl: "wss://echo.websocket.events",
        historyKey: "advanced-public-api-chat-history",
        themeKey: "advanced-public-api-chat-theme",
        maxMessages: 120
      };

      const chatMessages = document.getElementById("chat-messages");
      const chatInput = document.getElementById("chat-input");
      const sendButton = document.getElementById("send-button");
      const clearButton = document.getElementById("clear-button");
      const themeButton = document.getElementById("theme-button");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const typing = document.getElementById("typing");

      let ws = null;
      let reconnectAttempts = 0;
      let reconnectTimer = null;
      let messages = loadHistory();

      init();

      function init() {
        loadTheme();
        renderHistory();
        connectWebSocket();

        if (messages.length === 0) {
          addMessage("bot", "Hello! I am ready. Type normally for WebSocket echo, or try /help for extra commands.");
        }

        sendButton.addEventListener("click", sendMessage);
        clearButton.addEventListener("click", clearChat);
        themeButton.addEventListener("click", toggleTheme);

        document.querySelectorAll("[data-command]").forEach(button => {
          button.addEventListener("click", () => {
            chatInput.value = button.dataset.command;
            updateInputState();
            sendMessage();
          });
        });

        chatInput.addEventListener("input", () => {
          autoResizeInput();
          updateInputState();
        });

        chatInput.addEventListener("keydown", event => {
          if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        });
      }

      function connectWebSocket() {
        clearTimeout(reconnectTimer);
        setStatus("connecting", "Connecting...");

        try {
          ws = new WebSocket(CONFIG.socketUrl);

          ws.onopen = () => {
            reconnectAttempts = 0;
            setStatus("connected", "Connected");
          };

          ws.onmessage = event => {
            const text = String(event.data || "").trim();

            if (!text || text.toLowerCase().includes("sponsored message")) return;

            hideTyping();
            addMessage("bot", text);
          };

          ws.onerror = () => {
            setStatus("error", "Connection issue");
          };

          ws.onclose = () => {
            setStatus("error", "Disconnected");
            scheduleReconnect();
          };
        } catch (error) {
          setStatus("error", "WebSocket blocked");
          scheduleReconnect();
        }
      }

      function scheduleReconnect() {
        reconnectAttempts++;
        const delay = Math.min(12000, 1000 * reconnectAttempts);

        reconnectTimer = setTimeout(() => {
          setStatus("connecting", "Reconnecting...");
          connectWebSocket();
        }, delay);
      }

      async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;

        addMessage("user", text);
        chatInput.value = "";
        autoResizeInput();
        updateInputState();

        const handled = await handleCommand(text);
        if (handled) return;

        showTyping();

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(text);
        } else {
          setTimeout(() => {
            hideTyping();
            addMessage("bot", createFallbackReply(text));
          }, 450);
        }
      }

      async function handleCommand(text) {
        const command = text.toLowerCase();

        if (command === "/help") {
          addMessage(
            "bot",
            [
              "Commands:",
              "/help - show commands",
              "/joke - fetch a public API joke",
              "/fact - fetch a public API fact",
              "/ping - show connection status",
              "/theme - toggle dark mode",
              "/clear - clear chat history",
              "/export - download this chat as a JSON file"
            ].join("\n")
          );
          return true;
        }

        if (command === "/ping") {
          const states = ["CONNECTING", "OPEN", "CLOSING", "CLOSED"];
          const state = ws ? states[ws.readyState] : "NO SOCKET";
          addMessage("bot", `WebSocket state: ${state}`);
          return true;
        }

        if (command === "/theme") {
          toggleTheme();
          addMessage("bot", "Theme toggled.");
          return true;
        }

        if (command === "/clear") {
          clearChat();
          return true;
        }

        if (command === "/export") {
          exportChat();
          addMessage("bot", "Chat exported as a JSON file.");
          return true;
        }

        if (command === "/joke") {
          await runApiCommand(
            "Fetching a joke...",
            async () => {
              const data = await fetchJson("https://official-joke-api.appspot.com/random_joke");
              return `${data.setup}\n\n${data.punchline}`;
            }
          );
          return true;
        }

        if (command === "/fact") {
          await runApiCommand(
            "Fetching a fact...",
            async () => {
              const data = await fetchJson("https://uselessfacts.jsph.pl/api/v2/facts/random?language=en");
              return data.text || "No fact returned.";
            }
          );
          return true;
        }

        return false;
      }

      async function runApiCommand(loadingText, callback) {
        showTyping();

        try {
          const result = await callback();
          hideTyping();
          addMessage("bot", result);
        } catch (error) {
          hideTyping();
          addMessage("bot", "The public API did not respond, so I used fallback mode instead.");
        }
      }

      async function fetchJson(url) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 8000);

        const response = await fetch(url, {
          signal: controller.signal,
          headers: {
            "Accept": "application/json"
          }
        });

        clearTimeout(timer);

        if (!response.ok) {
          throw new Error(`API error ${response.status}`);
        }

        return response.json();
      }

      function createFallbackReply(text) {
        const lower = text.toLowerCase();

        if (lower.includes("hello") || lower.includes("hi")) {
          return "Hello! The WebSocket is offline right now, but the fallback bot is still working.";
        }

        if (lower.includes("time")) {
          return `Your current browser time is ${new Date().toLocaleTimeString()}.`;
        }

        if (lower.includes("date")) {
          return `Today's date is ${new Date().toLocaleDateString()}.`;
        }

        if (lower.includes("thanks") || lower.includes("thank you")) {
          return "No problem.";
        }

        return `Offline fallback reply: "${text}"`;
      }

      function addMessage(role, text) {
        const item = {
          role,
          text,
          time: new Date().toISOString()
        };

        messages.push(item);

        if (messages.length > CONFIG.maxMessages) {
          messages = messages.slice(messages.length - CONFIG.maxMessages);
        }

        saveHistory();
        renderMessage(item);
        scrollToBottom();
      }

      function renderHistory() {
        chatMessages.querySelectorAll(".message-row").forEach(row => row.remove());

        messages.forEach(renderMessage);
        scrollToBottom();
      }

      function renderMessage(item) {
        const row = document.createElement("div");
        row.className = `message-row ${item.role}`;

        const bubble = document.createElement("div");
        bubble.className = `message ${item.role}`;
        bubble.textContent = item.text;

        const meta = document.createElement("span");
        meta.className = "meta";
        meta.textContent = formatTime(item.time);

        bubble.appendChild(meta);
        row.appendChild(bubble);

        chatMessages.insertBefore(row, typing);
      }

      function showTyping() {
        typing.style.display = "flex";
        scrollToBottom();
      }

      function hideTyping() {
        typing.style.display = "none";
      }

      function scrollToBottom() {
        requestAnimationFrame(() => {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        });
      }

      function setStatus(type, text) {
        statusDot.className = "status-dot";

        if (type === "connected") {
          statusDot.classList.add("connected");
        }

        if (type === "error") {
          statusDot.classList.add("error");
        }

        statusText.textContent = text;
      }

      function clearChat() {
        messages = [];
        saveHistory();
        renderHistory();
        addMessage("bot", "Chat cleared. Type /help to see what I can do.");
      }

      function exportChat() {
        const blob = new Blob([JSON.stringify(messages, null, 2)], {
          type: "application/json"
        });

        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `chat-export-${Date.now()}.json`;
        link.click();

        URL.revokeObjectURL(url);
      }

      function toggleTheme() {
        document.body.classList.toggle("dark");
        const dark = document.body.classList.contains("dark");
        localStorage.setItem(CONFIG.themeKey, dark ? "dark" : "light");
        themeButton.textContent = dark ? "☀" : "☾";
      }

      function loadTheme() {
        const saved = localStorage.getItem(CONFIG.themeKey);
        const prefersDark = window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;

        if (saved === "dark" || (!saved && prefersDark)) {
          document.body.classList.add("dark");
          themeButton.textContent = "☀";
        } else {
          themeButton.textContent = "☾";
        }
      }

      function loadHistory() {
        try {
          return JSON.parse(localStorage.getItem(CONFIG.historyKey)) || [];
        } catch {
          return [];
        }
      }

      function saveHistory() {
        localStorage.setItem(CONFIG.historyKey, JSON.stringify(messages));
      }

      function updateInputState() {
        sendButton.disabled = chatInput.value.trim().length === 0;
      }

      function autoResizeInput() {
        chatInput.style.height = "auto";
        chatInput.style.height = `${Math.min(chatInput.scrollHeight, 120)}px`;
      }

      function formatTime(iso) {
        try {
          return new Date(iso).toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit"
          });
        } catch {
          return "";
        }
      }
    })();
  </script>
</body>
</html>
