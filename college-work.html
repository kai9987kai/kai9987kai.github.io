<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>College work</title>

  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(15, 23, 42, 0.94);
      --panel-border: rgba(148, 163, 184, 0.22);
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-2: #34d399;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      --radius: 20px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    #background {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      background: #fff;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.68);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 220ms ease;
      z-index: 1000;
    }

    #overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(980px, calc(100vw - 32px));
      height: min(84vh, 860px);
      transform: translate(-50%, -48%) scale(0.98);
      opacity: 0;
      pointer-events: none;
      transition: opacity 240ms ease, transform 240ms ease;
      z-index: 1001;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #popup.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      color: var(--text);
      flex: 0 0 auto;
    }

    .popup-title-wrap {
      min-width: 0;
    }

    .popup-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .popup-subtitle {
      margin: 4px 0 0;
      font-size: 13px;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255,255,255,0.04);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      user-select: none;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .pill:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.08);
      border-color: rgba(96, 165, 250, 0.35);
    }

    .pill:focus-visible {
      outline: 3px solid rgba(96, 165, 250, 0.45);
      outline-offset: 2px;
    }

    .pill.close {
      background: rgba(239, 68, 68, 0.12);
    }

    .popup-body {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      background: #fff;
    }

    #popup-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(15,23,42,0.06), rgba(15,23,42,0.02));
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px;
      transition: opacity 180ms ease;
      pointer-events: none;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(96, 165, 250, 0.18);
      border-top-color: var(--accent);
      animation: spin 900ms linear infinite;
      margin: 0 auto 14px;
    }

    .loading-card {
      max-width: 340px;
    }

    .loading-title {
      color: #111827;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .loading-text {
      margin: 0;
      color: #475569;
      line-height: 1.5;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 700px) {
      #popup {
        width: calc(100vw - 16px);
        height: min(90vh, 900px);
        border-radius: 16px;
      }

      .popup-header {
        padding: 14px 14px;
      }

      .popup-title {
        font-size: 16px;
      }

      .popup-subtitle {
        font-size: 12px;
      }

      .pill {
        padding: 9px 12px;
        font-size: 13px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #overlay,
      #popup,
      .pill {
        transition: none !important;
      }

      .spinner {
        animation: none !important;
      }
    }
  </style>
</head>

<body>
  <iframe id="background" src="index.html" title="Background content"></iframe>

  <div id="overlay" aria-hidden="true"></div>

  <section
    id="popup"
    role="dialog"
    aria-modal="true"
    aria-labelledby="popup-title"
    aria-describedby="popup-subtitle"
    tabindex="-1"
  >
    <header class="popup-header">
      <div class="popup-title-wrap">
        <h1 id="popup-title" class="popup-title">College Work</h1>
        <p id="popup-subtitle" class="popup-subtitle">Loading content in a focused workspace.</p>
      </div>

      <div class="header-actions">
        <button id="refresh-button" class="pill" type="button" title="Reload content">
          Refresh
        </button>
        <button id="close-button" class="pill close" type="button" title="Close popup">
          Close
        </button>
      </div>
    </header>

    <div class="popup-body">
      <div id="loading" class="loading">
        <div class="loading-card">
          <div class="spinner" aria-hidden="true"></div>
          <p class="loading-title">Opening content</p>
          <p class="loading-text">Please wait while the college page loads.</p>
        </div>
      </div>

      <iframe
        id="popup-frame"
        src="College/index.html"
        title="College content"
        loading="eager"
      ></iframe>
    </div>
  </section>

  <script>
    const popup = document.getElementById("popup");
    const overlay = document.getElementById("overlay");
    const closeButton = document.getElementById("close-button");
    const refreshButton = document.getElementById("refresh-button");
    const popupFrame = document.getElementById("popup-frame");
    const loading = document.getElementById("loading");

    let lastFocusedElement = null;
    let popupOpen = false;

    function openPopup() {
      if (popupOpen) return;

      popupOpen = true;
      lastFocusedElement = document.activeElement;

      overlay.classList.add("show");
      popup.classList.add("show");
      popup.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";

      popup.focus({ preventScroll: true });

      loading.classList.remove("hidden");

      const hideLoading = () => loading.classList.add("hidden");
      popupFrame.addEventListener("load", hideLoading, { once: true });

      setTimeout(() => {
        if (!loading.classList.contains("hidden")) {
          loading.classList.add("hidden");
        }
      }, 2500);
    }

    function closePopup() {
      if (!popupOpen) return;

      popupOpen = false;

      overlay.classList.remove("show");
      popup.classList.remove("show");
      popup.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";

      if (lastFocusedElement && typeof lastFocusedElement.focus === "function") {
        lastFocusedElement.focus({ preventScroll: true });
      }
    }

    function togglePopup() {
      popupOpen ? closePopup() : openPopup();
    }

    function refreshPopup() {
      loading.classList.remove("hidden");
      try {
        popupFrame.contentWindow.location.reload();
      } catch {
        popupFrame.src = popupFrame.src;
      }
    }

    closeButton.addEventListener("click", closePopup);
    overlay.addEventListener("click", closePopup);
    refreshButton.addEventListener("click", refreshPopup);

    document.addEventListener("keydown", (e) => {
      if (!popupOpen) return;

      if (e.key === "Escape") {
        e.preventDefault();
        closePopup();
      }
    });

    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(openPopup, 1000);
    });
  </script>
</body>
</html>
