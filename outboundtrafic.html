<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Outbound Link Tracker</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #10151f;
      color: #fff;
    }

    main {
      width: min(680px, calc(100% - 32px));
      padding: 32px;
      border-radius: 18px;
      background: #1a2230;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }

    h1 { margin-top: 0; }
    p { color: #c8d2e3; line-height: 1.5; }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      font-size: 16px;
    }

    input {
      border: 1px solid #40506b;
      background: #0d131d;
      color: white;
    }

    button {
      border: 0;
      background: #2f80ed;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { filter: brightness(1.1); }
    #status { min-height: 24px; margin-top: 16px; color: #9fc4ff; }
    .small { font-size: 13px; color: #93a2ba; }
  </style>
</head>
<body>
  <main>
    <h1>Tracked Outbound Link</h1>
    <p>
      Enter a destination URL. The visit is recorded on this site and the
      destination receives clear campaign parameters.
    </p>

    <form id="redirectForm">
      <input
        id="targetUrl"
        type="url"
        placeholder="https://example.com/page"
        required
      />

      <input
        id="campaign"
        type="text"
        value="website-referral"
        placeholder="Campaign name"
      />

      <button type="submit">Open tracked link</button>
    </form>

    <div id="status"></div>

    <p class="small">
      This page does not impersonate browsers, alter third-party cookies, or
      falsify referral data.
    </p>
  </main>

  <script>
    const form = document.getElementById("redirectForm");
    const targetUrlInput = document.getElementById("targetUrl");
    const campaignInput = document.getElementById("campaign");
    const status = document.getElementById("status");

    function validHttpUrl(value) {
      try {
        const url = new URL(value);
        return url.protocol === "http:" || url.protocol === "https:";
      } catch {
        return false;
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      const rawUrl = targetUrlInput.value.trim();
      const campaign = campaignInput.value.trim() || "website-referral";

      if (!validHttpUrl(rawUrl)) {
        status.textContent = "Please enter a valid http:// or https:// URL.";
        return;
      }

      const destination = new URL(rawUrl);

      destination.searchParams.set("utm_source", "your-site");
      destination.searchParams.set("utm_medium", "referral");
      destination.searchParams.set("utm_campaign", campaign);

      const clickData = {
        destination: destination.toString(),
        campaign,
        clickedAt: new Date().toISOString(),
        page: location.href,
        referrer: document.referrer || "direct"
      };

      status.textContent = "Recording click…";

      try {
        await fetch("/api/outbound-click", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(clickData),
          keepalive: true
        });
      } catch (error) {
        console.warn("Click logging unavailable:", error);
      }

      status.textContent = "Redirecting…";
      window.location.assign(destination.toString());
    });
  </script>
</body>
</html>
