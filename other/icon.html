<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Wars Nuggets Search Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell" data-page="popup">
    <section class="hero-card" aria-labelledby="appTitle">
      <div class="stars" aria-hidden="true"></div>

      <header class="topbar">
        <a class="brand" id="channelLink" href="https://www.youtube.com/channel/UClz3lLJyDq5Jh1-Ete2JmJA" target="_blank" rel="noopener noreferrer" aria-label="Open Star Wars Nuggets YouTube channel">
          <img class="brand-logo" src="icons/icon128.png" alt="Star Wars Nuggets logo">
          <span>
            <strong id="appTitle">Star Wars Nuggets</strong>
            <small>Search cockpit</small>
          </span>
        </a>

        <div class="top-actions" aria-label="Extension actions">
          <button class="icon-button" id="toggleTheme" type="button" title="Toggle theme" aria-label="Toggle theme">☀</button>
          <button class="icon-button" id="openSettings" type="button" title="Settings" aria-label="Open settings">⚙</button>
        </div>
      </header>

      <form class="search-box" id="searchForm" autocomplete="off">
        <label class="visually-hidden" for="searchInput">Search videos</label>
        <input type="search" id="searchInput" placeholder="Search videos… try !yt, !g, !sw, !w" spellcheck="false" autofocus>
        <button id="searchBtn" type="submit">Search</button>
      </form>

      <div class="engine-row" role="radiogroup" aria-label="Search target">
        <button class="chip active" type="button" data-engine="channel">Channel</button>
        <button class="chip" type="button" data-engine="youtube">YouTube</button>
        <button class="chip" type="button" data-engine="google">Google</button>
        <button class="chip" type="button" data-engine="wookieepedia">Wookieepedia</button>
      </div>

      <section id="suggestions" class="suggestions" aria-label="Search suggestions"></section>

      <div class="quick-grid" aria-label="Quick links">
        <a href="https://www.youtube.com/channel/UClz3lLJyDq5Jh1-Ete2JmJA/videos" target="_blank" rel="noopener noreferrer">Latest videos</a>
        <a href="https://www.youtube.com/@StarWarsNuggets" target="_blank" rel="noopener noreferrer">Handle</a>
        <a href="https://studio.youtube.com/" target="_blank" rel="noopener noreferrer">Studio</a>
        <a href="https://trends.google.com/trends/explore?geo=GB&q=Star%20Wars" target="_blank" rel="noopener noreferrer">Trends</a>
      </div>
    </section>

    <section class="panel" aria-labelledby="latestTitle">
      <div class="section-heading">
        <h2 id="latestTitle">Latest channel feed</h2>
        <button class="text-button" id="refreshFeed" type="button">Refresh</button>
      </div>
      <div id="feed" class="feed-list" aria-live="polite">
        <p class="muted">Loading latest uploads…</p>
      </div>
    </section>

    <section class="panel" aria-labelledby="historyTitle">
      <div class="section-heading">
        <h2 id="historyTitle">Search history</h2>
        <button class="text-button danger" id="clearHistory" type="button">Clear</button>
      </div>
      <ol id="historyList" class="history-list"></ol>
    </section>

    <section class="art-card">
      <button id="showModal" class="art-button" type="button">
        <span>View Star Wars inspired art</span>
        <strong>Open gallery</strong>
      </button>
    </section>
  </main>

  <dialog class="modal" id="dalleModal" aria-labelledby="modalTitle">
    <div class="modal-content">
      <button class="modal-x" id="closeModal" type="button" aria-label="Close">×</button>
      <h2 id="modalTitle">Star Wars Nuggets fan art</h2>
      <img src="assets/fan-art.svg" alt="A stylised orange nugget flying through a sci-fi star field">
      <p class="muted">Local placeholder artwork included with the extension. Replace <code>assets/fan-art.svg</code> with your own image any time.</p>
    </div>
  </dialog>

  <dialog class="modal" id="settingsModal" aria-labelledby="settingsTitle">
    <form class="modal-content settings-form" id="settingsForm" method="dialog">
      <button class="modal-x" id="closeSettings" type="button" aria-label="Close">×</button>
      <h2 id="settingsTitle">Settings</h2>

      <label>
        Channel name
        <input id="channelName" type="text" placeholder="Star Wars Nuggets">
      </label>

      <label>
        YouTube channel ID
        <input id="channelId" type="text" placeholder="UClz3lLJyDq5Jh1-Ete2JmJA">
      </label>

      <label>
        Default search target
        <select id="defaultEngine">
          <option value="channel">Channel</option>
          <option value="youtube">YouTube</option>
          <option value="google">Google</option>
          <option value="wookieepedia">Wookieepedia</option>
        </select>
      </label>

      <div class="button-row">
        <button class="secondary" id="resetSettings" type="button">Reset</button>
        <button id="saveSettings" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script src="feed.js"></script>
  <script src="app.js"></script>
</body>
</html>
