<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Star Wars Nuggets Search Tool Options</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="options-body">
  <main class="app-shell options-shell">
    <section class="hero-card">
      <header class="topbar">
        <a class="brand" href="https://www.youtube.com/channel/UClz3lLJyDq5Jh1-Ete2JmJA" target="_blank" rel="noopener noreferrer">
          <img class="brand-logo" src="icons/icon128.png" alt="Star Wars Nuggets logo">
          <span>
            <strong>Extension options</strong>
            <small>Customize searches and data</small>
          </span>
        </a>
      </header>

      <form class="settings-form" id="optionsForm">
        <label>
          Channel name
          <input id="channelName" type="text" autocomplete="off">
        </label>

        <label>
          YouTube channel ID
          <input id="channelId" type="text" autocomplete="off">
        </label>

        <label>
          Default search target
          <select id="defaultEngine">
            <option value="channel">Channel</option>
            <option value="youtube">YouTube</option>
            <option value="google">Google</option>
            <option value="wookieepedia">Wookieepedia</option>
          </select>
        </label>

        <label>
          Theme
          <select id="theme">
            <option value="dark">Dark</option>
            <option value="light">Light</option>
          </select>
        </label>

        <div class="button-row">
          <button class="secondary" id="resetButton" type="button">Reset defaults</button>
          <button type="submit">Save options</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="section-heading">
        <h2>Data tools</h2>
        <button class="text-button danger" id="wipeHistory" type="button">Wipe history</button>
      </div>
      <p class="muted">History is stored locally by Chrome for this extension. It is not sent to a server by this code.</p>
      <textarea id="exportBox" rows="8" readonly aria-label="Exported settings"></textarea>
      <div class="button-row">
        <button class="secondary" id="exportButton" type="button">Export JSON</button>
        <button id="copyButton" type="button">Copy export</button>
      </div>
      <p id="status" class="muted" role="status"></p>
    </section>
  </main>

  <script src="options.js"></script>
</body>
</html>
