<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>Browser Hardware Tools Pro</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 17: stable for standalone browser files -->
  <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>

  <!-- Babel: compiles JSX in this single HTML file -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    :root {
      --panel: rgba(15, 23, 42, 0.74);
      --panel-2: rgba(30, 41, 59, 0.74);
      --line: rgba(99, 102, 241, 0.28);
      --glow: rgba(99, 102, 241, 0.36);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      background:
        radial-gradient(circle at 10% 0%, rgba(99, 102, 241, 0.18), transparent 26rem),
        radial-gradient(circle at 90% 5%, rgba(20, 184, 166, 0.14), transparent 28rem),
        radial-gradient(circle at 50% 100%, rgba(244, 63, 94, 0.08), transparent 24rem),
        #020617;
    }

    @keyframes glowPulse {
      0%, 100% { box-shadow: 0 0 0 rgba(99, 102, 241, 0); }
      50% { box-shadow: 0 0 32px rgba(99, 102, 241, 0.28); }
    }
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.58));
      border: 1px solid rgba(148, 163, 184, 0.14);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.28);
    }
    .tool-card {
      animation: fadeUp .35s ease both;
    }
    .scanline::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.11) 51%);
      background-size: 100% 4px;
      pointer-events: none;
      opacity: .32;
    }
    .noise {
      position: relative;
      overflow: hidden;
    }
    .noise::before {
      content: "";
      position: absolute;
      inset: -40%;
      background-image: radial-gradient(circle, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: .05;
      transform: rotate(8deg);
      pointer-events: none;
    }
    .visualizer-canvas { background: #0f172a; width: 100%; height: 100%; display: block; }
    .range { accent-color: #6366f1; }
    .kbd {
      border: 1px solid rgba(148,163,184,.24);
      background: rgba(15,23,42,.8);
      border-radius: .45rem;
      padding: .08rem .38rem;
      font-size: .68rem;
      color: rgb(203,213,225);
      box-shadow: inset 0 -1px rgba(255,255,255,.06);
    }

    ::-webkit-scrollbar { width: 9px; height: 9px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; scroll-behavior: auto !important; }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans antialiased min-h-screen selection:bg-indigo-500 selection:text-white">
  <div id="loading" class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-slate-950 text-indigo-300">
    <div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
    <h2 class="text-xl font-mono animate-pulse tracking-widest">INITIALIZING SYSTEMS</h2>
    <p class="text-slate-500 text-sm mt-2">Probing local browser hardware APIs</p>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const APP_VERSION = "4.0.0";
    const LS = {
      history: "bht_color_history_v4",
      speech: "bht_speech_text_v4",
      notes: "bht_session_notes_v4",
      theme: "bht_theme_v4"
    };

    const safeJsonParse = (value, fallback) => {
      if (value == null || value === "" || value === "undefined") return fallback;
      try {
        const parsed = JSON.parse(value);
        return parsed == null ? fallback : parsed;
      } catch {
        return fallback;
      }
    };

    const normalizeColorHistory = (value) => {
      const fallback = ["#6366f1", "#14b8a6", "#f43f5e"];
      const parsed = safeJsonParse(value, fallback);
      const valid = Array.isArray(parsed)
        ? parsed.filter(c => typeof c === "string" && /^#[0-9a-f]{6}$/i.test(c))
        : fallback;
      return valid.length ? valid.slice(0, 12) : fallback;
    };

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
    const supported = (expr) => !!expr;
    const nowTime = () => new Date().toLocaleTimeString();
    const bytes = (n) => {
      if (!Number.isFinite(n)) return "Unknown";
      const units = ["B", "KB", "MB", "GB", "TB"];
      let i = 0;
      while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
      return `${n.toFixed(i ? 1 : 0)} ${units[i]}`;
    };

    const hexToRgb = (hex) => {
      const clean = hex.replace("#", "");
      const full = clean.length === 3 ? clean.split("").map(x => x + x).join("") : clean;
      const num = parseInt(full, 16);
      return { r: (num >> 16) & 255, g: (num >> 8) & 255, b: num & 255 };
    };

    const rgbToHsl = ({ r, g, b }) => {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > .5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          default: h = (r - g) / d + 4;
        }
        h /= 6;
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    };

    const copyText = async (text, onDone) => {
      try {
        await navigator.clipboard.writeText(text);
        onDone && onDone("Copied to clipboard", "ok");
      } catch {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        ta.remove();
        onDone && onDone("Copied with fallback", "ok");
      }
    };

    const Icon = ({ name, size = 20, className = "" }) => {
      useEffect(() => {
        if (window.lucide) requestAnimationFrame(() => window.lucide.createIcons());
      });
      return <i data-lucide={name} className={className} style={{ width: size, height: size }} />;
    };

    const Pill = ({ children, tone = "slate" }) => {
      const tones = {
        slate: "border-slate-700 bg-slate-900/60 text-slate-300",
        ok: "border-emerald-500/30 bg-emerald-500/10 text-emerald-300",
        warn: "border-amber-500/30 bg-amber-500/10 text-amber-300",
        bad: "border-rose-500/30 bg-rose-500/10 text-rose-300",
        info: "border-indigo-500/30 bg-indigo-500/10 text-indigo-300"
      };
      return <span className={`inline-flex items-center gap-1 rounded-full border px-2.5 py-1 text-xs font-semibold ${tones[tone] || tones.slate}`}>{children}</span>;
    };

    const Stat = ({ label, value, icon, tone = "indigo" }) => {
      const toneMap = {
        indigo: "text-indigo-300 bg-indigo-500/10 border-indigo-500/20",
        emerald: "text-emerald-300 bg-emerald-500/10 border-emerald-500/20",
        sky: "text-sky-300 bg-sky-500/10 border-sky-500/20",
        amber: "text-amber-300 bg-amber-500/10 border-amber-500/20",
        rose: "text-rose-300 bg-rose-500/10 border-rose-500/20",
        slate: "text-slate-300 bg-slate-800/80 border-slate-700"
      };
      return (
        <div className={`rounded-2xl border p-4 ${toneMap[tone] || toneMap.slate}`}>
          <div className="flex items-center justify-between gap-2">
            <div className="text-xs uppercase tracking-[.18em] opacity-70">{label}</div>
            {icon && <Icon name={icon} size={18} className="opacity-80" />}
          </div>
          <div className="mt-2 text-2xl font-black tracking-tight break-words">{value}</div>
        </div>
      );
    };

    const SectionTitle = ({ icon, title, subtitle, right }) => (
      <div className="mb-4 flex items-start justify-between gap-3">
        <div className="flex items-center gap-3">
          <div className="rounded-xl border border-indigo-500/20 bg-indigo-500/10 p-2 text-indigo-300">
            <Icon name={icon} size={20} />
          </div>
          <div>
            <h3 className="font-black tracking-tight text-slate-100">{title}</h3>
            {subtitle && <p className="text-xs text-slate-500">{subtitle}</p>}
          </div>
        </div>
        {right}
      </div>
    );

    const useInterval = (fn, delay) => {
      const saved = useRef(fn);
      useEffect(() => { saved.current = fn; }, [fn]);
      useEffect(() => {
        if (delay === null) return;
        const id = setInterval(() => saved.current(), delay);
        return () => clearInterval(id);
      }, [delay]);
    };

    const useFps = () => {
      const [fps, setFps] = useState(0);
      useEffect(() => {
        let raf = 0;
        let frames = 0;
        let last = performance.now();
        const tick = (t) => {
          frames++;
          if (t - last >= 1000) {
            setFps(Math.round((frames * 1000) / (t - last)));
            frames = 0;
            last = t;
          }
          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);
      return fps;
    };

    const Toasts = ({ toasts, dismiss }) => (
      <div className="fixed bottom-4 right-4 z-50 flex w-[min(92vw,420px)] flex-col gap-2">
        {toasts.map(t => (
          <div key={t.id} className={`glass rounded-2xl p-4 shadow-2xl ${t.type === "bad" ? "border-rose-500/30" : t.type === "ok" ? "border-emerald-500/30" : "border-indigo-500/30"}`}>
            <div className="flex items-start justify-between gap-3">
              <div className="flex items-start gap-3">
                <div className={`mt-0.5 ${t.type === "bad" ? "text-rose-300" : t.type === "ok" ? "text-emerald-300" : "text-indigo-300"}`}>
                  <Icon name={t.type === "bad" ? "alert-triangle" : t.type === "ok" ? "check-circle-2" : "info"} size={18} />
                </div>
                <div>
                  <div className="text-sm font-bold text-slate-100">{t.title}</div>
                  {t.text && <div className="mt-0.5 text-xs text-slate-400">{t.text}</div>}
                </div>
              </div>
              <button onClick={() => dismiss(t.id)} className="rounded-lg p-1 text-slate-500 hover:bg-slate-800 hover:text-slate-200">
                <Icon name="x" size={16} />
              </button>
            </div>
          </div>
        ))}
      </div>
    );

    function ToolSpeech({ notify }) {
      const [text, setText] = useState(localStorage.getItem(LS.speech) || "System check complete. All systems nominal.");
      const [speaking, setSpeaking] = useState(false);
      const [paused, setPaused] = useState(false);
      const [voices, setVoices] = useState([]);
      const [voiceURI, setVoiceURI] = useState("");
      const [rate, setRate] = useState(1);
      const [pitch, setPitch] = useState(1);
      const [volume, setVolume] = useState(1);

      useEffect(() => {
        const loadVoices = () => setVoices(window.speechSynthesis ? speechSynthesis.getVoices() : []);
        loadVoices();
        if (window.speechSynthesis) speechSynthesis.onvoiceschanged = loadVoices;
        return () => { if (window.speechSynthesis) speechSynthesis.onvoiceschanged = null; };
      }, []);

      useEffect(() => { localStorage.setItem(LS.speech, text); }, [text]);

      const speak = () => {
        if (!("speechSynthesis" in window)) return notify("Speech synthesis unsupported", "Try a Chromium, Edge, or Safari desktop browser.", "bad");
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.trim() || "No text entered.");
        const voice = voices.find(v => v.voiceURI === voiceURI);
        if (voice) u.voice = voice;
        u.rate = rate;
        u.pitch = pitch;
        u.volume = volume;
        u.onstart = () => { setSpeaking(true); setPaused(false); };
        u.onend = () => { setSpeaking(false); setPaused(false); };
        u.onerror = () => { setSpeaking(false); setPaused(false); notify("Speech failed", "The browser could not play the utterance.", "bad"); };
        window.speechSynthesis.speak(u);
      };

      const pauseResume = () => {
        if (!window.speechSynthesis) return;
        if (paused) { speechSynthesis.resume(); setPaused(false); }
        else { speechSynthesis.pause(); setPaused(true); }
      };

      const stop = () => {
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        setSpeaking(false); setPaused(false);
      };

      return (
        <div className="space-y-4">
          <textarea value={text} onChange={e => setText(e.target.value)} className="min-h-[96px] w-full rounded-2xl border border-slate-700 bg-slate-950/70 p-4 text-sm text-slate-100 outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20" rows="4" />
          <div className="grid grid-cols-1 gap-3 md:grid-cols-2">
            <label className="text-xs text-slate-400">Voice
              <select value={voiceURI} onChange={e => setVoiceURI(e.target.value)} className="mt-1 w-full rounded-xl border border-slate-700 bg-slate-950 p-2 text-sm text-slate-200">
                <option value="">Browser default</option>
                {voices.map(v => <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>)}
              </select>
            </label>
            <div className="grid grid-cols-3 gap-2 text-xs text-slate-400">
              <label>Rate <input className="range w-full" type="range" min="0.5" max="2" step="0.05" value={rate} onChange={e => setRate(+e.target.value)} /><span>{rate.toFixed(2)}</span></label>
              <label>Pitch <input className="range w-full" type="range" min="0" max="2" step="0.05" value={pitch} onChange={e => setPitch(+e.target.value)} /><span>{pitch.toFixed(2)}</span></label>
              <label>Vol <input className="range w-full" type="range" min="0" max="1" step="0.05" value={volume} onChange={e => setVolume(+e.target.value)} /><span>{Math.round(volume * 100)}%</span></label>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <button onClick={speak} disabled={speaking && !paused} className="flex items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2 font-bold text-white transition hover:bg-indigo-500 disabled:cursor-not-allowed disabled:opacity-60"><Icon name="volume-2" size={18} />Speak</button>
            <button onClick={pauseResume} disabled={!speaking} className="rounded-xl bg-slate-800 px-4 py-2 font-bold text-slate-200 transition hover:bg-slate-700 disabled:opacity-40">{paused ? "Resume" : "Pause"}</button>
            <button onClick={stop} className="rounded-xl bg-rose-600/80 px-4 py-2 font-bold text-white transition hover:bg-rose-500">Stop</button>
          </div>
        </div>
      );
    }

    function ToolVitals() {
      const fps = useFps();
      const [battery, setBattery] = useState(null);
      const [mem, setMem] = useState(null);
      const [clock, setClock] = useState(nowTime());
      const uaData = navigator.userAgentData;

      useInterval(() => {
        setClock(nowTime());
        if (performance.memory) setMem({ used: performance.memory.usedJSHeapSize, total: performance.memory.totalJSHeapSize, limit: performance.memory.jsHeapSizeLimit });
      }, 1000);

      useEffect(() => {
        let manager = null;
        const update = () => manager && setBattery({
          level: Math.round(manager.level * 100),
          charging: manager.charging,
          chargingTime: manager.chargingTime,
          dischargingTime: manager.dischargingTime
        });
        if (navigator.getBattery) {
          navigator.getBattery().then(b => {
            manager = b;
            update();
            b.addEventListener("chargingchange", update);
            b.addEventListener("levelchange", update);
            b.addEventListener("chargingtimechange", update);
            b.addEventListener("dischargingtimechange", update);
          }).catch(() => {});
        }
        return () => {
          if (manager) {
            manager.removeEventListener("chargingchange", update);
            manager.removeEventListener("levelchange", update);
            manager.removeEventListener("chargingtimechange", update);
            manager.removeEventListener("dischargingtimechange", update);
          }
        };
      }, []);

      const rows = [
        ["CPU threads", navigator.hardwareConcurrency || "Unknown"],
        ["Device memory", navigator.deviceMemory ? `~${navigator.deviceMemory} GB` : "Unknown"],
        ["Touch points", navigator.maxTouchPoints ?? "Unknown"],
        ["Platform", uaData?.platform || navigator.platform || "Unknown"],
        ["Language", navigator.language || "Unknown"],
        ["Screen", `${screen.width} × ${screen.height}`],
        ["Viewport", `${innerWidth} × ${innerHeight}`],
        ["Pixel ratio", window.devicePixelRatio || 1],
        ["Current time", clock]
      ];

      return (
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-3 lg:grid-cols-4">
            <Stat label="Battery" value={battery ? `${battery.level}%` : "N/A"} icon="battery" tone={battery?.charging ? "emerald" : "amber"} />
            <Stat label="State" value={battery ? (battery.charging ? "Charging" : "Battery") : "Unknown"} icon="zap" tone={battery?.charging ? "emerald" : "slate"} />
            <Stat label="FPS" value={fps || "..."} icon="activity" tone="sky" />
            <Stat label="Heap" value={mem ? bytes(mem.used) : "N/A"} icon="database" tone="indigo" />
          </div>
          {mem && <div className="rounded-2xl border border-slate-700 bg-slate-950/50 p-3 text-xs text-slate-400">JS heap: {bytes(mem.used)} used / {bytes(mem.total)} allocated / {bytes(mem.limit)} limit</div>}
          <div className="overflow-hidden rounded-2xl border border-slate-700">
            <table className="w-full text-left text-sm">
              <tbody>{rows.map(([k, v]) => <tr key={k} className="border-b border-slate-800 last:border-0"><td className="bg-slate-900/70 px-3 py-2 text-slate-500">{k}</td><td className="px-3 py-2 font-mono text-slate-200">{String(v)}</td></tr>)}</tbody>
            </table>
          </div>
        </div>
      );
    }

    function ToolColor({ notify }) {
      const [color, setColor] = useState("#6366f1");
      const [history, setHistory] = useState(() => normalizeColorHistory(localStorage.getItem(LS.history)));
      const rgb = hexToRgb(color);
      const hsl = rgbToHsl(rgb);

      const remember = (c) => {
        setColor(c);
        setHistory(prev => {
          const next = [c, ...prev.filter(x => x.toLowerCase() !== c.toLowerCase())].slice(0, 12);
          localStorage.setItem(LS.history, JSON.stringify(next));
          return next;
        });
      };

      const pick = async () => {
        if (!window.EyeDropper) return notify("EyeDropper unsupported", "Use the manual color input or try Chrome/Edge.", "bad");
        try {
          const r = await new EyeDropper().open();
          remember(r.sRGBHex);
        } catch {
          notify("Color pick cancelled", "No screen color was selected.", "info");
        }
      };

      const values = [`HEX ${color}`, `RGB ${rgb.r}, ${rgb.g}, ${rgb.b}`, `HSL ${hsl.h}, ${hsl.s}%, ${hsl.l}%`];

      return (
        <div className="space-y-4">
          <div className="flex items-center gap-4">
            <div className="h-20 w-20 shrink-0 rounded-2xl border-2 border-white/20 shadow-inner" style={{ backgroundColor: color }} />
            <div className="min-w-0 flex-1">
              <input type="color" value={color} onChange={e => remember(e.target.value)} className="h-10 w-full rounded-xl bg-slate-900" />
              <div className="mt-2 grid gap-1 font-mono text-xs text-slate-300">{values.map(v => <button key={v} onClick={() => copyText(v.replace(/^[A-Z]+ /, ""), notify)} className="truncate rounded-lg bg-slate-950/60 px-2 py-1 text-left hover:bg-slate-800">{v}</button>)}</div>
            </div>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <button onClick={pick} className="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-indigo-500">Pick from screen</button>
            <button onClick={() => copyText(color, notify)} className="rounded-xl bg-slate-800 px-4 py-2 text-sm font-bold text-slate-200 transition hover:bg-slate-700">Copy HEX</button>
          </div>
          <div className="grid grid-cols-6 gap-2">{history.map(c => <button key={c} title={c} onClick={() => remember(c)} className="h-9 rounded-xl border border-white/10 hover:scale-105" style={{ backgroundColor: c }} />)}</div>
        </div>
      );
    }

    function ToolGeo({ notify }) {
      const [loc, setLoc] = useState(null);
      const [watching, setWatching] = useState(false);
      const watchId = useRef(null);

      const success = (p) => {
        setLoc({
          lat: p.coords.latitude,
          lng: p.coords.longitude,
          acc: p.coords.accuracy,
          alt: p.coords.altitude,
          speed: p.coords.speed,
          heading: p.coords.heading,
          time: new Date(p.timestamp).toLocaleTimeString()
        });
      };
      const error = (e) => notify("Geolocation failed", e.message || "Permission denied or signal unavailable.", "bad");
      const options = { enableHighAccuracy: true, timeout: 10000, maximumAge: 5000 };

      const get = () => {
        if (!navigator.geolocation) return notify("Geolocation unsupported", "This browser cannot access location APIs.", "bad");
        navigator.geolocation.getCurrentPosition(success, error, options);
      };
      const toggleWatch = () => {
        if (!navigator.geolocation) return notify("Geolocation unsupported", "This browser cannot access location APIs.", "bad");
        if (watching) {
          navigator.geolocation.clearWatch(watchId.current);
          setWatching(false);
        } else {
          watchId.current = navigator.geolocation.watchPosition(success, error, options);
          setWatching(true);
        }
      };
      useEffect(() => () => watchId.current && navigator.geolocation?.clearWatch(watchId.current), []);

      return (
        <div className="space-y-4">
          <div className="rounded-2xl border border-slate-700 bg-slate-950/70 p-4 font-mono text-sm">
            {loc ? <div className="grid grid-cols-2 gap-2">
              <div>LAT <span className="text-emerald-300">{loc.lat.toFixed(6)}</span></div>
              <div>LNG <span className="text-emerald-300">{loc.lng.toFixed(6)}</span></div>
              <div>ACC <span className="text-sky-300">±{Math.round(loc.acc)}m</span></div>
              <div>TIME <span className="text-slate-300">{loc.time}</span></div>

    function ToolAudio({ notify }) {
      const canvasRef = useRef(null);
      const ctxRef = useRef(null);
      const streamRef = useRef(null);
      const animRef = useRef(null);
      const analyserRef = useRef(null);
      const [listening, setListening] = useState(false);
      const [mode, setMode] = useState("bars");
      const [fft, setFft] = useState(128);
      const [level, setLevel] = useState(0);
      const [peak, setPeak] = useState(0);

      const resizeCanvas = () => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(300, Math.floor(rect.width * dpr));
        canvas.height = Math.max(140, Math.floor(rect.height * dpr));
      };

      const stop = () => {
        if (animRef.current) cancelAnimationFrame(animRef.current);
        streamRef.current?.getTracks().forEach(t => t.stop());
        streamRef.current = null;
        if (ctxRef.current && ctxRef.current.state !== "closed") ctxRef.current.close();
        ctxRef.current = null;
        setListening(false);
      };

      const start = async () => {
        if (!navigator.mediaDevices?.getUserMedia) return notify("Microphone unsupported", "getUserMedia is not available.", "bad");
        stop();
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } });
          const actx = new (window.AudioContext || window.webkitAudioContext)();
          const analyser = actx.createAnalyser();
          analyser.fftSize = fft;
          analyser.smoothingTimeConstant = 0.78;
          actx.createMediaStreamSource(stream).connect(analyser);
          ctxRef.current = actx;
          streamRef.current = stream;
          analyserRef.current = analyser;
          setListening(true);
          resizeCanvas();
          draw();
        } catch (e) {
          notify("Microphone access failed", e.message || "HTTPS/localhost and permission are required.", "bad");
        }
      };

      const draw = () => {
        const canvas = canvasRef.current;
        const analyser = analyserRef.current;
        if (!canvas || !analyser) return;
        const ctx = canvas.getContext("2d");
        const w = canvas.width, h = canvas.height;
        const freq = new Uint8Array(analyser.frequencyBinCount);
        const wave = new Uint8Array(analyser.fftSize);

        const loop = () => {
          animRef.current = requestAnimationFrame(loop);
          ctx.fillStyle = "#020617";
          ctx.fillRect(0, 0, w, h);
          ctx.strokeStyle = "rgba(99,102,241,.35)";
          ctx.lineWidth = 1;
          for (let x = 0; x < w; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
          for (let y = 0; y < h; y += 32) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

          if (mode === "wave") {
            analyser.getByteTimeDomainData(wave);
            ctx.lineWidth = Math.max(2, (window.devicePixelRatio || 1) * 2);
            ctx.strokeStyle = "rgb(129,140,248)";
            ctx.beginPath();
            for (let i = 0; i < wave.length; i++) {
              const x = (i / (wave.length - 1)) * w;
              const y = (wave[i] / 255) * h;
              if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            const rms = Math.sqrt(wave.reduce((a, v) => a + Math.pow((v - 128) / 128, 2), 0) / wave.length);
            setLevel(Math.round(rms * 100));
            setPeak(p => Math.max(Math.round(rms * 100), Math.round(p * .98)));
          } else {
            analyser.getByteFrequencyData(freq);
            const avg = freq.reduce((a, b) => a + b, 0) / freq.length;
            setLevel(Math.round(avg / 2.55));
            setPeak(p => Math.max(Math.round(avg / 2.55), Math.round(p * .98)));
            const barW = w / freq.length;
            for (let i = 0; i < freq.length; i++) {
              const barH = (freq[i] / 255) * h;
              const hue = 220 + (i / freq.length) * 70;
              ctx.fillStyle = `hsl(${hue}, 88%, ${48 + (freq[i] / 255) * 18}%)`;
              ctx.fillRect(i * barW, h - barH, Math.max(1, barW - 2), barH);
            }
          }
        };
        loop();
      };

      useEffect(() => { window.addEventListener("resize", resizeCanvas); resizeCanvas(); return () => { window.removeEventListener("resize", resizeCanvas); stop(); }; }, []);
      useEffect(() => { if (listening) start(); }, [fft]);

      return (
        <div className="space-y-3">
          <div className="relative h-44 overflow-hidden rounded-2xl border border-slate-700 bg-slate-950 scanline">
            <canvas ref={canvasRef} className="visualizer-canvas" />
            {!listening && <div className="absolute inset-0 flex items-center justify-center text-xs uppercase tracking-[.3em] text-slate-600">Silence detected</div>}
          </div>
          <div className="grid grid-cols-3 gap-2">
            <Stat label="Level" value={`${level}%`} icon="radio" tone="indigo" />
            <Stat label="Peak" value={`${peak}%`} icon="activity" tone="rose" />
            <Stat label="FFT" value={fft} icon="bar-chart-3" tone="sky" />
          </div>
          <div className="grid grid-cols-1 gap-2 md:grid-cols-3">
            <button onClick={listening ? stop : start} className={`rounded-xl px-4 py-2 text-sm font-bold text-white ${listening ? "bg-rose-600 hover:bg-rose-500" : "bg-indigo-600 hover:bg-indigo-500"}`}>{listening ? "Terminate feed" : "Initialize audio"}</button>
            <select value={mode} onChange={e => setMode(e.target.value)} className="rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200"><option value="bars">Frequency bars</option><option value="wave">Oscilloscope</option></select>
            <select value={fft} onChange={e => setFft(+e.target.value)} className="rounded-xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm text-slate-200"><option value="64">FFT 64</option><option value="128">FFT 128</option><option value="256">FFT 256</option><option value="512">FFT 512</option><option value="1024">FFT 1024</option></select>
          </div>
        </div>
      );
    }

    function ToolPermissions({ notify }) {
      const names = ["geolocation", "camera", "microphone", "notifications", "clipboard-read", "clipboard-write", "idle-detection"];

    function ToolSensors({ notify }) {

      const start = async () => {
        try {
          if (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function") {

            if (res !== "granted") return notify("Sensor permission denied", "Motion/orientation access was not granted.", "bad");
          }
          const onO = e => setOrientation({ alpha: e.alpha, beta: e.beta, gamma: e.gamma, absolute: e.absolute });

          window.addEventListener("devicemotion", onM);

          setActive(true);

      };

    function ToolIdle({ notify }) {

            const perm = await navigator.permissions.query({ name: "idle-detection" });

          }
          const controller = new AbortController();

          controllerRef.current = controller;
          setRunning(true);
        } catch (e) { notify("Idle detection failed", e.message || "Permission or secure context required.", "bad"); }

    function ToolConnectors({ notify }) {
      const [log, setLog] = useState([]);
      const add = (msg) => setLog(prev => [`${nowTime()} · ${msg}`, ...prev].slice(0, 8));
      const requestSerial = async () => {
        if (!navigator.serial?.requestPort) return notify("Web Serial unsupported", "Try a compatible Chromium browser over HTTPS/localhost.", "bad");

        if (!navigator.bluetooth?.requestDevice) return notify("Web Bluetooth unsupported", "Try a compatible Chromium browser over HTTPS/localhost.", "bad");

      const items = [
        ["Serial", "serial", !!navigator.serial, requestSerial],
        ["USB", "usb", !!navigator.usb, requestUsb],
        ["Bluetooth", "bluetooth", !!navigator.bluetooth, requestBluetooth],
        ["MIDI", "music-2", !!navigator.requestMIDIAccess, async () => { try { await navigator.requestMIDIAccess(); add("MIDI access granted"); notify("MIDI ready", "MIDI access was granted.", "ok"); } catch(e) { notify("MIDI blocked", e.message || "Permission denied.", "bad"); } }]
      ];
      return (
        <div className="space-y-3">
          <div className="grid grid-cols-2 gap-2">{items.map(([label, icon, ok, action]) => <button key={label} onClick={action} className={`rounded-2xl border p-3 text-left transition ${ok ? "border-emerald-500/30 bg-emerald-500/10 hover:bg-emerald-500/20" : "border-slate-700 bg-slate-950/60 opacity-75"}`}><div className="flex items-center justify-between"><Icon name={icon} size={18} /><Pill tone={ok ? "ok" : "slate"}>{ok ? "available" : "no"}</Pill></div><div className="mt-2 font-bold text-slate-100">Web {label}</div></button>)}</div>
          <div className="rounded-2xl border border-slate-700 bg-slate-950/60 p-3 text-xs text-slate-400"><div className="mb-2 font-bold text-slate-300">Connector log</div>{log.length ? log.map(x => <div key={x} className="font-mono">{x}</div>) : "No connector actions yet."}</div>
        </div>
      );
    }

    function ToolPageVisibility() {
      const [state, setState] = useState(document.visibilityState);
      const [count, setCount] = useState(0);
      useEffect(() => {
        const on = () => { setState(document.visibilityState); setCount(c => c + 1); };
        document.addEventListener("visibilitychange", on);
        return () => document.removeEventListener("visibilitychange", on);
      }, []);
      return <div className="grid grid-cols-2 gap-3"><Stat label="State" value={state} icon={state === "visible" ? "eye" : "eye-off"} tone={state === "visible" ? "emerald" : "amber"} /><Stat label="Changes" value={count} icon="repeat" tone="indigo" /></div>;
    }

    function ToolNotes({ notify }) {
      const [notes, setNotes] = useState(localStorage.getItem(LS.notes) || "");
      useEffect(() => localStorage.setItem(LS.notes, notes), [notes]);
      const dump = () => {
        const payload = {
          version: APP_VERSION,
          exportedAt: new Date().toISOString(),
          userAgent: navigator.userAgent,
          screen: { width: screen.width, height: screen.height, pixelRatio: devicePixelRatio },
          cores: navigator.hardwareConcurrency,
          memory: navigator.deviceMemory,
          notes
        };
        copyText(JSON.stringify(payload, null, 2), notify);
      };
      return (
        <div className="space-y-3">
          <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Session notes, test results, hardware observations..." className="min-h-[130px] w-full rounded-2xl border border-slate-700 bg-slate-950/70 p-3 text-sm outline-none focus:border-indigo-500" />
          <button onClick={dump} className="w-full rounded-xl bg-indigo-600 px-4 py-2 text-sm font-bold text-white hover:bg-indigo-500">Copy diagnostic JSON</button>
        </div>
      );
    }

    function ActionButton({ icon, title, desc, onClick, supported = true }) {
      return (
        <button onClick={onClick} className={`group flex w-full items-center justify-between rounded-2xl border p-4 text-left transition ${supported ? "border-slate-700 bg-slate-950/60 hover:border-indigo-500/60 hover:bg-slate-900" : "border-slate-800 bg-slate-950/40 opacity-60"}`}>
          <div className="flex items-center gap-3">
            <div className="rounded-xl bg-slate-800 p-2 text-indigo-300 transition group-hover:bg-indigo-500/10"><Icon name={icon} size={20} /></div>
            <div><div className="font-bold text-slate-100">{title}</div><div className="text-xs text-slate-500">{desc}</div></div>
          </div>
          <Icon name="chevron-right" size={17} className="text-slate-600 transition group-hover:translate-x-1 group-hover:text-indigo-300" />
        </button>
      );
    }

    function ToolActions({ notify }) {
      const [ptr, setPtr] = useState(!!document.pointerLockElement);
      useEffect(() => {
        const on = () => setPtr(!!document.pointerLockElement);
        document.addEventListener("pointerlockchange", on);
        return () => document.removeEventListener("pointerlockchange", on);
      }, []);
      const share = async () => {
        if (navigator.share) {
          try { await navigator.share({ title: "Browser Hardware Tools", text: "Standalone hardware/API lab", url: location.href }); notify("Shared", "Native share sheet opened.", "ok"); }
          catch { notify("Share cancelled", "No share was completed.", "info"); }
        } else copyText(location.href, notify);
      };
      const fullscreen = async () => {
        try { document.fullscreenElement ? await document.exitFullscreen() : await document.documentElement.requestFullscreen(); } catch (e) { notify("Fullscreen blocked", e.message, "bad"); }
      };
      const orientation = async () => {
        try {
          if (!screen.orientation?.lock) throw new Error("Orientation lock unsupported.");
          const current = screen.orientation.type.includes("portrait") ? "landscape" : "portrait";
          await screen.orientation.lock(current);
          notify("Orientation lock requested", `Requested ${current}.`, "ok");
        } catch (e) { notify("Orientation lock failed", e.message || "Unsupported.", "bad"); }
      };
      const vibrate = () => {
        if (!navigator.vibrate) return notify("Vibration unsupported", "This device/browser does not expose haptics.", "bad");
        navigator.vibrate([120, 60, 120, 60, 240]);
        notify("Haptic pulse sent", "Vibration pattern requested.", "ok");
      };
      const pointer = () => {
        if (document.pointerLockElement) document.exitPointerLock();
        else document.body.requestPointerLock?.();
      };
      return (
        <div className="grid gap-3 md:grid-cols-2">
          <ActionButton icon="share-2" title="Web Share" desc="Native OS share or URL copy fallback" onClick={share} supported={!!navigator.share || !!navigator.clipboard} />
          <ActionButton icon="maximize" title="Fullscreen" desc="Toggle immersive display mode" onClick={fullscreen} supported={!!document.documentElement.requestFullscreen} />
          <ActionButton icon="smartphone" title="Orientation" desc="Toggle portrait / landscape lock" onClick={orientation} supported={!!screen.orientation?.lock} />
          <ActionButton icon="vibrate" title="Haptics" desc="Send vibration pattern" onClick={vibrate} supported={!!navigator.vibrate} />
          <ActionButton icon="mouse-pointer-2" title={ptr ? "Release Pointer" : "Pointer Lock"} desc="Capture or release cursor" onClick={pointer} supported={!!document.body.requestPointerLock} />
          <ActionButton icon="bell" title="Notification" desc="Request and send test notification" supported={"Notification" in window} onClick={async () => {
            if (!("Notification" in window)) return notify("Notifications unsupported", "Browser cannot display web notifications.", "bad");
            const perm = Notification.permission === "default" ? await Notification.requestPermission() : Notification.permission;
            if (perm === "granted") new Notification("Browser Hardware Tools", { body: "Notification test successful." });
            else notify("Notification not granted", `Permission state: ${perm}`, "bad");
          }} />
        </div>
      );
    }

    function CapabilityRadar() {
      const groups = [
        ["Media", [["Camera/Mic", !!navigator.mediaDevices?.getUserMedia], ["Speech", "speechSynthesis" in window], ["AudioContext", !!(window.AudioContext || window.webkitAudioContext)], ["Screen Capture", !!navigator.mediaDevices?.getDisplayMedia]]],
        ["Sensors", [["Geolocation", !!navigator.geolocation], ["Device Motion", "DeviceMotionEvent" in window], ["Battery", !!navigator.getBattery], ["Wake Lock", !!navigator.wakeLock]]],
        ["System", [["Clipboard", !!navigator.clipboard], ["Permissions", !!navigator.permissions], ["Storage", !!navigator.storage], ["Network Info", !!(navigator.connection || navigator.mozConnection || navigator.webkitConnection)]]],
        ["Hardware I/O", [["WebUSB", !!navigator.usb], ["Web Serial", !!navigator.serial], ["Bluetooth", !!navigator.bluetooth], ["MIDI", !!navigator.requestMIDIAccess]]]
      ];
      const flat = groups.flatMap(g => g[1]);
      const ok = flat.filter(x => x[1]).length;
      return (
        <div className="glass noise rounded-3xl p-5">
          <div className="relative z-10">
            <div className="mb-4 flex flex-wrap items-center justify-between gap-3">
              <div><h2 className="text-lg font-black tracking-tight">Capability Radar</h2><p className="text-xs text-slate-500">Live feature-detection map for this browser context.</p></div>
              <Pill tone="info">{ok}/{flat.length} APIs detected</Pill>
            </div>
            <div className="grid gap-3 md:grid-cols-4">{groups.map(([group, rows]) => (
              <div key={group} className="rounded-2xl border border-slate-700 bg-slate-950/50 p-3">
                <div className="mb-2 text-xs font-black uppercase tracking-[.18em] text-slate-500">{group}</div>
                <div className="space-y-2">{rows.map(([name, available]) => <div key={name} className="flex items-center justify-between gap-2 text-xs"><span className="text-slate-300">{name}</span><Pill tone={available ? "ok" : "slate"}>{available ? "yes" : "no"}</Pill></div>)}</div>
              </div>
            ))}</div>
          </div>
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { error: null };
      }
      static getDerivedStateFromError(error) {
        return { error };
      }
      componentDidCatch(error, info) {
        console.error("Hardware Tools panel crashed:", error, info);
      }
      render() {
        if (this.state.error) {
          return (
            <div className="rounded-2xl border border-rose-500/30 bg-rose-500/10 p-4 text-sm text-rose-200">
              <div className="mb-1 flex items-center gap-2 font-black"><Icon name="alert-triangle" size={18} /> Panel recovered</div>
              <p className="text-xs text-rose-200/80">This tool hit a browser/API data issue, but the rest of the dashboard is still running.</p>
              <button onClick={() => this.setState({ error: null })} className="mt-3 rounded-xl bg-rose-600 px-3 py-2 text-xs font-bold text-white hover:bg-rose-500">Retry panel</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function ToolCard({ tool, notify, index }) {
      const Component = tool.component;
      return (
        <section className={`tool-card glass rounded-3xl p-5 transition hover:-translate-y-0.5 hover:border-indigo-500/40 ${tool.wide ? "lg:col-span-2" : ""}`} style={{ animationDelay: `${Math.min(index * 35, 500)}ms` }}>
          <SectionTitle icon={tool.icon} title={tool.title} subtitle={tool.desc} right={tool.badge && <Pill tone={tool.badgeTone || "info"}>{tool.badge}</Pill>} />
          <ErrorBoundary>
            <Component notify={notify} />
          </ErrorBoundary>
        </section>
      );
    }

    function App() {
      const [query, setQuery] = useState("");
      const [toasts, setToasts] = useState([]);
      const [compact, setCompact] = useState(false);
      const [theme, setTheme] = useState(localStorage.getItem(LS.theme) || "cyber");

      const notify = (title, text = "", type = "info") => {
        const id = Math.random().toString(36).slice(2);
        setToasts(prev => [{ id, title, text, type }, ...prev].slice(0, 4));
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4200);
      };
      const dismiss = id => setToasts(prev => prev.filter(t => t.id !== id));

      useEffect(() => {
        const loader = document.getElementById("loading");
        if (loader) loader.style.display = "none";
      }, []);
      useEffect(() => { localStorage.setItem(LS.theme, theme); }, [theme]);

      const tools = useMemo(() => [
        { id: "audio", title: "Audio Analyzer", desc: "Real-time FFT and oscilloscope visualizer", icon: "music", component: ToolAudio, wide: true, badge: "kept + upgraded" },
        { id: "speech", title: "Speech Synth", desc: "Text-to-speech with voice, pitch, rate and volume", icon: "mic", component: ToolSpeech, badge: "kept" },
        { id: "vitals", title: "System Vitals", desc: "Battery, CPU, memory, display and FPS telemetry", icon: "cpu", component: ToolVitals, wide: true, badge: "expanded" },
        { id: "camera", title: "Visual Sensor", desc: "Camera selector, mirror mode and snapshots", icon: "camera", component: ToolCam, badge: "kept + upgraded" },
        { id: "geo", title: "Geolocation", desc: "One-shot and live GPS watch with accuracy data", icon: "map-pin", component: ToolGeo, badge: "kept + upgraded" },
        { id: "color", title: "Spectral Analysis", desc: "EyeDropper, manual picker, RGB/HSL and palette memory", icon: "eye", component: ToolColor, badge: "kept + upgraded" },
        { id: "permissions", title: "Permission Matrix", desc: "Query camera, mic, location, clipboard and idle states", icon: "shield-check", component: ToolPermissions, badge: "new" },
        { id: "network", title: "Network Monitor", desc: "Online state, connection type, downlink and RTT", icon: "wifi", component: ToolNetwork, badge: "new" },
        { id: "clipboard", title: "Clipboard Console", desc: "Read and write text with permission-safe feedback", icon: "clipboard", component: ToolClipboard, badge: "upgraded" },
        { id: "sensors", title: "Gyroscope Lab", desc: "Orientation and motion readout for mobile devices", icon: "compass", component: ToolSensors, badge: "kept + upgraded" },
        { id: "wake", title: "Screen Wake Lock", desc: "Keep display awake during hardware testing", icon: "sun", component: ToolWakeLock, badge: "new" },
        { id: "storage", title: "Storage Quota", desc: "Estimate local quota and request persistence", icon: "database", component: ToolStorage, badge: "new" },
        { id: "idle", title: "Idle Detector", desc: "Real IdleDetector implementation where supported", icon: "clock", component: ToolIdle, badge: "kept + upgraded" },
        { id: "visibility", title: "Page Visibility", desc: "Live visibility state and change counter", icon: "eye-off", component: ToolPageVisibility, badge: "kept" },
        { id: "connectors", title: "Device Connectors", desc: "Web Serial, USB, Bluetooth and MIDI availability", icon: "plug-zap", component: ToolConnectors, wide: true, badge: "new" },
        { id: "actions", title: "Quick Actions", desc: "Share, fullscreen, orientation, haptics, pointer lock and notification", icon: "wand-2", component: ToolActions, wide: true, badge: "kept + upgraded" },
        { id: "notes", title: "Diagnostic Notes", desc: "Local notes and one-click diagnostic JSON export", icon: "notebook-tabs", component: ToolNotes, badge: "new" }
      ], []);

      const filtered = tools.filter(t => `${t.title} ${t.desc} ${t.id}`.toLowerCase().includes(query.toLowerCase()));
      const themeLabel = theme === "cyber" ? "Cyber" : theme === "dense" ? "Dense" : "Calm";

      return (
        <div className={`mx-auto max-w-7xl p-4 sm:p-6 ${theme === "dense" ? "text-[14px]" : ""}`}>
          <Toasts toasts={toasts} dismiss={dismiss} />
          <header className="mb-6 grid gap-4 rounded-[2rem] border border-slate-800 bg-slate-950/60 p-5 shadow-2xl shadow-black/30 backdrop-blur md:grid-cols-[1fr_auto] md:items-center">
            <div className="flex items-center gap-4">
              <div className="flex h-14 w-14 items-center justify-center rounded-2xl bg-indigo-600 text-white shadow-lg shadow-indigo-900/50" style={{ animation: "glowPulse 3s ease-in-out infinite" }}><Icon name="wrench" size={28} /></div>
              <div>
                <div className="flex flex-wrap items-center gap-2">
                  <h1 className="text-2xl font-black tracking-tight sm:text-3xl">HARDWARE<span className="text-indigo-400">TOOLS</span> PRO</h1>
                  <Pill tone="info">v{APP_VERSION}</Pill>
                </div>
                <p className="mt-1 text-sm text-slate-500">Standalone browser hardware/API control lab. No backend. No build step. Local execution.</p>
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-2">
              <div className="relative">
                <Icon name="search" size={17} className="pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
                <input value={query} onChange={e => setQuery(e.target.value)} placeholder="Filter tools..." className="w-52 rounded-2xl border border-slate-700 bg-slate-950 py-2 pl-9 pr-3 text-sm outline-none transition focus:border-indigo-500" />
              </div>
              <button onClick={() => setCompact(c => !c)} className="rounded-2xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm font-bold text-slate-300 hover:border-indigo-500 hover:text-white"><span className="kbd">C</span> {compact ? "Roomy" : "Compact"}</button>
              <select value={theme} onChange={e => setTheme(e.target.value)} className="rounded-2xl border border-slate-700 bg-slate-950 px-3 py-2 text-sm font-bold text-slate-300 outline-none">
                <option value="cyber">Cyber</option><option value="calm">Calm</option><option value="dense">Dense</option>
              </select>
            </div>
          </header>

          <div className="mb-6 grid gap-4 lg:grid-cols-[1.35fr_.65fr]">
            <CapabilityRadar />
            <div className="glass rounded-3xl p-5">
              <div className="mb-4 flex items-center justify-between"><div><h2 className="text-lg font-black tracking-tight">Mission Panel</h2><p className="text-xs text-slate-500">Fast controls and status summary.</p></div><Pill tone="ok">{navigator.onLine ? "online" : "offline"}</Pill></div>
              <div className="grid gap-3 text-sm">
                <div className="rounded-2xl border border-slate-700 bg-slate-950/60 p-3"><div className="text-xs uppercase tracking-[.18em] text-slate-500">Context</div><div className="mt-1 font-mono text-slate-200">{location.protocol === "https:" || location.hostname === "localhost" ? "Secure API context" : "Some APIs require HTTPS/localhost"}</div></div>
                <div className="rounded-2xl border border-slate-700 bg-slate-950/60 p-3"><div className="text-xs uppercase tracking-[.18em] text-slate-500">Theme</div><div className="mt-1 font-mono text-slate-200">{themeLabel} interface mode</div></div>
                <button onClick={() => notify("System ready", `${filtered.length} tool panels visible.`, "ok")} className="rounded-2xl bg-indigo-600 px-4 py-3 font-bold text-white hover:bg-indigo-500">Run status ping</button>
              </div>
            </div>
          </div>

          <main className={`grid grid-cols-1 gap-4 ${compact ? "lg:grid-cols-3" : "lg:grid-cols-2"}`}>
            {filtered.map((tool, index) => <ToolCard key={tool.id} tool={tool} notify={notify} index={index} />)}
          </main>

          {filtered.length === 0 && <div className="glass rounded-3xl p-10 text-center text-slate-400">No tools match that filter.</div>}

          <footer className="mt-10 flex flex-col items-center justify-between gap-3 border-t border-slate-800 py-6 text-center text-xs text-slate-600 sm:flex-row">
            <div className="font-mono">SYSTEM READY · LOCAL EXECUTION ENVIRONMENT ACTIVE · {new Date().getFullYear()}</div>
            <div className="flex items-center gap-2"><span className="kbd">HTTPS</span><span className="kbd">Localhost</span><span className="kbd">User Gesture Required</span></div>
          </footer>
        </div>
      );
    }

    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "c" && !["INPUT", "TEXTAREA", "SELECT"].includes(document.activeElement.tagName)) {
        const btns = [...document.querySelectorAll("button")].filter(b => b.textContent.includes("Compact") || b.textContent.includes("Roomy"));
        btns[0]?.click();
      }
    });

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
