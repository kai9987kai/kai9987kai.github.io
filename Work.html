<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Dawn Project</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.72);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: #e5eefc;
      --muted: #a9b7d0;
      --accent: #7c3aed;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050816;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #background {
      width: 100%;
      height: 100vh;
      border: none;
      display: block;
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top, rgba(124, 58, 237, 0.18), transparent 35%),
        rgba(2, 6, 23, 0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease;
      z-index: 20;
    }

    #overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      width: min(92vw, 1100px);
      height: min(86vh, 760px);
      transform: translate(-50%, -48%) scale(0.96);
      opacity: 0;
      pointer-events: none;
      transition: transform 280ms ease, opacity 280ms ease;
      z-index: 30;
    }

    #popup.show {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .popup-card {
      width: 100%;
      height: 100%;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .popup-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
    }

    .title-wrap {
      min-width: 0;
    }

    .popup-title {
      margin: 0;
      color: var(--text);
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .popup-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 0.86rem;
      user-select: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      box-shadow: 0 0 12px rgba(124, 58, 237, 0.75);
    }

    .close-button {
      appearance: none;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--danger), #fb7185);
      color: white;
      font-weight: 700;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.92rem;
      box-shadow: 0 10px 22px rgba(239, 68, 68, 0.28);
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    .close-button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .close-button:active {
      transform: translateY(0);
      opacity: 0.92;
    }

    .popup-body {
      flex: 1;
      background: rgba(255,255,255,0.02);
    }

    #popup-content {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: white;
    }

    .intro-badge {
      position: fixed;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.7);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 14px 40px rgba(0,0,0,0.25);
      font-size: 0.9rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .fade-in {
      animation: fadeIn 400ms ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      #popup {
        width: 94vw;
        height: 88vh;
      }

      .popup-header {
        padding: 14px;
        gap: 12px;
        flex-direction: column;
        align-items: stretch;
      }

      .header-actions {
        justify-content: space-between;
      }

      .pill {
        justify-content: center;
        flex: 1;
      }

      .close-button {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <iframe id="background" src="index.html" title="Background content"></iframe>

  <div id="overlay" aria-hidden="true"></div>

  <div id="popup" role="dialog" aria-modal="true" aria-labelledby="popup-title" aria-describedby="popup-desc">
    <div class="popup-card fade-in">
      <div class="popup-header">
        <div class="title-wrap">
          <h1 class="popup-title" id="popup-title">New Dawn Project</h1>
          <p class="popup-subtitle" id="popup-desc">A modern floating panel with smoother interaction and a cleaner interface.</p>
        </div>

        <div class="header-actions">
          <div class="pill"><span class="dot"></span> Live Preview</div>
          <button id="close-button" class="close-button" type="button" aria-label="Close popup">Close</button>
        </div>
      </div>

      <div class="popup-body">
        <iframe
          id="popup-content"
          src="College/index.html"
          title="Popup content"
          loading="lazy"
        ></iframe>
      </div>
    </div>
  </div>

  <div class="intro-badge">Popup opens automatically after 1 second</div>

  <script>
    const popup = document.getElementById('popup');
    const overlay = document.getElementById('overlay');
    const closeButton = document.getElementById('close-button');
    const openDelay = 1000;
    let popupOpen = false;
    let openTimer = null;

    function openPopup() {
      if (popupOpen) return;
      popupOpen = true;
      popup.classList.add('show');
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
      closeButton.focus({ preventScroll: true });
    }

    function closePopup() {
      popupOpen = false;
      popup.classList.remove('show');
      overlay.classList.remove('show');
      document.body.style.overflow = 'hidden';
    }

    closeButton.addEventListener('click', closePopup);
    overlay.addEventListener('click', closePopup);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && popupOpen) {
        closePopup();
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      document.body.style.overflow = 'hidden';
      openTimer = setTimeout(openPopup, openDelay);
    });
  </script>
</body>
</html>
