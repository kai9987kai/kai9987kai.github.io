<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { color-scheme: dark; }
    html { scroll-behavior: smooth; }
    body { margin: 0; background: #020617; }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      12% { transform: scale(1.035); }
      20% { transform: scale(1); }
      32% { transform: scale(1.055); }
      48% { transform: scale(1); }
    }

    @keyframes flowBlue {
      0% { transform: translate(148px, 18px); opacity: 0; }
      10% { opacity: 1; }
      30% { transform: translate(148px, 150px); }
      50% { transform: translate(160px, 300px); }
      65% { transform: translate(190px, 220px); opacity: 1; }
      85% { transform: translate(160px, 110px); opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes flowRed {
      0% { transform: translate(390px, 170px); opacity: 0; }
      15% { opacity: 1; transform: translate(310px, 180px); }
      40% { transform: translate(278px, 350px); }
      60% { transform: translate(278px, 150px); opacity: 1; }
      88% { transform: translate(278px, 48px); opacity: 0; }
      100% { opacity: 0; }
    }

    @keyframes sparkPath {
      0% { stroke-dashoffset: 180; opacity: .3; }
      50% { opacity: 1; }
      100% { stroke-dashoffset: 0; opacity: .35; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes floatSoft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .animate-flow-blue-1 { animation: flowBlue 3s infinite linear; }
    .animate-flow-blue-2 { animation: flowBlue 3s infinite linear; animation-delay: 1.5s; }
    .animate-flow-red-1 { animation: flowRed 3s infinite linear; }
    .animate-flow-red-2 { animation: flowRed 3s infinite linear; animation-delay: 1.5s; }
    .animate-fade-in { animation: fadeIn .35s cubic-bezier(.16, 1, .3, 1) both; }
    .shadow-glow { filter: drop-shadow(0 0 7px rgba(255,255,255,.8)); }
    .path-spark { stroke-dasharray: 16 12; animation: sparkPath 2.8s infinite linear; }
    .soft-float { animation: floatSoft 4s infinite ease-in-out; }

    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,.04); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.22); border-radius: 999px; }

    .glass {
      background: linear-gradient(145deg, rgba(15,23,42,.82), rgba(30,41,59,.58));
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 22px 60px rgba(0,0,0,.28);
      backdrop-filter: blur(18px);
    }

    .focus-ring:focus-visible {
      outline: 3px solid rgba(56,189,248,.9);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>

    function useTone() {
      const ctxRef = useRef(null);
      const playTone = (frequency = 880, duration = .06, gain = .08) => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          const ctx = ctxRef.current || new AudioContext();
          ctxRef.current = ctx;
          const osc = ctx.createOscillator();
          const vol = ctx.createGain();
          osc.frequency.value = frequency;
          vol.gain.value = gain;
          osc.connect(vol);
          vol.connect(ctx.destination);
          osc.start();
          osc.stop(ctx.currentTime + duration);
        } catch (e) {
          console.warn("Audio unavailable", e);
        }
      };
      return playTone;
    }



    async function playPCMAudio(base64Audio, sampleRate = 24000) {
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioContext = new AudioContext();
        const binaryString = window.atob(base64Audio);
        const bytes = new Uint8Array(binaryString.length);
        for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
        const int16Array = new Int16Array(bytes.buffer);
        const float32Array = new Float32Array(int16Array.length);
        for (let i = 0; i < int16Array.length; i++) float32Array[i] = int16Array[i] / 32768;
        const buffer = audioContext.createBuffer(1, float32Array.length, sampleRate);
        buffer.getChannelData(0).set(float32Array);
        const source = audioContext.createBufferSource();
        source.buffer = buffer;
        source.connect(audioContext.destination);
        source.start(0);
        return source;
      } catch (e) {
        console.warn("PCM audio playback unavailable", e);
        return null;
      }
    }

    function ECGMonitor({ bpm, isBeating, rhythm, highContrast }) {
      const canvasRef = useRef(null);
      const rafRef = useRef(null);
      const stateRef = useRef({ x: 0, y: 50, lastBeat: 0, qrsIndex: -1, nextInterval: 800 });

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext("2d");
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(700, Math.floor(rect.width * dpr));
        canvas.height = Math.max(110, Math.floor(rect.height * dpr));
        ctx.scale(dpr, dpr);

        const width = canvas.width / dpr;
        const height = canvas.height / dpr;
        const baseY = height / 2;
        const shape = [0, 0, -4, 3, 0, 0, 10, -35, 21, 4, 0, 0, -3, 0, 7, 11, 8, 2, 0, 0];

        const draw = (t) => {
          const s = stateRef.current;
          ctx.fillStyle = highContrast ? "rgba(2,6,23,.18)" : "rgba(15,23,42,.12)";
          ctx.fillRect(0, 0, width, height);

          const cfg = RHYTHMS[rhythm] || RHYTHMS.sinus;
          const effectiveBpm = Math.max(35, Math.min(210, bpm + cfg.bpmBias));
          const baseInterval = 60000 / effectiveBpm;

          if (!isBeating) {
            s.qrsIndex = -1;
          } else if (t - s.lastBeat > s.nextInterval) {
            s.lastBeat = t;
            s.qrsIndex = 0;
            const jitter = (Math.random() - .5) * cfg.jitter * baseInterval * 2;
            s.nextInterval = Math.max(260, baseInterval + jitter);
          }

          let wave = Math.sin(t / 260) * 1.2 + (Math.random() - .5) * 1.2;
          if (s.qrsIndex >= 0 && s.qrsIndex < shape.length) {
            wave += shape[s.qrsIndex] * cfg.qrs;
            s.qrsIndex += 1;
          } else {
            s.qrsIndex = -1;
          }

          const nextY = baseY + wave;
          const nextX = s.x + 2.7;
          if (nextX > width) {
            s.x = 0;
            s.y = nextY;
          }

          ctx.beginPath();
          ctx.moveTo(s.x, s.y);
          ctx.lineTo(nextX, nextY);
          ctx.strokeStyle = highContrast ? "#bef264" : "#34d399";
          ctx.lineWidth = 2.2;
          ctx.shadowBlur = 7;
          ctx.shadowColor = highContrast ? "#bef264" : "#34d399";
          ctx.stroke();

          s.x = nextX > width ? 0 : nextX;
          s.y = nextY;

          rafRef.current = requestAnimationFrame(draw);
        };

        rafRef.current = requestAnimationFrame(draw);
        return () => cancelAnimationFrame(rafRef.current);
      }, [bpm, isBeating, rhythm, highContrast]);

      return (
        <div className="relative h-28 overflow-hidden rounded-2xl border border-emerald-300/20 bg-slate-950 shadow-inner">
          <div className="absolute left-3 top-2 z-10 flex items-center gap-2 font-mono text-[10px] font-black tracking-widest text-emerald-300">
            <span className={cls("h-2 w-2 rounded-full", isBeating ? "animate-pulse bg-emerald-400" : "bg-red-500")}></span>
            ECG MONITOR LIVE · {RHYTHMS[rhythm]?.label || "Rhythm"}
          </div>
          <div className="absolute right-3 top-2 z-10 font-mono text-[10px] text-slate-400">{bpm} BPM CONTROL</div>
          <canvas ref={canvasRef} className="h-full w-full opacity-90" />
          <div
            className="pointer-events-none absolute inset-0"
            style={{
              backgroundImage: "linear-gradient(rgba(16,185,129,.11) 1px, transparent 1px), linear-gradient(90deg, rgba(16,185,129,.11) 1px, transparent 1px)",
              backgroundSize: "20px 20px"
            }}
          ></div>
        </div>
      );
    }

    function CPRPanel() {
      const [rate, setRate] = useLocalState("dr-cardio-cpr-rate", 110);
      const [running, setRunning] = useState(false);
      const [elapsed, setElapsed] = useState(0);
      const [cycles, setCycles] = useState(0);
      const playTone = useTone();

      useEffect(() => {
        if (!running) return;
        const beatMs = 60000 / rate;
        const tone = setInterval(() => {
          setCycles(c => c + 1);
          playTone(900, .045, .065);
        }, beatMs);

        const timer = setInterval(() => setElapsed(v => v + 1), 1000);
        return () => { clearInterval(tone); clearInterval(timer); };
      }, [running, rate]);

      const reset = () => {
        setRunning(false);
        setElapsed(0);
        setCycles(0);
      };

      const twoMinuteWarning = elapsed > 0 && elapsed % 120 >= 110;

      return (
        <div className="flex h-full flex-col gap-4">
          <Card>
            <Tag tone="amber">Practice tool</Tag>
            <h2 className="mt-3 text-3xl font-black text-white">CPR Metronome Trainer</h2>
            <p className="mt-1 text-sm leading-relaxed text-slate-400">Training aid only. In a real emergency in the UK, call 999 and follow dispatcher instructions.</p>
          </Card>

          <Card className="flex-1">
            <div className={cls("rounded-3xl border p-5", twoMinuteWarning ? "border-amber-300/50 bg-amber-500/15" : "border-white/10 bg-white/[.04]")}>

                <div>
                  <p className="text-xs font-black uppercase tracking-widest text-slate-400">Target rhythm</p>
                  <h3 className="mt-1 text-5xl font-black tabular-nums text-white">{rate}</h3>
                  <p className="text-sm text-slate-400">compressions/min</p>
                </div>
                <div className={cls("grid h-24 w-24 place-items-center rounded-full border text-center", running ? "animate-pulse border-rose-300/40 bg-rose-500/20 text-rose-100" : "border-white/10 bg-slate-950 text-slate-400")}>
                  <HeartPulse size={42} />
                </div>
              </div>

              <input
                type="range"
                min="100"
                max="120"
                value={rate}
                onChange={e => setRate(Number(e.target.value))}
                className="mt-5 w-full accent-amber-300"
              />

              <div className="mt-4 grid grid-cols-2 gap-3">
                <div className="rounded-2xl bg-slate-950/60 p-4">
                  <p className="text-xs font-black uppercase tracking-widest text-slate-500">Elapsed</p>
                  <p className="mt-1 font-mono text-2xl text-white">{String(Math.floor(elapsed / 60)).padStart(2, "0")}:{String(elapsed % 60).padStart(2, "0")}</p>
                </div>
                <div className="rounded-2xl bg-slate-950/60 p-4">
                  <p className="text-xs font-black uppercase tracking-widest text-slate-500">Beats</p>
                  <p className="mt-1 font-mono text-2xl text-white">{cycles}</p>
                </div>
              </div>

              {twoMinuteWarning && (
                <p className="mt-4 rounded-2xl border border-amber-300/30 bg-amber-400/10 p-3 text-sm font-bold text-amber-100">
                  Practice reminder: rescuer fatigue can reduce compression quality. Rotate during training when safe and possible.
                </p>
              )}

              <div className="mt-5 grid grid-cols-2 gap-3">
                <Button tone="rose" active={running} onClick={() => setRunning(!running)}>
                  {running ? <Pause size={16} /> : <Play size={16} />} {running ? "Pause" : "Start"}
                </Button>
                <Button tone="slate" onClick={reset}><TimerReset size={16} /> Reset</Button>

            </div>

            <div className="mt-5 rounded-2xl border border-sky-300/15 bg-sky-500/10 p-4 text-sm leading-relaxed text-sky-100">

    function QuizPanel({ apiKey }) {
      const [quiz, setQuiz] = useState(QUIZ_BANK[0]);
      const [answer, setAnswer] = useState(null);
      const [loading, setLoading] = useState(false);
      const [history, setHistory] = useLocalState("dr-cardio-quiz-history", []);

      const nextLocal = () => {
        const currentIdx = QUIZ_BANK.findIndex(q => q.question === quiz.question);
        setQuiz(QUIZ_BANK[(currentIdx + 1 + Math.floor(Math.random() * (QUIZ_BANK.length - 1))) % QUIZ_BANK.length]);
        setAnswer(null);
      };

      const generateAI = async () => {
        if (!apiKey.trim()) return nextLocal();
        setLoading(true);
        setAnswer(null);
        try {
          const prompt = `Generate one medically accurate educational multiple-choice quiz question about heart anatomy, blood flow, ECG basics, CPR basics, or cardiovascular prevention. Return only strict JSON with fields: question:string, options:array of 4 strings, correctIndex:integer 0-3, explanation:string. No markdown.`;
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${encodeURIComponent(apiKey.trim())}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }],
              generationConfig: { responseMimeType: "application/json", temperature: .45 }
            })
          });
          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          const parsed = JSON.parse(text);
          if (parsed?.question && parsed?.options?.length === 4 && Number.isInteger(parsed.correctIndex)) setQuiz(parsed);
          else nextLocal();
        } catch {
          nextLocal();
        } finally {
          setLoading(false);
        }
      };

      const choose = (idx) => {
        if (answer !== null) return;
        setAnswer(idx);
        setHistory([...history.slice(-24), { at: new Date().toISOString(), ok: idx === quiz.correctIndex, question: quiz.question }]);
      };

      const correct = history.filter(h => h.ok).length;
      const accuracy = history.length ? Math.round((correct / history.length) * 100) : 0;

      return (
        <div className="flex h-full flex-col gap-4">
          <Card>
            <Tag tone="indigo">Assessment</Tag>
            <h2 className="mt-3 text-3xl font-black text-white">Adaptive Quiz Mode</h2>
            <p className="mt-1 text-sm text-slate-400">Active recall beats passive reading. Use local questions or AI-generated ones.</p>
          </Card>

          <Card className="flex-1">
            <div className="mb-4 grid grid-cols-3 gap-3">
              <div className="rounded-2xl bg-slate-950/60 p-3 text-center">
                <p className="text-xs font-black uppercase text-slate-500">Answered</p>
                <p className="font-mono text-2xl text-white">{history.length}</p>
              </div>
              <div className="rounded-2xl bg-slate-950/60 p-3 text-center">
                <p className="text-xs font-black uppercase text-slate-500">Correct</p>
                <p className="font-mono text-2xl text-emerald-300">{correct}</p>
              </div>
              <div className="rounded-2xl bg-slate-950/60 p-3 text-center">
                <p className="text-xs font-black uppercase text-slate-500">Accuracy</p>
                <p className="font-mono text-2xl text-sky-300">{accuracy}%</p>
              </div>
            </div>

            <div className="rounded-3xl border border-white/10 bg-white/[.04] p-5">
              <div className="mb-3 flex items-center justify-between">
                <span className="text-xs font-black uppercase tracking-widest text-indigo-300">Question</span>
                {loading && <Loader2 className="animate-spin text-indigo-300" size={18} />}
              </div>
              <h3 className="text-xl font-black leading-tight text-white">{quiz.question}</h3>

              <div className="mt-5 space-y-3">
                {quiz.options.map((option, idx) => {
                  const chosen = answer === idx;
                  const isCorrect = idx === quiz.correctIndex;
                  return (
                    <button
                      key={option + idx}
                      onClick={() => choose(idx)}
                      disabled={answer !== null}
                      className={cls(
                        "focus-ring w-full rounded-2xl border p-4 text-left transition-all",
                        answer === null ? "border-white/10 bg-slate-950/45 hover:border-indigo-300/40 hover:bg-indigo-500/10" :
                        isCorrect ? "border-emerald-300/50 bg-emerald-500/15" :
                        chosen ? "border-rose-300/50 bg-rose-500/15" :
                        "border-white/5 bg-slate-950/30 opacity-55"
                      )}
                    >
                      <div className="flex items-center gap-3">
                        <span className={cls("grid h-7 w-7 shrink-0 place-items-center rounded-full border text-xs font-black", answer !== null && isCorrect ? "border-emerald-300 bg-emerald-400 text-slate-950" : answer !== null && chosen ? "border-rose-300 bg-rose-400 text-white" : "border-white/20 text-slate-400")}>
                          {String.fromCharCode(65 + idx)}
                        </span>
                        <span className="font-semibold text-slate-100">{option}</span>
                      </div>
                    </button>
                  );
                })}
              </div>

              {answer !== null && (
                <div className="mt-5 animate-fade-in rounded-2xl border border-white/10 bg-slate-950/60 p-4">
                  <h4 className="mb-2 flex items-center gap-2 font-black text-white">
                    {answer === quiz.correctIndex ? <CheckCircle className="text-emerald-300" size={20} /> : <XCircle className="text-rose-300" size={20} />}
                    Explanation
                  </h4>
                  <p className="text-sm leading-relaxed text-slate-300">{quiz.explanation}</p>
                </div>
              )}

              <div className="mt-5 grid grid-cols-2 gap-3">
                <Button tone="indigo" onClick={generateAI}>{apiKey.trim() ? "Generate New Question ✨" : "Generate New Question ✨"} <ArrowRight size={16} /></Button>
                <Button tone="slate" onClick={() => setHistory([])}><RotateCcw size={16} /> Reset stats</Button>
              </div>
            </div>
          </Card>
        </div>
      );
    }

    function NotesPanel({ selectedPart }) {
      const [notes, setNotes] = useLocalState("dr-cardio-notes", "");
      const [flashcards, setFlashcards] = useLocalState("dr-cardio-flashcards", []);

      const addFlashcard = () => {
        if (!selectedPart) return;
        const card = {
          id: Date.now(),
          front: `What does the ${selectedPart.name} do?`,
          back: selectedPart.description,
          confidence: 0
        };
        setFlashcards([card, ...flashcards]);
      };

      const exportData = () => {
        const payload = { notes, flashcards, exportedAt: new Date().toISOString(), app: "Dr. Cardio Pro" };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "dr-cardio-learning-notes.json";
        a.click();
        URL.revokeObjectURL(url);
      };

      const importData = (file) => {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const payload = JSON.parse(reader.result);
            if (typeof payload.notes === "string") setNotes(payload.notes);
            if (Array.isArray(payload.flashcards)) setFlashcards(payload.flashcards);
          } catch {
            alert("Could not import that JSON file.");
          }
        };
        reader.readAsText(file);
      };

      return (
        <div className="flex h-full flex-col gap-4">
          <Card>
            <Tag tone="slate">Study tools</Tag>
            <h2 className="mt-3 text-3xl font-black text-white">Notes + Flashcards</h2>
            <p className="mt-1 text-sm text-slate-400">Keep your learning local and export it as JSON.</p>
          </Card>

    function ChallengePanel({ selectedKey, setSelectedKey }) {
      const keys = Object.keys(PARTS).filter(k => !["coronaryArteries", "conductionSystem"].includes(k));
      const [target, setTarget] = useLocalState("dr-cardio-challenge-target", keys[0]);
      const [stats, setStats] = useLocalState("dr-cardio-challenge-stats", { tries: 0, correct: 0 });
      const selectedPart = selectedKey ? PARTS[selectedKey] : null;
      const targetPart = PARTS[target];

      const nextTarget = () => {
        const next = keys[Math.floor(Math.random() * keys.length)];
        setTarget(next === target ? keys[(keys.indexOf(next) + 1) % keys.length] : next);
        setSelectedKey(null);
      };

      const check = () => {
        const ok = selectedKey === target;
        setStats({ tries: stats.tries + 1, correct: stats.correct + (ok ? 1 : 0) });
        if (ok) setTimeout(nextTarget, 500);
      };

      const accuracy = stats.tries ? Math.round((stats.correct / stats.tries) * 100) : 0;

      return (
        <div className="flex h-full flex-col gap-4">
          <Card>
            <Tag tone="indigo">Game tool</Tag>
            <h2 className="mt-3 text-3xl font-black text-white">Label Challenge</h2>

    function App() {
      const [selectedKey, setSelectedKey] = useState(null);
      const [isBeating, setIsBeating] = useLocalState("dr-cardio-is-beating", false);
      const [showBloodFlow, setShowBloodFlow] = useLocalState("dr-cardio-flow", true);
      const [bpm, setBpm] = useLocalState("dr-cardio-bpm", 70);
      const [mode, setMode] = useLocalState("dr-cardio-mode", "explore");
      const [rhythm, setRhythm] = useLocalState("dr-cardio-rhythm", "sinus");
      const [journeyStep, setJourneyStep] = useLocalState("dr-cardio-journey-step", 0);
      const [apiKey, setApiKey] = useLocalState("dr-cardio-api-key", "");
      const [aiResponse, setAiResponse] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);
      const [highContrast, setHighContrast] = useLocalState("dr-cardio-high-contrast", false);
      const [overlays, setOverlays] = useLocalState("dr-cardio-overlays", { coronary: true, conduction: true });

      const selectedPart = selectedKey ? PARTS[selectedKey] : null;

      const modes = [
        { key: "explore", label: "Explore", icon: Stethoscope, tone: "rose" },
        { key: "journey", label: "Flow", icon: Route, tone: "blue" },
        { key: "rhythm", label: "ECG", icon: Waves, tone: "emerald" },
        { key: "cycle", label: "Cycle", icon: TimerReset, tone: "blue" },
        { key: "vitals", label: "Vitals", icon: Gauge, tone: "emerald" },
        { key: "sounds", label: "Sounds", icon: Volume2, tone: "rose" },
        { key: "challenge", label: "Labels", icon: Target, tone: "indigo" },
        { key: "cpr", label: "CPR", icon: HeartPulse, tone: "amber" },
        { key: "health", label: "LE8", icon: ListChecks, tone: "emerald" },
        { key: "risk", label: "Risk", icon: ShieldAlert, tone: "amber" },
        { key: "meds", label: "Meds", icon: ClipboardCheck, tone: "blue" },
        { key: "cases", label: "Cases", icon: FileText, tone: "rose" },
        { key: "quiz", label: "Quiz", icon: Brain, tone: "indigo" },
        { key: "notes", label: "Notes", icon: BookOpen, tone: "slate" },
        { key: "emergency", label: "999", icon: Siren, tone: "rose" },
        { key: "research", label: "Research", icon: FileText, tone: "amber" }
      ];

      const renderPanel = () => {
        if (mode === "journey") return <JourneyPanel step={journeyStep} setStep={setJourneyStep} setSelectedKey={setSelectedKey} />;
        if (mode === "rhythm") return <RhythmPanel rhythm={rhythm} setRhythm={setRhythm} bpm={bpm} setBpm={setBpm} isBeating={isBeating} setIsBeating={setIsBeating} />;
        if (mode === "cycle") return <CyclePanel />;
        if (mode === "vitals") return <VitalsPanel />;
        if (mode === "sounds") return <SoundPanel />;
        if (mode === "challenge") return <ChallengePanel selectedKey={selectedKey} setSelectedKey={setSelectedKey} />;
        if (mode === "cpr") return <CPRPanel />;
        if (mode === "health") return <HealthPanel />;
        if (mode === "risk") return <RiskPanel />;
        if (mode === "meds") return <MedsPanel />;
        if (mode === "cases") return <CasePanel />;
        if (mode === "quiz") return <QuizPanel apiKey={apiKey} />;
        if (mode === "notes") return <NotesPanel selectedPart={selectedPart} />;
        if (mode === "emergency") return <EmergencyPanel />;
        if (mode === "research") return <ResearchPanel />;
        return <ExplorePanel selectedPart={selectedPart} setSelectedKey={setSelectedKey} apiKey={apiKey} setApiKey={setApiKey} aiResponse={aiResponse} setAiResponse={setAiResponse} aiLoading={aiLoading} setAiLoading={setAiLoading} />;
      };

      return (
        <main className={cls("min-h-screen overflow-hidden font-sans", highContrast ? "bg-black text-white" : "bg-[radial-gradient(circle_at_top_left,#1e1b4b_0,#020617_38%,#020617_100%)] text-slate-100")}>
          <div className="flex min-h-screen flex-col xl:flex-row">
            <section className="relative flex min-h-[58vh] w-full flex-col justify-between overflow-hidden border-b border-white/10 bg-slate-950/40 p-4 xl:min-h-screen xl:w-[64%] xl:border-b-0 xl:border-r">
              <div className="pointer-events-none absolute inset-0 opacity-20" style={{ backgroundImage: "radial-gradient(circle at 20% 10%, rgba(244,63,94,.34), transparent 30%), radial-gradient(circle at 80% 0%, rgba(14,165,233,.25), transparent 28%)" }}></div>

              <div className="relative z-20 flex flex-wrap items-start justify-between gap-3">
                <div className="glass rounded-3xl p-4">
                  <div className="flex items-center gap-3">
                    <div className="grid h-12 w-12 place-items-center rounded-2xl bg-rose-500/15 text-rose-200">
                      <Heart className="fill-rose-500 text-rose-500" size={30} />
                    </div>
                    <div>
                      <h1 className="text-2xl font-black tracking-tight text-white md:text-3xl">Dr. Cardio Pro</h1>
                      <p className="text-xs font-bold uppercase tracking-[.22em] text-slate-400">Interactive AI heart learning lab</p>
                    </div>
                  </div>
                </div>

                <div className="glass flex flex-wrap gap-2 rounded-3xl p-3">
                  <Button tone="rose" active={isBeating} onClick={() => setIsBeating(!isBeating)}>
                    <Activity size={16} /> {isBeating ? "Stop Heart" : "Start Heart"}
                  </Button>
                  <Button tone="blue" active={showBloodFlow} onClick={() => setShowBloodFlow(!showBloodFlow)}>
                    <Droplet size={16} /> {showBloodFlow ? "Hide Flow" : "Show Flow"}
                  </Button>
                  <Button tone="amber" active={overlays.coronary} onClick={() => setOverlays({ ...overlays, coronary: !overlays.coronary })}>
                    <Target size={16} /> Coronary
                  </Button>
                  <Button tone="indigo" active={overlays.conduction} onClick={() => setOverlays({ ...overlays, conduction: !overlays.conduction })}>
                    <Cable size={16} /> Electrical
                  </Button>
                  <Button tone="slate" active={highContrast} onClick={() => setHighContrast(!highContrast)}>
                    <Accessibility size={16} /> Contrast
                  </Button>
                </div>
              </div>

              <div className="relative z-10 flex flex-1 items-center justify-center py-5">
                <HeartSvg
                  selectedKey={selectedKey}
                  setSelectedKey={setSelectedKey}
                  showBloodFlow={showBloodFlow}
                  isBeating={isBeating}
                  bpm={bpm}
                  overlays={overlays}
                  journeyStep={mode === "journey" ? journeyStep : -1}
                  highContrast={highContrast}
                />
              </div>

              <div className="relative z-20 grid gap-3">
                <ECGMonitor bpm={bpm} isBeating={isBeating} rhythm={rhythm} highContrast={highContrast} />

                <div className="glass grid gap-3 rounded-3xl p-3 md:grid-cols-[1fr_auto] md:items-center">
                  <div>
                    <div className="mb-1 flex justify-between text-xs font-black uppercase tracking-widest text-slate-400">
                      <span>HEART RATE</span>
                      <span className="font-mono text-emerald-300">{bpm} BPM</span>
                    </div>
                    <input type="range" min="40" max="180" value={bpm} onChange={e => setBpm(Number(e.target.value))} className="w-full accent-emerald-400" />
                  </div>
                  <div className="flex gap-2">
                    {[60, 70, 110, 150].map(v => (
                      <button key={v} onClick={() => setBpm(v)} className="focus-ring rounded-xl border border-white/10 bg-white/5 px-3 py-2 font-mono text-xs font-black text-slate-200 hover:bg-white/10">{v}</button>
                    ))}
                  </div>
                </div>
              </div>
            </section>

            <aside className="flex h-[42vh] w-full flex-col border-white/10 bg-slate-900/80 p-4 xl:h-screen xl:w-[36%]">
              <nav className="mb-4 grid grid-cols-3 gap-2 sm:grid-cols-5 xl:grid-cols-4" aria-label="Learning modes">
                {modes.map(item => {
                  const Icon = item.icon;
                  return (
                    <button
                      key={item.key}
                      onClick={() => setMode(item.key)}
                      className={cls("focus-ring rounded-2xl border p-3 text-xs font-black uppercase tracking-wider transition-all", mode === item.key ? "border-white/25 bg-white text-slate-950 shadow-lg" : "border-white/10 bg-white/[.04] text-slate-300 hover:bg-white/[.08]")}
                    >
                      <Icon className="mx-auto mb-1" size={18} />
                      {item.label}
                    </button>
                  );
                })}
              </nav>

              <div className="min-h-0 flex-1 overflow-y-auto pr-1 custom-scrollbar">
                {renderPanel()}
              </div>

              <footer className="mt-3 rounded-2xl border border-white/10 bg-slate-950/65 p-3 text-center text-[10px] font-bold uppercase tracking-widest text-slate-500">
                Educational module only · Not a medical device · For symptoms, use NHS/999 guidance
              </footer>
            </aside>
          </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
