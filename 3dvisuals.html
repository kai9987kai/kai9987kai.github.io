<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enhanced 3D Visual Looping Animation - Advanced</title>
  <style>
    :root {
      --bg: #02030a;
      --panel: rgba(7, 11, 24, 0.72);
      --panel-strong: rgba(10, 16, 35, 0.9);
      --line: rgba(115, 210, 255, 0.28);
      --text: #eef7ff;
      --muted: #95a7bd;
      --accent: #00ffad;
      --accent-2: #6aa8ff;
      --danger: #ff5577;
      --warning: #ffd166;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.48);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 45%, #07132d 0%, #02030a 48%, #000 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
    }

    canvas { display: block; }

    .loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(0, 255, 173, 0.15), transparent 35%),
        linear-gradient(135deg, #000, #06102a 60%, #000);
      color: white;
      z-index: 20;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .loading-card {
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: 28px 34px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(4, 8, 18, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .spinner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: var(--accent);
      border-right-color: var(--accent-2);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hud {
      position: fixed;
      top: 14px;
      left: 14px;
      width: min(370px, calc(100vw - 28px));
      z-index: 10;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    .hud-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(0, 255, 173, 0.14), rgba(106, 168, 255, 0.1));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title {
      display: grid;
      gap: 2px;
    }

    .title strong {
      font-size: 0.95rem;
      letter-spacing: 0.02em;
    }

    .title span {
      color: var(--muted);
      font-size: 0.74rem;
    }

    .pill {
      padding: 5px 9px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      color: #cefbff;
      background: rgba(255, 255, 255, 0.06);
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .hud-body {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .metric {
      min-width: 0;
      padding: 9px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.045);
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-size: 0.66rem;
      margin-bottom: 4px;
    }

    .metric b {
      display: block;
      font-variant-numeric: tabular-nums;
      font-size: 0.88rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 96px 1fr 48px;
      align-items: center;
      gap: 8px;
      color: #dcecff;
      font-size: 0.78rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .value {
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    button, select {
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 9px 10px;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
      font-weight: 700;
      font-size: 0.76rem;
    }

    button:hover, select:hover {
      transform: translateY(-1px);
      border-color: rgba(0, 255, 173, 0.45);
      background: rgba(0, 255, 173, 0.1);
    }

    button.active {
      border-color: rgba(0, 255, 173, 0.7);
      background: rgba(0, 255, 173, 0.16);
      box-shadow: 0 0 20px rgba(0, 255, 173, 0.12) inset;
    }

    .wide { grid-column: span 2; }

    .hint {
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.45;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      padding-top: 10px;
    }

    .event-log {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 9;
      display: grid;
      gap: 6px;
      width: min(360px, calc(100vw - 28px));
      pointer-events: none;
    }

    .toast {
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      background: rgba(5, 9, 18, 0.76);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      color: #daf8ff;
      font-size: 0.78rem;
      backdrop-filter: blur(12px);
      animation: toastIn 0.24s ease-out, toastOut 0.4s ease-in 3.8s forwards;
    }

    @keyframes toastIn {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes toastOut {
      to { transform: translateY(10px); opacity: 0; }
    }

    .minimap {
      position: fixed;
      right: 14px;
      top: 14px;
      width: 160px;
      height: 160px;
      z-index: 8;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      overflow: hidden;
    }

    #miniCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background:
        linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.025), transparent),
        repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(255, 255, 255, 0.025) 4px);
      mix-blend-mode: screen;
      opacity: 0.28;
    }

    .hidden { display: none !important; }

    @media (max-width: 720px) {
      .hud {
        width: calc(100vw - 20px);
        left: 10px;
        top: 10px;
      }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .row { grid-template-columns: 80px 1fr 42px; }
      .minimap { width: 116px; height: 116px; top: auto; bottom: 14px; }
      .event-log { display: none; }
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="loading-card">
      <div class="spinner"></div>
      <div>Building Visual Loop</div>
    </div>
  </div>

  <section class="hud" id="hud">
    <div class="hud-header">
      <div class="title">
        <strong>3D Visual Loop Engine</strong>
        <span>Collision splashes, trails, orbit camera, particle field</span>
      </div>
      <div class="pill" id="statePill">LIVE</div>
    </div>

    <div class="hud-body">
      <div class="metrics">
        <div class="metric"><small>FPS</small><b id="fps">0</b></div>
        <div class="metric"><small>Splashes</small><b id="activeSplashes">0</b></div>
        <div class="metric"><small>Hits</small><b id="hitCount">0</b></div>
        <div class="metric"><small>Speed</small><b id="speedLabel">0.03</b></div>
      </div>

      <div class="controls">
        <label class="row">
          <span>Speed</span>
          <input id="speed" type="range" min="0.005" max="0.12" step="0.005" value="0.03" />
          <span class="value" id="speedValue">0.03</span>
        </label>
        <label class="row">
          <span>Bounds</span>
          <input id="bounds" type="range" min="1.4" max="5.5" step="0.1" value="2.5" />
          <span class="value" id="boundsValue">2.5</span>
        </label>
        <label class="row">
          <span>Gravity</span>
          <input id="gravity" type="range" min="0" max="0.035" step="0.001" value="0.01" />
          <span class="value" id="gravityValue">0.010</span>
        </label>
        <label class="row">
          <span>Stars</span>
          <input id="stars" type="range" min="300" max="5000" step="100" value="2000" />
          <span class="value" id="starsValue">2000</span>
        </label>
        <label class="row">
          <span>Camera</span>
          <select id="cameraMode">
            <option value="follow">Follow</option>
            <option value="orbit">Orbit</option>
            <option value="cinematic">Cinematic</option>
            <option value="mouse">Mouse Aim</option>
          </select>
          <span class="value">mode</span>
        </label>
      </div>

      <div class="button-grid">
        <button id="pauseBtn">Pause</button>
        <button id="trailsBtn" class="active">Trails</button>
        <button id="boxBtn" class="active">Bounds</button>
        <button id="shockBtn" class="active">Shockwaves</button>
        <button id="autoColorBtn" class="active">Auto Color</button>
        <button id="burstBtn">Burst</button>
        <button id="qualityBtn">Quality</button>
        <button id="resetBtn">Reset</button>
        <button id="shotBtn">Capture</button>
      </div>

      <div class="hint">
        Keyboard: <b>Space</b> pause, <b>B</b> burst, <b>R</b> reset, <b>H</b> hide UI, <b>1-4</b> camera modes. Move the mouse in Mouse Aim mode.
      </div>
    </div>
  </section>

  <div class="minimap" id="minimap"><canvas id="miniCanvas" width="320" height="320"></canvas></div>
  <div class="event-log" id="eventLog"></div>
  <div class="scanline" id="scanline"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    (function bootWhenReady() {
      let started = false;

      function showStartupError(message) {
        const loadingElement = document.getElementById('loading');
        if (!loadingElement) return;
        loadingElement.innerHTML = '<div class="loading-card"><div style="font-size:2rem">⚠️</div><div>Startup Error</div><div style="max-width:520px;text-align:center;color:#95a7bd;font-size:0.9rem;line-height:1.5;text-transform:none;letter-spacing:0">' + message + '</div></div>';
      }

      function start() {
        if (started) return;
        started = true;

        if (!window.THREE) {
          showStartupError('Three.js did not load. Check your internet connection or CDN access, then reload the page.');
          return;
        }

        const loadingElement = document.getElementById('loading');
        if (loadingElement) loadingElement.remove();

        try {
          initAnimation();
        } catch (error) {
          console.error(error);
          showStartupError(error && error.message ? error.message : 'The animation failed to initialize.');
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', start, { once: true });
      } else {
        start();
      }

      window.addEventListener('load', start, { once: true });
    })();

    function initAnimation() {
      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));
      const rand = (min, max) => min + Math.random() * (max - min);
      const TAU = Math.PI * 2;

      const ui = {
        hud: document.getElementById('hud'),
        minimap: document.getElementById('minimap'),
        scanline: document.getElementById('scanline'),
        fps: document.getElementById('fps'),
        activeSplashes: document.getElementById('activeSplashes'),
        hitCount: document.getElementById('hitCount'),
        speedLabel: document.getElementById('speedLabel'),
        statePill: document.getElementById('statePill'),
        eventLog: document.getElementById('eventLog'),
        speed: document.getElementById('speed'),
        bounds: document.getElementById('bounds'),
        gravity: document.getElementById('gravity'),
        stars: document.getElementById('stars'),
        speedValue: document.getElementById('speedValue'),
        boundsValue: document.getElementById('boundsValue'),
        gravityValue: document.getElementById('gravityValue'),
        starsValue: document.getElementById('starsValue'),
        cameraMode: document.getElementById('cameraMode'),
        pauseBtn: document.getElementById('pauseBtn'),
        trailsBtn: document.getElementById('trailsBtn'),
        boxBtn: document.getElementById('boxBtn'),
        shockBtn: document.getElementById('shockBtn'),
        autoColorBtn: document.getElementById('autoColorBtn'),
        burstBtn: document.getElementById('burstBtn'),
        qualityBtn: document.getElementById('qualityBtn'),
        resetBtn: document.getElementById('resetBtn'),
        shotBtn: document.getElementById('shotBtn'),
        miniCanvas: document.getElementById('miniCanvas')
      };

      const miniCtx = ui.miniCanvas.getContext('2d');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);
      scene.fog = new THREE.FogExp2(0x02030a, 0.035);

      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(5, 5, 10);

      const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true, alpha: false });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.shadowMap.enabled = true;
      renderer.shadowMap.type = THREE.PCFSoftShadowMap;
      document.body.appendChild(renderer.domElement);

      const clock = new THREE.Clock();
      const mouse = new THREE.Vector2(0, 0);

      const state = {
        paused: false,
        trails: true,
        showBounds: true,
        shockwaves: true,
        autoColor: true,
        highQuality: true,
        hitCount: 0,
        fps: 0,
        lastFpsTime: performance.now(),
        frames: 0,
        cameraMode: 'follow',
        trailIndex: 0,
        time: 0
      };

      const physicsParams = {
        speed: 0.03,
        direction: new THREE.Vector3(-1, -1, -1).normalize(),
        bounds: 2.5,
        gravity: 0.01,
        cameraEasing: 0.055
      };

      const worldGroup = new THREE.Group();
      scene.add(worldGroup);

      const geometry = new THREE.IcosahedronGeometry(1, 2);
      const material = new THREE.MeshPhongMaterial({
        color: 0x00ff88,
        wireframe: true,
        emissive: 0x003311,
        shininess: 70,
        transparent: true,
        opacity: 0.98
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      worldGroup.add(mesh);

      const solidGeometry = new THREE.IcosahedronGeometry(0.92, 2);
      const solidMaterial = new THREE.MeshStandardMaterial({
        color: 0x06362f,
        metalness: 0.15,
        roughness: 0.35,
        transparent: true,
        opacity: 0.18,
        emissive: 0x001812
      });
      const solidCore = new THREE.Mesh(solidGeometry, solidMaterial);
      mesh.add(solidCore);

      const haloTexture = createRadialTexture();
      const haloMaterial = new THREE.SpriteMaterial({
        map: haloTexture,
        color: 0x00ffaa,
        transparent: true,
        opacity: 0.55,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const halo = new THREE.Sprite(haloMaterial);
      halo.scale.set(3.2, 3.2, 1);
      mesh.add(halo);

      const satelliteGroup = new THREE.Group();
      mesh.add(satelliteGroup);
      const satelliteGeometry = new THREE.SphereGeometry(0.08, 16, 16);
      for (let i = 0; i < 8; i++) {
        const satelliteMaterial = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.47 + i * 0.035, 0.85, 0.55),
          emissive: new THREE.Color().setHSL(0.47 + i * 0.035, 0.9, 0.22),
          roughness: 0.25,
          metalness: 0.1
        });
        const satellite = new THREE.Mesh(satelliteGeometry, satelliteMaterial);
        satellite.userData = {
          phase: i / 8 * TAU,
          radius: 1.5 + (i % 3) * 0.18,
          speed: 0.8 + i * 0.09
        };
        satelliteGroup.add(satellite);
      }

      const boundsGeometry = new THREE.BoxGeometry(physicsParams.bounds * 2, physicsParams.bounds * 2, physicsParams.bounds * 2);
      const boundsEdges = new THREE.EdgesGeometry(boundsGeometry);
      const boundsMaterial = new THREE.LineBasicMaterial({
        color: 0x4dcfff,
        transparent: true,
        opacity: 0.28
      });
      const boundsBox = new THREE.LineSegments(boundsEdges, boundsMaterial);
      worldGroup.add(boundsBox);

      const floorGeometry = new THREE.CircleGeometry(6.5, 96);
      const floorMaterial = new THREE.MeshBasicMaterial({
        color: 0x071426,
        transparent: true,
        opacity: 0.25,
        side: THREE.DoubleSide
      });
      const floor = new THREE.Mesh(floorGeometry, floorMaterial);
      floor.rotation.x = Math.PI / 2;
      floor.position.y = -3.3;
      worldGroup.add(floor);

      const gridHelper = new THREE.GridHelper(13, 26, 0x1c88aa, 0x143650);
      gridHelper.position.y = -3.28;
      gridHelper.material.transparent = true;
      gridHelper.material.opacity = 0.24;
      worldGroup.add(gridHelper);

      const ambientLight = new THREE.AmbientLight(0x333333);
      scene.add(ambientLight);

      const light = new THREE.PointLight(0x6688ff, 1, 100);
      light.position.set(5, 5, 5);
      light.castShadow = true;
      scene.add(light);

      const secondLight = new THREE.PointLight(0xff8866, 0.8, 100);
      secondLight.position.set(-5, -3, -5);
      scene.add(secondLight);

      const rimLight = new THREE.PointLight(0x00ffad, 0.7, 80);
      rimLight.position.set(0, 4, -7);
      scene.add(rimLight);

      const splashGroup = new THREE.Group();
      worldGroup.add(splashGroup);
      const splashLimit = 420;
      const availableSplashes = [];
      const splashMeshes = [];

      for (let i = 0; i < splashLimit; i++) {
        const splashGeometry = new THREE.BoxGeometry(0.1, 0.1, 0.1);
        const splashMaterial = new THREE.MeshPhongMaterial({
          color: Math.random() > 0.5 ? 0x00aaff : 0x0055ff,
          emissive: 0x001133,
          shininess: 30,
          transparent: true,
          opacity: 0
        });
        const splashCube = new THREE.Mesh(splashGeometry, splashMaterial);
        splashCube.visible = false;
        splashCube.castShadow = true;
        splashCube.lifetime = 0;
        splashCube.maxLifetime = Math.random() * 110 + 50;
        splashCube.velocity = new THREE.Vector3();
        splashCube.spin = new THREE.Vector3();
        splashGroup.add(splashCube);
        availableSplashes.push(splashCube);
        splashMeshes.push(splashCube);
      }

      const trailLimit = 90;
      const trailGroup = new THREE.Group();
      worldGroup.add(trailGroup);
      const trails = [];
      const trailGeometry = new THREE.IcosahedronGeometry(1, 1);
      for (let i = 0; i < trailLimit; i++) {
        const trailMaterial = new THREE.MeshBasicMaterial({
          color: 0x00ffad,
          transparent: true,
          opacity: 0,
          wireframe: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const trail = new THREE.Mesh(trailGeometry, trailMaterial);
        trail.visible = false;
        trail.userData.age = 999;
        trailGroup.add(trail);
        trails.push(trail);
      }

      const shockGroup = new THREE.Group();
      worldGroup.add(shockGroup);
      const shockwaves = [];
      const shockAvailable = [];
      for (let i = 0; i < 24; i++) {
        const ringGeometry = new THREE.RingGeometry(0.92, 1.0, 80);
        const ringMaterial = new THREE.MeshBasicMaterial({
          color: 0x7de8ff,
          transparent: true,
          opacity: 0,
          side: THREE.DoubleSide,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.visible = false;
        ring.userData.life = 0;
        ring.userData.maxLife = 1;
        shockGroup.add(ring);
        shockwaves.push(ring);
        shockAvailable.push(ring);
      }

      let particleSystem;
      let particlePositions;
      let particleVelocities;
      let particleColors;
      let particleCount = 2000;
      createParticleSystem(particleCount);

      function createParticleSystem(count) {
        if (particleSystem) {
          scene.remove(particleSystem);
          particleSystem.geometry.dispose();
          particleSystem.material.dispose();
        }

        particleCount = count;
        const particles = new THREE.BufferGeometry();
        particlePositions = new Float32Array(particleCount * 3);
        particleVelocities = new Float32Array(particleCount * 3);
        particleColors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
          const i3 = i * 3;
          const radius = rand(5, 18);
          const theta = rand(0, TAU);
          const phi = Math.acos(rand(-1, 1));

          particlePositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
          particlePositions[i3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
          particlePositions[i3 + 2] = radius * Math.cos(phi);

          particleVelocities[i3] = rand(-0.003, 0.003);
          particleVelocities[i3 + 1] = rand(-0.003, 0.003);
          particleVelocities[i3 + 2] = rand(-0.003, 0.003);

          const hue = rand(0.52, 0.78);
          const color = new THREE.Color().setHSL(hue, rand(0.58, 0.95), rand(0.46, 0.72));
          particleColors[i3] = color.r;
          particleColors[i3 + 1] = color.g;
          particleColors[i3 + 2] = color.b;
        }

        particles.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        particles.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

        const particleMaterial = new THREE.PointsMaterial({
          size: 0.075,
          vertexColors: true,
          transparent: true,
          opacity: 0.8,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        });

        particleSystem = new THREE.Points(particles, particleMaterial);
        scene.add(particleSystem);
      }

      function createRadialTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
        gradient.addColorStop(0, 'rgba(255,255,255,0.95)');
        gradient.addColorStop(0.18, 'rgba(0,255,173,0.45)');
        gradient.addColorStop(0.45, 'rgba(80,140,255,0.18)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 128, 128);
        return new THREE.CanvasTexture(canvas);
      }

      function toast(message) {
        const node = document.createElement('div');
        node.className = 'toast';
        node.textContent = message;
        ui.eventLog.prepend(node);
        setTimeout(() => node.remove(), 4400);
        while (ui.eventLog.children.length > 4) ui.eventLog.lastChild.remove();
      }

      function syncUi() {
        ui.speed.value = physicsParams.speed;
        ui.bounds.value = physicsParams.bounds;
        ui.gravity.value = physicsParams.gravity;
        ui.speedValue.textContent = physicsParams.speed.toFixed(3);
        ui.boundsValue.textContent = physicsParams.bounds.toFixed(1);
        ui.gravityValue.textContent = physicsParams.gravity.toFixed(3);
        ui.starsValue.textContent = String(particleCount);
        ui.speedLabel.textContent = physicsParams.speed.toFixed(3);
        ui.hitCount.textContent = String(state.hitCount);
        ui.statePill.textContent = state.paused ? 'PAUSED' : 'LIVE';
        ui.pauseBtn.textContent = state.paused ? 'Resume' : 'Pause';
        ui.pauseBtn.classList.toggle('active', state.paused);
        ui.trailsBtn.classList.toggle('active', state.trails);
        ui.boxBtn.classList.toggle('active', state.showBounds);
        ui.shockBtn.classList.toggle('active', state.shockwaves);
        ui.autoColorBtn.classList.toggle('active', state.autoColor);
        ui.qualityBtn.classList.toggle('active', state.highQuality);
        boundsBox.visible = state.showBounds;
      }

      function updateBoundsBox() {
        boundsBox.geometry.dispose();
        const updatedGeometry = new THREE.BoxGeometry(physicsParams.bounds * 2, physicsParams.bounds * 2, physicsParams.bounds * 2);
        boundsBox.geometry = new THREE.EdgesGeometry(updatedGeometry);
        updatedGeometry.dispose();
      }

      ui.speed.addEventListener('input', function () {
        physicsParams.speed = Number(ui.speed.value);
        syncUi();
      });

      ui.bounds.addEventListener('input', function () {
        physicsParams.bounds = Number(ui.bounds.value);
        mesh.position.x = clamp(mesh.position.x, -physicsParams.bounds, physicsParams.bounds);
        mesh.position.y = clamp(mesh.position.y, -physicsParams.bounds, physicsParams.bounds);
        mesh.position.z = clamp(mesh.position.z, -physicsParams.bounds, physicsParams.bounds);
        updateBoundsBox();
        syncUi();
      });

      ui.gravity.addEventListener('input', function () {
        physicsParams.gravity = Number(ui.gravity.value);
        syncUi();
      });

      ui.stars.addEventListener('change', function () {
        const next = Number(ui.stars.value);
        createParticleSystem(next);
        syncUi();
        toast('Starfield rebuilt with ' + next + ' particles');
      });

      ui.cameraMode.addEventListener('change', function () {
        state.cameraMode = ui.cameraMode.value;
        toast('Camera mode: ' + state.cameraMode);
      });

      ui.pauseBtn.addEventListener('click', togglePause);
      ui.trailsBtn.addEventListener('click', function () {
        state.trails = !state.trails;
        syncUi();
      });
      ui.boxBtn.addEventListener('click', function () {
        state.showBounds = !state.showBounds;
        syncUi();
      });
      ui.shockBtn.addEventListener('click', function () {
        state.shockwaves = !state.shockwaves;
        syncUi();
      });
      ui.autoColorBtn.addEventListener('click', function () {
        state.autoColor = !state.autoColor;
        syncUi();
      });
      ui.burstBtn.addEventListener('click', function () {
        createSplash(mesh.position.clone(), physicsParams.direction.clone().multiplyScalar(-1), 110);
        createShockwave(mesh.position.clone(), physicsParams.direction.clone());
        toast('Manual energy burst released');
      });
      ui.qualityBtn.addEventListener('click', function () {
        state.highQuality = !state.highQuality;
        renderer.setPixelRatio(state.highQuality ? Math.min(window.devicePixelRatio || 1, 2) : 1);
        syncUi();
        toast(state.highQuality ? 'High quality enabled' : 'Performance quality enabled');
      });
      ui.resetBtn.addEventListener('click', resetScene);
      ui.shotBtn.addEventListener('click', captureFrame);

      function togglePause() {
        state.paused = !state.paused;
        syncUi();
      }

      function resetScene() {
        mesh.position.set(0, 0, 0);
        mesh.rotation.set(0, 0, 0);
        physicsParams.direction.set(-1, -1, -1).normalize();
        state.hitCount = 0;
        for (const splashCube of splashMeshes) {
          splashCube.visible = false;
          splashCube.lifetime = 0;
          if (!availableSplashes.includes(splashCube)) availableSplashes.push(splashCube);
        }
        for (const trail of trails) {
          trail.visible = false;
          trail.material.opacity = 0;
          trail.userData.age = 999;
        }
        for (const ring of shockwaves) {
          ring.visible = false;
          ring.material.opacity = 0;
          ring.userData.life = 0;
          if (!shockAvailable.includes(ring)) shockAvailable.push(ring);
        }
        toast('Simulation reset');
        syncUi();
      }

      function captureFrame() {
        const link = document.createElement('a');
        link.download = 'enhanced-3d-loop-capture.png';
        link.href = renderer.domElement.toDataURL('image/png');
        link.click();
        toast('Frame captured as PNG');
      }

      function createSplash(position, direction, overrideCount) {
        const count = overrideCount || Math.floor(Math.random() * 24) + 16;
        for (let i = 0; i < count; i++) {
          if (availableSplashes.length === 0) break;

          const splashCube = availableSplashes.pop();
          splashCube.visible = true;
          splashCube.position.copy(position);
          splashCube.lifetime = 0;
          splashCube.maxLifetime = rand(45, 150);

          const spread = rand(0.45, 1.1);
          splashCube.velocity.set(
            direction.x * rand(0.04, 0.14) + rand(-spread, spread) * 0.06,
            direction.y * rand(0.04, 0.14) + rand(0.02, spread * 0.11),
            direction.z * rand(0.04, 0.14) + rand(-spread, spread) * 0.06
          );

          splashCube.spin.set(rand(-0.11, 0.11), rand(-0.11, 0.11), rand(-0.11, 0.11));

          const hue = rand(0.48, 0.82);
          splashCube.material.color.setHSL(hue, 0.88, 0.55);
          splashCube.material.emissive.setHSL(hue, 0.85, 0.22);
          splashCube.material.opacity = 1.0;

          const scale = rand(0.05, 0.19);
          splashCube.scale.set(scale, scale, scale);
        }
      }

      function createShockwave(position, normal) {
        if (!state.shockwaves || shockAvailable.length === 0) return;
        const ring = shockAvailable.pop();
        ring.visible = true;
        ring.position.copy(position);
        ring.scale.setScalar(0.1);
        ring.material.opacity = 0.75;
        ring.userData.life = 0;
        ring.userData.maxLife = rand(0.75, 1.1);

        const up = new THREE.Vector3(0, 0, 1);
        const target = normal.clone().normalize();
        if (target.lengthSq() < 0.001) target.set(0, 1, 0);
        ring.quaternion.setFromUnitVectors(up, target);
      }

      function stampTrail() {
        if (!state.trails) return;
        const trail = trails[state.trailIndex];
        trail.visible = true;
        trail.position.copy(mesh.position);
        trail.rotation.copy(mesh.rotation);
        trail.scale.copy(mesh.scale).multiplyScalar(1.0);
        trail.material.color.copy(material.color);
        trail.material.opacity = 0.34;
        trail.userData.age = 0;
        state.trailIndex = (state.trailIndex + 1) % trailLimit;
      }

      function updateTrails(dt) {
        for (const trail of trails) {
          if (!trail.visible) continue;
          trail.userData.age += dt;
          const fade = 1 - clamp(trail.userData.age / 1.35, 0, 1);
          trail.material.opacity = fade * 0.34;
          trail.scale.multiplyScalar(1 + dt * 0.16);
          if (fade <= 0.01 || !state.trails) {
            trail.visible = false;
            trail.material.opacity = 0;
          }
        }
      }

      function updateSplashes() {
        let active = 0;
        for (const splashCube of splashMeshes) {
          if (!splashCube.visible) continue;
          active++;
          splashCube.position.add(splashCube.velocity);
          splashCube.velocity.y -= physicsParams.gravity;
          splashCube.rotation.x += splashCube.spin.x;
          splashCube.rotation.y += splashCube.spin.y;
          splashCube.rotation.z += splashCube.spin.z;
          splashCube.lifetime++;

          if (splashCube.lifetime > splashCube.maxLifetime) {
            splashCube.visible = false;
            splashCube.material.opacity = 0;
            availableSplashes.push(splashCube);
          } else {
            const fade = 1 - splashCube.lifetime / splashCube.maxLifetime;
            splashCube.material.opacity = fade;
            splashCube.scale.multiplyScalar(0.995);
          }
        }
        ui.activeSplashes.textContent = String(active);
      }

      function updateShockwaves(dt) {
        for (const ring of shockwaves) {
          if (!ring.visible) continue;
          ring.userData.life += dt;
          const t = ring.userData.life / ring.userData.maxLife;
          ring.scale.setScalar(0.2 + t * 3.6);
          ring.material.opacity = Math.max(0, (1 - t) * 0.72);
          ring.rotation.z += dt * 0.7;
          if (t >= 1) {
            ring.visible = false;
            ring.material.opacity = 0;
            shockAvailable.push(ring);
          }
        }
      }

      function updateParticles(time) {
        if (!particleSystem) return;
        const positions = particleSystem.geometry.attributes.position.array;
        for (let i = 0; i < particleCount; i++) {
          const i3 = i * 3;
          positions[i3] += particleVelocities[i3];
          positions[i3 + 1] += particleVelocities[i3 + 1] + Math.sin(time + i * 0.01) * 0.0007;
          positions[i3 + 2] += particleVelocities[i3 + 2];

          const distanceSq = positions[i3] * positions[i3] + positions[i3 + 1] * positions[i3 + 1] + positions[i3 + 2] * positions[i3 + 2];
          if (distanceSq > 19 * 19) {
            positions[i3] *= -0.45;
            positions[i3 + 1] *= -0.45;
            positions[i3 + 2] *= -0.45;
          }
        }
        particleSystem.geometry.attributes.position.needsUpdate = true;
        particleSystem.rotation.y += 0.001;
        particleSystem.rotation.x += 0.0005;
      }

      function updateCamera(time) {
        const idealCameraPos = new THREE.Vector3();
        if (state.cameraMode === 'follow') {
          idealCameraPos.set(
            mesh.position.x + 5 * Math.sin(time * 0.5),
            mesh.position.y + 5 + Math.sin(time * 0.3) * 2,
            mesh.position.z + 5 * Math.cos(time * 0.5)
          );
        } else if (state.cameraMode === 'orbit') {
          idealCameraPos.set(
            Math.sin(time * 0.42) * 9,
            4.6 + Math.sin(time * 0.34) * 1.4,
            Math.cos(time * 0.42) * 9
          );
        } else if (state.cameraMode === 'cinematic') {
          idealCameraPos.set(
            mesh.position.x + Math.sin(time * 0.24) * 3.2,
            mesh.position.y + 2.2 + Math.sin(time * 0.77) * 0.7,
            mesh.position.z + 7.8 + Math.cos(time * 0.38) * 2.8
          );
        } else {
          idealCameraPos.set(
            mesh.position.x + 4 + mouse.x * 5,
            mesh.position.y + 4 + mouse.y * 4,
            mesh.position.z + 8 - Math.abs(mouse.x) * 2
          );
        }

        camera.position.lerp(idealCameraPos, physicsParams.cameraEasing);
        const cameraTarget = new THREE.Vector3(
          mesh.position.x + mouse.x * 0.45,
          mesh.position.y + Math.sin(time) * 0.5 + mouse.y * 0.45,
          mesh.position.z
        );
        camera.lookAt(cameraTarget);
      }

      function updateSatellites(time) {
        satelliteGroup.children.forEach(function (satellite, index) {
          const data = satellite.userData;
          const angle = data.phase + time * data.speed;
          const tilt = Math.sin(angle * 1.7 + index) * 0.55;
          satellite.position.set(
            Math.cos(angle) * data.radius,
            Math.sin(angle * 0.7 + index) * 0.55 + tilt,
            Math.sin(angle) * data.radius
          );
          satellite.scale.setScalar(1 + Math.sin(time * 3 + index) * 0.18);
        });
      }

      function updateMinimap() {
        const size = ui.miniCanvas.width;
        const center = size / 2;
        miniCtx.clearRect(0, 0, size, size);
        miniCtx.fillStyle = 'rgba(0, 0, 0, 0.36)';
        miniCtx.fillRect(0, 0, size, size);

        miniCtx.strokeStyle = 'rgba(125, 232, 255, 0.45)';
        miniCtx.lineWidth = 3;
        miniCtx.strokeRect(24, 24, size - 48, size - 48);

        miniCtx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
        miniCtx.lineWidth = 1;
        for (let i = 1; i < 4; i++) {
          const p = 24 + i * (size - 48) / 4;
          miniCtx.beginPath();
          miniCtx.moveTo(p, 24);
          miniCtx.lineTo(p, size - 24);
          miniCtx.moveTo(24, p);
          miniCtx.lineTo(size - 24, p);
          miniCtx.stroke();
        }

        const x = center + mesh.position.x / physicsParams.bounds * (size * 0.39);
        const y = center + mesh.position.z / physicsParams.bounds * (size * 0.39);
        const radius = 8 + Math.sin(state.time * 8) * 2;

        const grad = miniCtx.createRadialGradient(x, y, 1, x, y, 24);
        grad.addColorStop(0, 'rgba(0, 255, 173, 0.95)');
        grad.addColorStop(1, 'rgba(0, 255, 173, 0)');
        miniCtx.fillStyle = grad;
        miniCtx.beginPath();
        miniCtx.arc(x, y, 24, 0, TAU);
        miniCtx.fill();

        miniCtx.fillStyle = '#ffffff';
        miniCtx.beginPath();
        miniCtx.arc(x, y, radius, 0, TAU);
        miniCtx.fill();
      }

      function collideAxis(axis, normalVector) {
        state.hitCount++;
        physicsParams.direction[axis] *= -1;
        mesh.position[axis] = clamp(mesh.position[axis], -physicsParams.bounds, physicsParams.bounds);
        createSplash(mesh.position.clone(), normalVector, undefined);
        createShockwave(mesh.position.clone(), normalVector);

        if (state.autoColor) {
          material.color.offsetHSL(0.045, 0, 0);
          solidMaterial.color.copy(material.color).offsetHSL(0, 0, -0.3);
          haloMaterial.color.copy(material.color);
        }

        const label = axis.toUpperCase() + '-wall impact #' + state.hitCount;
        if (state.hitCount % 3 === 0) toast(label);
      }

      function checkCollisions() {
        if (Math.abs(mesh.position.x) > physicsParams.bounds) {
          collideAxis('x', new THREE.Vector3(-Math.sign(mesh.position.x), 0, 0));
        }
        if (Math.abs(mesh.position.y) > physicsParams.bounds) {
          collideAxis('y', new THREE.Vector3(0, -Math.sign(mesh.position.y), 0));
        }
        if (Math.abs(mesh.position.z) > physicsParams.bounds) {
          collideAxis('z', new THREE.Vector3(0, 0, -Math.sign(mesh.position.z)));
        }
      }

      function updateFps() {
        state.frames++;
        const now = performance.now();
        if (now - state.lastFpsTime >= 500) {
          state.fps = Math.round(state.frames * 1000 / (now - state.lastFpsTime));
          state.frames = 0;
          state.lastFpsTime = now;
          ui.fps.textContent = String(state.fps);
        }
      }

      function animate() {
        requestAnimationFrame(animate);
        const dt = Math.min(clock.getDelta(), 0.05);
        if (!state.paused) {
          state.time += dt;
          const time = state.time;

          mesh.rotation.x += 0.72 * dt;
          mesh.rotation.y += 0.84 * dt;
          mesh.rotation.z += 0.18 * dt;

          const pulse = 1 + Math.sin(time * 4.2) * 0.045;
          mesh.scale.setScalar(pulse);
          halo.scale.setScalar(3.1 + Math.sin(time * 3) * 0.38);
          haloMaterial.opacity = 0.48 + Math.sin(time * 2.6) * 0.13;

          const move = physicsParams.direction.clone().multiplyScalar(physicsParams.speed * 60 * dt);
          mesh.position.add(move);
          checkCollisions();

          if (Math.floor(time * 40) % 4 === 0) stampTrail();

          updateSatellites(time);
          updateTrails(dt);
          updateSplashes();
          updateShockwaves(dt);
          updateParticles(time);

          light.intensity = 1 + Math.sin(time * 2) * 0.2;
          secondLight.intensity = 0.8 + Math.sin(time * 3) * 0.2;
          rimLight.intensity = 0.75 + Math.cos(time * 2.2) * 0.18;

          light.position.x = Math.sin(time * 0.7) * 5.5;
          light.position.z = Math.cos(time * 0.7) * 5.5;
          secondLight.position.y = -2.5 + Math.sin(time * 0.9) * 1.4;

          floorMaterial.opacity = 0.2 + Math.sin(time * 1.2) * 0.05;
          boundsMaterial.opacity = state.showBounds ? 0.22 + Math.sin(time * 2) * 0.08 : 0;

          updateCamera(time);
          updateMinimap();
          syncUi();
        }

        updateFps();
        renderer.render(scene, camera);
      }

      function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }

      window.addEventListener('resize', onResize);
      window.addEventListener('mousemove', function (event) {
        mouse.x = event.clientX / window.innerWidth * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight * 2 - 1);
      });

      window.addEventListener('keydown', function (event) {
        const key = event.key.toLowerCase();
        if (key === ' ') {
          event.preventDefault();
          togglePause();
        } else if (key === 'b') {
          createSplash(mesh.position.clone(), physicsParams.direction.clone().multiplyScalar(-1), 110);
          createShockwave(mesh.position.clone(), physicsParams.direction.clone());
          toast('Keyboard burst released');
        } else if (key === 'r') {
          resetScene();
        } else if (key === 'h') {
          ui.hud.classList.toggle('hidden');
          ui.minimap.classList.toggle('hidden');
        } else if (key === '1') {
          state.cameraMode = 'follow';
          ui.cameraMode.value = 'follow';
          toast('Camera mode: follow');
        } else if (key === '2') {
          state.cameraMode = 'orbit';
          ui.cameraMode.value = 'orbit';
          toast('Camera mode: orbit');
        } else if (key === '3') {
          state.cameraMode = 'cinematic';
          ui.cameraMode.value = 'cinematic';
          toast('Camera mode: cinematic');
        } else if (key === '4') {
          state.cameraMode = 'mouse';
          ui.cameraMode.value = 'mouse';
          toast('Camera mode: mouse aim');
        }
      });

      syncUi();
      toast('Enhanced loop engine initialized');
      animate();
    }
  </script>
</body>
</html>
