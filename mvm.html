<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GENOME-OS v4: Epigenetic Neural Engine</title>
  <style>
    :root {
      --bg: #030508; --panel: #0a0e14; --accent: #00ffcc;
      --dna-a: #00d4ff; --dna-t: #8a2be2; --dna-g: #ff0055; --dna-c: #ffcc00;
      --methyl: #444ebd;
    }
    body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #e0e6ed; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
    canvas { display: block; position: absolute; inset: 0; }
    
    #ui-wrapper {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; flex-direction: row; justify-content: space-between; padding: 25px;
    }
    .panel {
      pointer-events: all; background: rgba(10, 14, 20, 0.9);
      border: 1px solid rgba(0, 255, 204, 0.2); border-radius: 12px;
      padding: 20px; backdrop-filter: blur(20px); width: 320px;
    }
    .metric { margin-bottom: 15px; }
    .label { font-size: 10px; color: #667; text-transform: uppercase; margin-bottom: 5px; display: block;}
    .bar { height: 6px; background: #1a1f26; border-radius: 3px; overflow: hidden; }
    .fill { height: 100%; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    
    #fitness-graph {
        width: 100%; height: 60px; background: #000; margin-top: 10px;
        border: 1px solid #1a2635;
    }
    .btn {
        background: #111; border: 1px solid var(--accent); color: var(--accent);
        padding: 10px; width: 100%; border-radius: 6px; cursor: pointer;
        font-weight: bold; font-size: 11px; transition: all 0.2s;
    }
    .btn:hover { background: var(--accent); color: #000; }
    
    #log { font-size: 9px; color: #4ade80; height: 120px; overflow: hidden; margin-top: 20px; }
    .gene-map { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; margin-top: 10px; }
    .base-dot { width: 6px; height: 6px; border-radius: 50%; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-wrapper">
    <div class="panel">
        <div style="font-size: 18px; font-weight: 900; color: var(--accent); margin-bottom: 20px;">GENOME-OS v4.0</div>
        
        <div class="metric">
            <span class="label">Gibbs Free Energy (ATP)</span>
            <div class="bar"><div id="atp-fill" class="fill" style="background: var(--dna-a); width: 100%;"></div></div>
        </div>

        <div class="metric">
            <span class="label">Homeostatic Health</span>
            <div class="bar"><div id="health-fill" class="fill" style="background: var(--dna-g); width: 100%;"></div></div>
        </div>

        <div class="metric">
            <span class="label">Evolutionary Fitness</span>
            <canvas id="fitness-graph"></canvas>
        </div>

        <div class="gene-map" id="gene-map"></div>

        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="btn" id="toggle-sim">INIT SIM</button>
            <button class="btn" id="induce-mutation" style="border-color: #ff0055; color: #ff0055;">STRESS</button>
        </div>
    </div>

    <div class="panel" style="width: 240px;">
        <span class="label">Neural RSI Brain</span>
        <div id="log"></div>
        <hr style="border:0; border-top: 1px solid #1a2635; margin: 15px 0;">
        <span class="label">Epigenetic Silencing</span>
        <div id="methyl-status" style="font-size: 11px; color: var(--methyl);">Methylation: 0.0%</div>
    </div>
</div>

<script>
(function() {
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const fitnessCanvas = document.getElementById('fitness-graph');
    const fctx = fitnessCanvas.getContext('2d');

    // --- SYSTEM CORE ---
    const GENOME_SIZE = 160;
    const BASES = ['A', 'T', 'G', 'C'];
    const genome = new Uint8Array(GENOME_SIZE).map(() => Math.floor(Math.random() * 4));
    const methylation = new Float32Array(GENOME_SIZE).fill(0); // 0 = Active, 1 = Silenced

    let state = {
        atp: 100, health: 100, stress: 0, 
        running: false, generation: 0, 
        fitnessHistory: [],
        bestSurvival: 0,
        currentAge: 0
    };

    // --- RSI NEURAL AGENT ---
    class RSIAgent {
        constructor() {
            this.qTable = new Map();
            this.mutationRate = 0.02;
        }

        think() {
            if (!state.running) return;

            // Decision Matrix
            const focus = Math.floor(Math.random() * GENOME_SIZE);
            const localSeq = genome.slice(focus, focus + 3).join("");
            
            // RSI Logic: Cost-Benefit Analysis
            const mutationCost = 5.0; // ATP cost for structural change
            if (state.atp < mutationCost) return;

            const decision = Math.random();
            if (decision < 0.1) {
                // Action 1: Point Mutation
                genome[focus] = Math.floor(Math.random() * 4);
                state.atp -= mutationCost;
            } else if (decision < 0.15) {
                // Action 2: Toggle Methylation (Epigenetic shift)
                methylation[focus] = methylation[focus] > 0.5 ? 0 : 1;
                state.atp -= 1.0; 
            }

            this.evaluate();
        }

        evaluate() {
            // Bio-Logic Interpreter
            for (let i = 0; i < GENOME_SIZE - 4; i++) {
                if (methylation[i] > 0.5) continue; // Skip silenced genes

                // Promoter Affinity Binding
                if (genome[i] === 0 && genome[i+1] === 0) { // 'AA' Promoter
                    const gene = genome[i+2];
                    if (gene === 2) state.atp += 0.4; // 'G' = Metabolic
                    if (gene === 1) state.health += 0.2; // 'T' = Repair
                }
            }
        }
    }

    const agent = new RSIAgent();

    // --- VIZ ENGINE ---
    function render() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        ctx.scale(dpr, dpr);

        ctx.fillStyle = '#030508';
        ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

        if (state.running) {
            state.atp -= 0.1 + (state.stress * 0.05);
            state.health -= 0.05 + (state.stress * 0.02);
            state.currentAge++;
            if (state.stress > 0) state.stress *= 0.99;

            for(let i=0; i<10; i++) agent.think();

            if (state.atp <= 0 || state.health <= 0) {
                handleDeath();
            }
        }

        drawHelix();
        updateUI();
        requestAnimationFrame(render);
    }

    function drawHelix() {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const time = Date.now() * 0.001;

        for (let i = 0; i < GENOME_SIZE; i++) {
            const angle = i * 0.15 + time;
            const x = cx + Math.cos(angle) * (100 + Math.sin(time + i * 0.1) * 20);
            const y = (i * 8) - (GENOME_SIZE * 4) + cy;

            const color = methylation[i] > 0.5 ? '#444ebd' : getBaseColor(genome[i]);
            
            ctx.shadowBlur = methylation[i] > 0.5 ? 0 : 10;
            ctx.shadowColor = color;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            if (i % 5 === 0) {
                ctx.strokeStyle = 'rgba(255,255,255,0.03)';
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(cx - (x - cx), y);
                ctx.stroke();
            }
        }
    }

    function getBaseColor(b) {
        return [ '#00d4ff', '#8a2be2', '#ff0055', '#ffcc00' ][b];
    }

    function handleDeath() {
        state.fitnessHistory.push(state.currentAge);
        if (state.currentAge > state.bestSurvival) state.bestSurvival = state.currentAge;
        
        log(`Gen ${state.generation++} failed. Life: ${state.currentAge}`);
        
        state.atp = 100;
        state.health = 100;
        state.currentAge = 0;
        state.stress = 0;
        
        drawFitness();
    }

    function drawFitness() {
        fctx.clearRect(0,0, fitnessCanvas.width, fitnessCanvas.height);
        fctx.strokeStyle = '#00ffcc';
        fctx.beginPath();
        const step = fitnessCanvas.width / 20;
        const data = state.fitnessHistory.slice(-20);
        data.forEach((val, i) => {
            const h = (val / (state.bestSurvival || 1)) * 50;
            fctx.lineTo(i * step, 60 - h);
        });
        fctx.stroke();
    }

    function updateUI() {
        document.getElementById('atp-fill').style.width = Math.max(0, state.atp) + '%';
        document.getElementById('health-fill').style.width = Math.max(0, state.health) + '%';
        
        const mCount = methylation.filter(m => m > 0.5).length;
        document.getElementById('methyl-status').textContent = `Methylation: ${(mCount/GENOME_SIZE*100).toFixed(1)}%`;
        
        // Update Grid
        if (state.currentAge % 30 === 0) {
            const grid = document.getElementById('gene-map');
            grid.innerHTML = '';
            for(let i=0; i<40; i++) {
                const dot = document.createElement('div');
                dot.className = 'base-dot';
                dot.style.background = getBaseColor(genome[i]);
                if (methylation[i] > 0.5) dot.style.opacity = '0.2';
                grid.appendChild(dot);
            }
        }
    }

    function log(m) {
        const l = document.getElementById('log');
        l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    }

    document.getElementById('toggle-sim').onclick = () => {
        state.running = !state.running;
        log(state.running ? "System Online." : "Simulation Paused.");
    };

    document.getElementById('induce-mutation').onclick = () => {
        state.stress += 50;
        log("External Pathogen Stress Injected.");
    };

    render();
})();
</script>
</body>
</html>
