<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Navigation Generator Pro</title>
  <meta name="description" content="A single-file React navigation generator with live preview, responsive menus, presets, export tools, accessibility helpers, and generated HTML/CSS output." />

  <style>
    :root {
      --bg: #0b1020;
      --bg-2: #111a33;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.13);
      --text: #f7fbff;
      --muted: #a9b7d6;
      --line: rgba(255, 255, 255, 0.16);
      --brand: #7c3aed;
      --brand-2: #06b6d4;
      --success: #22c55e;
      --danger: #fb7185;
      --warning: #f59e0b;
      --radius: 20px;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      background:
        radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.32), transparent 34rem),
        radial-gradient(circle at 85% 20%, rgba(6, 182, 212, 0.24), transparent 32rem),
        linear-gradient(135deg, var(--bg), #060913 65%);
      color: var(--text);
      overflow-x: hidden;
    }

    body.light-mode {
      --bg: #f4f7fb;
      --bg-2: #ffffff;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --text: #111827;
      --muted: #536179;
      --line: rgba(15, 23, 42, 0.12);
      --shadow: 0 24px 70px rgba(15, 23, 42, 0.14);
      background:
        radial-gradient(circle at 15% 15%, rgba(124, 58, 237, 0.14), transparent 34rem),
        radial-gradient(circle at 85% 20%, rgba(6, 182, 212, 0.16), transparent 32rem),
        linear-gradient(135deg, #f4f7fb, #ffffff 65%);
    }

    a {
      color: inherit;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
    }

    .shell {
      width: min(1480px, calc(100% - 32px));
      margin: 0 auto;
      padding-bottom: 48px;
    }

    .hero {
      position: relative;
      padding: 38px 0 26px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
      gap: 22px;
      align-items: stretch;
    }

    .hero-card,
    .mini-card,
    .panel,
    .preview-stage,
    .code-panel {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      backdrop-filter: blur(18px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-card {
      padding: clamp(24px, 4vw, 44px);
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -12% -42% 48%;
      height: 240px;
      background: linear-gradient(90deg, rgba(124, 58, 237, 0.35), rgba(6, 182, 212, 0.22));
      filter: blur(60px);
      transform: rotate(-10deg);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.07);
      font-size: 0.86rem;
      margin-bottom: 18px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 8px rgba(34, 197, 94, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 5.2rem);
      line-height: 0.95;
      letter-spacing: -0.075em;
      max-width: 940px;
    }

    .gradient-text {
      background: linear-gradient(90deg, #fff, #d9ccff 35%, #93f4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    body.light-mode .gradient-text {
      background: linear-gradient(90deg, #111827, #6d28d9 45%, #0891b2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .hero-card p {
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.7;
      max-width: 760px;
      margin: 20px 0 0;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 26px;
    }

    .mini-card {
      padding: 22px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
      min-height: 100%;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--line);
    }

    .stat b {
      display: block;
      font-size: 1.35rem;
      margin-bottom: 3px;
    }

    .stat span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 430px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      overflow: hidden;
    }

    .panel-header {
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .panel-header h2,
    .section-title h3,
    .code-panel h2 {
      margin: 0;
      letter-spacing: -0.03em;
    }

    .panel-header p,
    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .panel-body {
      padding: 18px;
    }

    .form-section {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.055);
      border-radius: 18px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    .field-label {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
      letter-spacing: 0.015em;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 14px;
      padding: 11px 12px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease;
    }

    option {
      color: #111827;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.5;
      font-family: var(--mono);
      font-size: 0.86rem;
    }

    input[type="color"] {
      padding: 3px;
      height: 43px;
    }

    input[type="checkbox"] {
      width: auto;
      accent-color: var(--brand);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(6, 182, 212, 0.85);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.13);
      background: rgba(255, 255, 255, 0.11);
    }

    .toggle-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px dashed var(--line);
    }

    .toggle-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .toggle-row strong {
      display: block;
      font-size: 0.92rem;
    }

    .toggle-row span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.45;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 14px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.08);
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease;
      user-select: none;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.28);
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      border-color: transparent;
      box-shadow: 0 14px 36px rgba(124, 58, 237, 0.25);
    }

    .btn.success {
      background: rgba(34, 197, 94, 0.17);
      border-color: rgba(34, 197, 94, 0.34);
    }

    .btn.danger {
      background: rgba(251, 113, 133, 0.13);
      border-color: rgba(251, 113, 133, 0.34);
    }

    .btn.small {
      padding: 8px 10px;
      border-radius: 12px;
      font-size: 0.86rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .preset-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 0.82rem;
    }

    .chip.active {
      border-color: rgba(6, 182, 212, 0.65);
      background: rgba(6, 182, 212, 0.16);
    }

    .page-list {
      display: grid;
      gap: 12px;
    }

    .page-card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.055);
      overflow: hidden;
    }

    .page-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.04);
    }

    .page-card-header strong {
      font-size: 0.9rem;
    }

    .page-card-header span {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .page-card-body {
      padding: 12px;
    }

    .icon-btns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .notice {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(245, 158, 11, 0.35);
      background: rgba(245, 158, 11, 0.12);
      color: #fde68a;
      line-height: 1.55;
      font-size: 0.9rem;
    }

    body.light-mode .notice {
      color: #92400e;
    }

    .workspace {
      display: grid;
      gap: 22px;
    }

    .preview-stage {
      overflow: hidden;
    }

    .preview-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .preview-toolbar h2 {
      margin: 0;
      letter-spacing: -0.03em;
    }

    .device-tabs {
      display: inline-flex;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 4px;
      gap: 4px;
    }

    .device-tabs button {
      border-radius: 10px;
      padding: 8px 11px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
    }

    .device-tabs button.active {
      color: var(--text);
      background: rgba(255, 255, 255, 0.13);
    }

    .preview-canvas {
      min-height: 430px;
      padding: 28px;
      display: grid;
      place-items: start center;
      background:
        linear-gradient(45deg, rgba(255,255,255,0.035) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.035) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.035) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.035) 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
    }

    .device-frame {
      width: 100%;
      max-width: 960px;
      min-height: 310px;
      border: 1px solid var(--line);
      background: #f8fafc;
      color: #111827;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.28);
      transition: max-width 0.24s ease;
    }

    .device-frame.tablet {
      max-width: 720px;
    }

    .device-frame.mobile {
      max-width: 390px;
    }

    .mock-page {
      min-height: 310px;
      background:
        linear-gradient(135deg, rgba(124,58,237,0.07), rgba(6,182,212,0.07)),
        #f8fafc;
    }

    .mock-content {
      padding: 34px;
      display: grid;
      gap: 14px;
    }

    .mock-content h3 {
      margin: 0;
      font-size: clamp(1.3rem, 2.8vw, 2.4rem);
      letter-spacing: -0.045em;
    }

    .mock-content p {
      margin: 0;
      max-width: 580px;
      line-height: 1.65;
      color: #64748b;
    }

    .skeleton-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .skeleton-card {
      min-height: 82px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.06);
      border: 1px solid rgba(15, 23, 42, 0.08);
    }

    .generated-nav {
      --nav-bg: #111827;
      --nav-text: #ffffff;
      --nav-accent: #7c3aed;
      --nav-hover: rgba(255,255,255,0.14);
      --nav-radius: 18px;
      --nav-gap: 10px;
      --nav-padding: 12px;
      --nav-font-size: 15px;
      --nav-shadow: 0 18px 48px rgba(15,23,42,0.18);
      width: 100%;
      position: relative;
      z-index: 2;
      background: var(--nav-bg);
      color: var(--nav-text);
      border-radius: var(--nav-radius);
      box-shadow: var(--nav-shadow);
      border: 1px solid rgba(255,255,255,0.14);
      overflow: visible;
    }

    .generated-nav.sticky {
      position: sticky;
      top: 0;
    }

    .generated-nav.fixed {
      position: relative;
    }

    .generated-nav.transparent {
      background: rgba(17,24,39,0.72);
      backdrop-filter: blur(14px);
    }

    .generated-nav-inner {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      padding: var(--nav-padding);
    }

    .generated-nav.vertical .generated-nav-inner {
      align-items: stretch;
      flex-direction: column;
    }

    .generated-brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      letter-spacing: -0.03em;
      white-space: nowrap;
      margin-right: auto;
      color: var(--nav-text);
      text-decoration: none;
    }

    .generated-brand-mark {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--nav-accent), #06b6d4);
      color: #fff;
      font-weight: 900;
    }

    .generated-nav.vertical .generated-brand {
      margin-right: 0;
      margin-bottom: 6px;
    }

    .generated-menu {
      display: flex;
      align-items: center;
      gap: var(--nav-gap);
      flex-wrap: wrap;
    }

    .generated-nav.vertical .generated-menu {
      display: grid;
      width: 100%;
      align-items: stretch;
    }

    .generated-menu a,
    .generated-drop-toggle {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 40px;
      color: var(--nav-text);
      text-decoration: none;
      font-size: var(--nav-font-size);
      font-weight: 750;
      border-radius: calc(var(--nav-radius) - 7px);
      padding: 9px 13px;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .generated-menu a:hover,
    .generated-menu a:focus-visible,
    .generated-drop:hover .generated-drop-toggle,
    .generated-drop-toggle:focus-visible {
      background: var(--nav-hover);
      border-color: rgba(255,255,255,0.16);
      transform: translateY(-1px);
      outline: none;
    }

    .generated-menu a.active {
      background: linear-gradient(135deg, var(--nav-accent), #06b6d4);
      color: #fff;
    }

    .generated-menu a.active::after {
      content: "";
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 5px;
      height: 2px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
    }

    .generated-drop {
      position: relative;
    }

    .generated-drop-menu {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 210px;
      display: none;
      padding: 8px;
      border-radius: 16px;
      background: var(--nav-bg);
      box-shadow: var(--nav-shadow);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .generated-drop:hover .generated-drop-menu,
    .generated-drop:focus-within .generated-drop-menu {
      display: grid;
      gap: 4px;
    }

    .generated-search {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 180px;
      border-radius: calc(var(--nav-radius) - 7px);
      padding: 7px 10px;
      margin-left: 4px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .generated-search input {
      border: 0;
      background: transparent;
      color: var(--nav-text);
      padding: 2px;
      border-radius: 0;
      box-shadow: none;
      font-size: 0.92rem;
    }

    .generated-search input::placeholder {
      color: rgba(255,255,255,0.7);
    }

    .generated-mobile-toggle {
      display: none;
      margin-left: auto;
      width: 42px;
      height: 42px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.1);
      color: var(--nav-text);
      cursor: pointer;
    }

    .generated-mobile-toggle span {
      display: block;
      width: 18px;
      height: 2px;
      margin: 4px auto;
      border-radius: 999px;
      background: currentColor;
    }

    .generated-nav.pill {
      border-radius: 999px;
    }

    .generated-nav.pill .generated-menu a,
    .generated-nav.pill .generated-drop-toggle,
    .generated-nav.pill .generated-search {
      border-radius: 999px;
    }

    .generated-nav.minimal {
      box-shadow: none;
      border-color: rgba(15, 23, 42, 0.08);
    }

    .generated-nav.glass {
      background: rgba(17, 24, 39, 0.64);
      backdrop-filter: blur(18px);
    }

    .generated-nav.neo {
      border: 2px solid rgba(0,0,0,0.3);
      box-shadow: 8px 8px 0 rgba(0,0,0,0.18);
    }

    .generated-nav.compact .generated-menu a,
    .generated-nav.compact .generated-drop-toggle {
      min-height: 34px;
      padding: 7px 10px;
    }

    .generated-nav.animated .generated-menu a::before,
    .generated-nav.animated .generated-drop-toggle::before {
      content: "";
      position: absolute;
      inset: auto 50% 4px 50%;
      height: 2px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.85;
      transition: left 0.2s ease, right 0.2s ease;
    }

    .generated-nav.animated .generated-menu a:hover::before,
    .generated-nav.animated .generated-drop-toggle:hover::before {
      left: 13px;
      right: 13px;
    }

    @media (max-width: 720px) {
      .generated-nav.responsive .generated-mobile-toggle {
        display: inline-grid;
        place-items: center;
      }

      .generated-nav.responsive .generated-menu,
      .generated-nav.responsive .generated-search {
        display: none;
      }

      .generated-nav.responsive.open .generated-menu,
      .generated-nav.responsive.open .generated-search {
        display: grid;
        width: 100%;
      }

      .generated-nav.responsive.open .generated-nav-inner {
        flex-wrap: wrap;
      }

      .generated-nav.responsive.open .generated-menu {
        order: 5;
        align-items: stretch;
      }

      .generated-nav.responsive.open .generated-search {
        order: 6;
      }

      .generated-nav.responsive .generated-drop-menu {
        position: static;
        margin-top: 5px;
      }
    }

    .code-panel {
      overflow: hidden;
    }

    .code-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
    }

    .code-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .code-tabs button {
      border-radius: 999px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      cursor: pointer;
    }

    .code-tabs button.active {
      color: var(--text);
      border-color: rgba(6, 182, 212, 0.55);
      background: rgba(6, 182, 212, 0.15);
    }

    pre {
      margin: 0;
      padding: 18px;
      max-height: 500px;
      overflow: auto;
      background: rgba(0, 0, 0, 0.28);
      color: #dbeafe;
      font-family: var(--mono);
      font-size: 0.86rem;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    body.light-mode pre {
      background: #0f172a;
      color: #dbeafe;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast-item {
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, 0.92);
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      box-shadow: var(--shadow);
      animation: toast-in 0.22s ease both;
    }

    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .hidden-file {
      display: none;
    }

    .footer {
      color: var(--muted);
      text-align: center;
      padding: 26px 0 0;
      font-size: 0.9rem;
    }

    @media (max-width: 1160px) {
      .hero-grid,
      .app-layout {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100% - 20px, 1480px);
      }

      .form-grid,
      .stat-grid,
      .skeleton-row {
        grid-template-columns: 1fr;
      }

      .hero-actions,
      .button-row,
      .preview-toolbar,
      .code-header {
        align-items: stretch;
        flex-direction: column;
      }

      .btn,
      .device-tabs,
      .code-tabs {
        width: 100%;
      }

      .device-tabs button,
      .code-tabs button {
        flex: 1;
      }

      .preview-canvas {
        padding: 12px;
      }

      .mock-content {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useMemo, useRef, useState } = React;

    const STORAGE_KEY = "advanced-navigation-generator-pro-state-v1";

    const defaultPages = [
      { id: cryptoSafeId(), name: "Home", link: "#home", icon: "🏠", active: true, newTab: false, group: "Main" },
      { id: cryptoSafeId(), name: "Projects", link: "#projects", icon: "🚀", active: false, newTab: false, group: "Main" },
      { id: cryptoSafeId(), name: "Docs", link: "#docs", icon: "📚", active: false, newTab: false, group: "Resources" },
      { id: cryptoSafeId(), name: "Contact", link: "#contact", icon: "✉️", active: false, newTab: false, group: "Main" }
    ];

    const defaultSettings = {
      navType: "horizontal",
      navVariant: "glass",
      brandName: "NavForge",
      brandInitial: "N",
      showBrand: true,
      showIcons: true,
      showSearch: false,
      responsive: true,
      animated: true,
      compact: false,
      transparent: false,
      position: "normal",
      navBg: "#111827",
      navText: "#ffffff",
      navAccent: "#7c3aed",
      hoverBg: "rgba(255,255,255,0.14)",
      radius: 18,
      gap: 10,
      padding: 12,
      fontSize: 15,
      customCss: "",
      extraInlineStyle: "",
      exportMode: "component",
      includeDemoContent: true
    };

    const presets = [
      {
        id: "glass",
        name: "Glass SaaS",
        settings: {
          navVariant: "glass",
          navBg: "#111827",
          navText: "#ffffff",
          navAccent: "#7c3aed",
          radius: 18,
          gap: 10,
          padding: 12,
          transparent: true,
          animated: true
        }
      },
      {
        id: "pill",
        name: "Rounded Pill",
        settings: {
          navVariant: "pill",
          navBg: "#0f172a",
          navText: "#ffffff",
          navAccent: "#06b6d4",
          radius: 999,
          gap: 8,
          padding: 10,
          transparent: false,
          animated: true
        }
      },
      {
        id: "minimal",
        name: "Clean Minimal",
        settings: {
          navVariant: "minimal",
          navBg: "#ffffff",
          navText: "#111827",
          navAccent: "#2563eb",
          hoverBg: "rgba(37,99,235,0.1)",
          radius: 14,
          gap: 6,
          padding: 10,
          transparent: false,
          animated: false
        }
      },
      {
        id: "neo",
        name: "Neo Brutal",
        settings: {
          navVariant: "neo",
          navBg: "#fde047",
          navText: "#111827",
          navAccent: "#ef4444",
          hoverBg: "rgba(17,24,39,0.1)",
          radius: 12,
          gap: 8,
          padding: 12,
          transparent: false,
          animated: false
        }
      }
    ];

    function cryptoSafeId() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "id-" + Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("`", "&#096;");
    }

    function safeHref(value) {
      const href = String(value || "#").trim();
      if (!href) return "#";
      const lower = href.toLowerCase();
      if (lower.startsWith("javascript:") || lower.startsWith("data:text/html")) return "#";
      return href;
    }

    function normalizePages(pages) {
      return pages.map((page, index) => ({
        id: page.id || cryptoSafeId(),
        name: page.name || `Page ${index + 1}`,
        link: safeHref(page.link || `#page-${index + 1}`),
        icon: page.icon || "",
        active: Boolean(page.active),
        newTab: Boolean(page.newTab),
        group: page.group || "Main"
      }));
    }

    function classNames(...items) {
      return items.filter(Boolean).join(" ");
    }

    function buildNavClass(settings, mobileOpen = false) {
      return classNames(
        "generated-nav",
        settings.navType === "vertical" && "vertical",
        settings.navVariant,
        settings.transparent && "transparent",
        settings.responsive && "responsive",
        settings.animated && "animated",
        settings.compact && "compact",
        settings.position === "sticky" && "sticky",
        settings.position === "fixed" && "fixed",
        mobileOpen && "open"
      );
    }

    function navStyleVars(settings) {
      return {
        "--nav-bg": settings.navBg,
        "--nav-text": settings.navText,
        "--nav-accent": settings.navAccent,
        "--nav-hover": settings.hoverBg,
        "--nav-radius": `${settings.radius}px`,
        "--nav-gap": `${settings.gap}px`,
        "--nav-padding": `${settings.padding}px`,
        "--nav-font-size": `${settings.fontSize}px`
      };
    }

    function styleVarsText(settings) {
      return [
        `--nav-bg: ${settings.navBg};`,
        `--nav-text: ${settings.navText};`,
        `--nav-accent: ${settings.navAccent};`,
        `--nav-hover: ${settings.hoverBg};`,
        `--nav-radius: ${settings.radius}px;`,
        `--nav-gap: ${settings.gap}px;`,
        `--nav-padding: ${settings.padding}px;`,
        `--nav-font-size: ${settings.fontSize}px;`
      ].join(" ");
    }

    function buildCss(settings) {
      return `.generated-nav {
  --nav-bg: ${settings.navBg};
  --nav-text: ${settings.navText};
  --nav-accent: ${settings.navAccent};
  --nav-hover: ${settings.hoverBg};
  --nav-radius: ${settings.radius}px;
  --nav-gap: ${settings.gap}px;
  --nav-padding: ${settings.padding}px;
  --nav-font-size: ${settings.fontSize}px;
  --nav-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
  width: 100%;
  position: relative;
  z-index: 2;
  background: var(--nav-bg);
  color: var(--nav-text);
  border-radius: var(--nav-radius);
  box-shadow: var(--nav-shadow);
  border: 1px solid rgba(255,255,255,0.14);
}
.generated-nav.sticky { position: sticky; top: 0; }
.generated-nav.transparent,
.generated-nav.glass { background: rgba(17,24,39,0.72); backdrop-filter: blur(14px); }
.generated-nav.pill { border-radius: 999px; }
.generated-nav.minimal { box-shadow: none; border-color: rgba(15,23,42,0.08); }
.generated-nav.neo { border: 2px solid rgba(0,0,0,0.3); box-shadow: 8px 8px 0 rgba(0,0,0,0.18); }
.generated-nav-inner { display: flex; align-items: center; gap: var(--nav-gap); padding: var(--nav-padding); }
.generated-nav.vertical .generated-nav-inner { align-items: stretch; flex-direction: column; }
.generated-brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: -0.03em; white-space: nowrap; margin-right: auto; color: var(--nav-text); text-decoration: none; }
.generated-brand-mark { display: grid; place-items: center; width: 34px; height: 34px; border-radius: 12px; background: linear-gradient(135deg, var(--nav-accent), #06b6d4); color: #fff; font-weight: 900; }
.generated-menu { display: flex; align-items: center; gap: var(--nav-gap); flex-wrap: wrap; }
.generated-nav.vertical .generated-menu { display: grid; width: 100%; align-items: stretch; }
.generated-menu a,
.generated-drop-toggle { position: relative; display: inline-flex; align-items: center; justify-content: center; gap: 7px; min-height: 40px; color: var(--nav-text); text-decoration: none; font-size: var(--nav-font-size); font-weight: 750; border-radius: calc(var(--nav-radius) - 7px); padding: 9px 13px; background: transparent; border: 1px solid transparent; cursor: pointer; transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease; }
.generated-menu a:hover,
.generated-menu a:focus-visible,
.generated-drop:hover .generated-drop-toggle,
.generated-drop-toggle:focus-visible { background: var(--nav-hover); border-color: rgba(255,255,255,0.16); transform: translateY(-1px); outline: none; }
.generated-menu a.active { background: linear-gradient(135deg, var(--nav-accent), #06b6d4); color: #fff; }
.generated-menu a.active::after { content: ""; position: absolute; left: 14px; right: 14px; bottom: 5px; height: 2px; border-radius: 999px; background: rgba(255,255,255,0.8); }
.generated-drop { position: relative; }
.generated-drop-menu { position: absolute; top: calc(100% + 8px); left: 0; min-width: 210px; display: none; padding: 8px; border-radius: 16px; background: var(--nav-bg); box-shadow: var(--nav-shadow); border: 1px solid rgba(255,255,255,0.14); }
.generated-drop:hover .generated-drop-menu,
.generated-drop:focus-within .generated-drop-menu { display: grid; gap: 4px; }
.generated-search { display: flex; align-items: center; gap: 6px; min-width: 180px; border-radius: calc(var(--nav-radius) - 7px); padding: 7px 10px; margin-left: 4px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.12); }
.generated-search input { border: 0; background: transparent; color: var(--nav-text); padding: 2px; outline: none; width: 100%; }
.generated-search input::placeholder { color: rgba(255,255,255,0.7); }
.generated-mobile-toggle { display: none; margin-left: auto; width: 42px; height: 42px; border-radius: 13px; border: 1px solid rgba(255,255,255,0.16); background: rgba(255,255,255,0.1); color: var(--nav-text); cursor: pointer; }
.generated-mobile-toggle span { display: block; width: 18px; height: 2px; margin: 4px auto; border-radius: 999px; background: currentColor; }
.generated-nav.compact .generated-menu a,
.generated-nav.compact .generated-drop-toggle { min-height: 34px; padding: 7px 10px; }
.generated-nav.animated .generated-menu a::before,
.generated-nav.animated .generated-drop-toggle::before { content: ""; position: absolute; inset: auto 50% 4px 50%; height: 2px; border-radius: 999px; background: currentColor; opacity: 0.85; transition: left 0.2s ease, right 0.2s ease; }
.generated-nav.animated .generated-menu a:hover::before,
.generated-nav.animated .generated-drop-toggle:hover::before { left: 13px; right: 13px; }
@media (max-width: 720px) {
  .generated-nav.responsive .generated-mobile-toggle { display: inline-grid; place-items: center; }
  .generated-nav.responsive .generated-menu,
  .generated-nav.responsive .generated-search { display: none; }
  .generated-nav.responsive.open .generated-menu,
  .generated-nav.responsive.open .generated-search { display: grid; width: 100%; }
  .generated-nav.responsive.open .generated-nav-inner { flex-wrap: wrap; }
  .generated-nav.responsive.open .generated-menu { order: 5; align-items: stretch; }
  .generated-nav.responsive.open .generated-search { order: 6; }
  .generated-nav.responsive .generated-drop-menu { position: static; margin-top: 5px; }
}
${settings.customCss.trim() ? `\n/* Custom CSS */\n${settings.customCss.trim()}` : ""}`;
    }

    function groupPages(pages) {
      const groups = new Map();
      pages.forEach((page) => {
        const key = page.group || "Main";
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(page);
      });
      return Array.from(groups.entries());
    }

    function buildLinkHtml(page, settings) {
      const icon = settings.showIcons && page.icon ? `<span aria-hidden="true">${escapeHtml(page.icon)}</span>` : "";
      const target = page.newTab ? ` target="_blank" rel="noopener noreferrer"` : "";
      const active = page.active ? " active" : "";
      const aria = page.active ? ` aria-current="page"` : "";
      return `<a class="nav-link${active}" href="${escapeAttr(safeHref(page.link))}"${target}${aria}>${icon}<span>${escapeHtml(page.name)}</span></a>`;
    }

    function buildMenuHtml(pages, settings) {
      const grouped = groupPages(pages);
      const mainGroups = grouped.filter(([group]) => group.toLowerCase() === "main" || !group.trim());
      const otherGroups = grouped.filter(([group]) => group.toLowerCase() !== "main" && group.trim());
      const mainLinks = mainGroups.flatMap(([, items]) => items).map((page) => `      ${buildLinkHtml(page, settings)}`).join("\n");
      const dropdowns = otherGroups.map(([group, items]) => {
        const links = items.map((page) => `          ${buildLinkHtml(page, settings)}`).join("\n");
        return `      <div class="generated-drop">
        <button class="generated-drop-toggle" type="button" aria-haspopup="true">${escapeHtml(group)} ▾</button>
        <div class="generated-drop-menu" role="menu">
${links}
        </div>
      </div>`;
      }).join("\n");
      return [mainLinks, dropdowns].filter(Boolean).join("\n");
    }

    function buildHtml(settings, pages, includeStyleAttr = true) {
      const cls = buildNavClass(settings, false);
      const styleAttr = includeStyleAttr ? ` style="${escapeAttr(styleVarsText(settings))}${settings.extraInlineStyle ? ` ${escapeAttr(settings.extraInlineStyle)}` : ""}"` : "";
      const brand = settings.showBrand ? `
    <a class="generated-brand" href="#home" aria-label="${escapeAttr(settings.brandName)} home">
      <span class="generated-brand-mark" aria-hidden="true">${escapeHtml(settings.brandInitial || settings.brandName[0] || "N")}</span>
      <span>${escapeHtml(settings.brandName || "Navigation")}</span>
    </a>` : "";
      const mobile = settings.responsive ? `
    <button class="generated-mobile-toggle" type="button" aria-label="Toggle navigation" onclick="this.closest('.generated-nav').classList.toggle('open')">
      <span></span><span></span><span></span>
    </button>` : "";
      const search = settings.showSearch ? `
    <label class="generated-search">
      <span aria-hidden="true">⌕</span>
      <input type="search" placeholder="Search" aria-label="Search navigation" />
    </label>` : "";
      return `<nav class="${escapeAttr(cls)}" aria-label="Main navigation"${styleAttr}>
  <div class="generated-nav-inner">${brand}${mobile}
    <div class="generated-menu">
${buildMenuHtml(pages, settings)}
    </div>${search}
  </div>
</nav>`;
    }

    function buildFullDocument(settings, pages) {
      const css = buildCss(settings);
      const nav = buildHtml(settings, pages, false);
      const content = settings.includeDemoContent ? `
  <main class="demo-content" id="home">
    <section>
      <h1>Generated Navigation Preview</h1>
      <p>This page uses the navigation exported from Advanced Navigation Generator Pro.</p>
    </section>
  </main>` : "";
      return `<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>${escapeHtml(settings.brandName || "Generated Navigation")}</title>
  <style>
${css}
body { margin: 0; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f8fafc; color: #111827; padding: 24px; }
.demo-content { padding: 56px 10px; }
.demo-content h1 { font-size: clamp(2rem, 6vw, 4rem); letter-spacing: -0.06em; margin: 0 0 12px; }
.demo-content p { color: #64748b; font-size: 1.1rem; line-height: 1.7; }
  </style>
</head>
<body>
${nav}${content}
</body>
</html>`;
    }

    function downloadFile(filename, content, type = "text/plain") {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function App() {
      const [settings, setSettings] = useState(defaultSettings);
      const [pages, setPages] = useState(defaultPages);
      const [device, setDevice] = useState("desktop");
      const [codeTab, setCodeTab] = useState("full");
      const [mobileOpen, setMobileOpen] = useState(false);
      const [toast, setToast] = useState([]);
      const [filter, setFilter] = useState("");
      const [savedAt, setSavedAt] = useState(null);
      const [isLight, setIsLight] = useState(false);
      const importRef = useRef(null);

      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const parsed = JSON.parse(saved);
            if (parsed.settings) setSettings({ ...defaultSettings, ...parsed.settings });
            if (Array.isArray(parsed.pages) && parsed.pages.length) setPages(normalizePages(parsed.pages));
            if (parsed.isLight) setIsLight(Boolean(parsed.isLight));
          }
        } catch (error) {
          console.warn("Could not load saved navigation state", error);
        }
      }, []);

      useEffect(() => {
        document.body.classList.toggle("light-mode", isLight);
      }, [isLight]);

      useEffect(() => {
        const payload = { settings, pages, isLight };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        setSavedAt(new Date());
      }, [settings, pages, isLight]);

      const normalizedPages = useMemo(() => normalizePages(pages), [pages]);
      const htmlCode = useMemo(() => buildHtml(settings, normalizedPages), [settings, normalizedPages]);
      const cssCode = useMemo(() => buildCss(settings), [settings]);
      const fullCode = useMemo(() => buildFullDocument(settings, normalizedPages), [settings, normalizedPages]);
      const jsonCode = useMemo(() => JSON.stringify({ settings, pages: normalizedPages }, null, 2), [settings, normalizedPages]);

      const activeCode = useMemo(() => {
        if (codeTab === "html") return htmlCode;
        if (codeTab === "css") return cssCode;
        if (codeTab === "json") return jsonCode;
        return fullCode;
      }, [codeTab, htmlCode, cssCode, jsonCode, fullCode]);

      const visiblePages = useMemo(() => {
        const q = filter.trim().toLowerCase();
        if (!q) return pages;
        return pages.filter((page) => `${page.name} ${page.link} ${page.group} ${page.icon}`.toLowerCase().includes(q));
      }, [pages, filter]);

      function notify(message) {
        const id = cryptoSafeId();
        setToast((items) => [...items, { id, message }]);
        setTimeout(() => setToast((items) => items.filter((item) => item.id !== id)), 2600);
      }

      function updateSetting(key, value) {
        setSettings((current) => ({ ...current, [key]: value }));
      }

      function updatePage(id, key, value) {
        setPages((current) => current.map((page) => page.id === id ? { ...page, [key]: value } : page));
      }

      function addPage() {
        setPages((current) => [
          ...current,
          { id: cryptoSafeId(), name: `Page ${current.length + 1}`, link: `#page-${current.length + 1}`, icon: "✨", active: false, newTab: false, group: "Main" }
        ]);
      }

      function duplicatePage(id) {
        setPages((current) => {
          const page = current.find((item) => item.id === id);
          if (!page) return current;
          const index = current.findIndex((item) => item.id === id);
          const copy = { ...page, id: cryptoSafeId(), name: `${page.name} Copy`, active: false };
          const next = [...current];
          next.splice(index + 1, 0, copy);
          return next;
        });
      }

      function removePage(id) {
        setPages((current) => current.length <= 1 ? current : current.filter((page) => page.id !== id));
      }

      function movePage(id, direction) {
        setPages((current) => {
          const index = current.findIndex((page) => page.id === id);
          const target = index + direction;
          if (index < 0 || target < 0 || target >= current.length) return current;
          const next = [...current];
          [next[index], next[target]] = [next[target], next[index]];
          return next;
        });
      }

      function setActivePage(id) {
        setPages((current) => current.map((page) => ({ ...page, active: page.id === id })));
      }

      function applyPreset(preset) {
        setSettings((current) => ({ ...current, ...preset.settings }));
        notify(`${preset.name} preset applied`);
      }

      async function copyCode() {
        try {
          await navigator.clipboard.writeText(activeCode);
          notify("Code copied to clipboard");
        } catch (error) {
          const textarea = document.createElement("textarea");
          textarea.value = activeCode;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand("copy");
          textarea.remove();
          notify("Code copied with fallback method");
        }
      }

      function copyAll() {
        setCodeTab("full");
        setTimeout(async () => {
          try {
            await navigator.clipboard.writeText(fullCode);
            notify("Full HTML document copied");
          } catch {
            notify("Open the Full Page tab and copy manually");
          }
        }, 0);
      }

      function exportHtml() {
        downloadFile("generated-navigation.html", fullCode, "text/html");
        notify("HTML file downloaded");
      }

      function exportJson() {
        downloadFile("navigation-config.json", jsonCode, "application/json");
        notify("JSON config downloaded");
      }

      function importJson(event) {
        const file = event.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const parsed = JSON.parse(String(reader.result));
            if (parsed.settings) setSettings({ ...defaultSettings, ...parsed.settings });
            if (Array.isArray(parsed.pages) && parsed.pages.length) setPages(normalizePages(parsed.pages));
            notify("Navigation config imported");
          } catch (error) {
            notify("Import failed: invalid JSON");
          }
          event.target.value = "";
        };
        reader.readAsText(file);
      }

      function resetAll() {
        setSettings(defaultSettings);
        setPages(defaultPages.map((page) => ({ ...page, id: cryptoSafeId() })));
        setFilter("");
        notify("Generator reset");
      }

      const navPreview = (
        <GeneratedNav
          settings={settings}
          pages={normalizedPages}
          mobileOpen={mobileOpen}
          setMobileOpen={setMobileOpen}
        />
      );

      return (
        <>
          <div className="shell">
            <header className="hero">
              <div className="hero-grid">
                <section className="hero-card">
                  <div className="eyebrow"><span className="pulse-dot"></span> Advanced Navigation Generator Pro</div>
                  <h1><span className="gradient-text">Build, preview, export</span> modern navigation bars.</h1>
                  <p>
                    Keep the original generator workflow, but upgrade it with responsive hamburger mode, brand controls,
                    dropdown groups, icons, live device preview, safe code generation, presets, import/export, local saves,
                    accessibility helpers, and full-page HTML output.
                  </p>
                  <div className="hero-actions">
                    <button className="btn primary" onClick={() => document.getElementById("builder")?.scrollIntoView({ behavior: "smooth" })}>Start building</button>
                    <button className="btn" onClick={copyAll}>Copy full page</button>
                    <button className="btn" onClick={() => setIsLight((value) => !value)}>{isLight ? "Dark mode" : "Light mode"}</button>
                  </div>
                </section>

                <aside className="mini-card" aria-label="Project stats">
                  <div>
                    <div className="eyebrow">Autosaved locally</div>
                    <h2 style={{ margin: "0 0 10px", letterSpacing: "-0.04em" }}>Generator status</h2>
                    <p style={{ color: "var(--muted)", lineHeight: 1.6, margin: 0 }}>
                      Last save: {savedAt ? savedAt.toLocaleTimeString() : "loading..."}
                    </p>
                  </div>
                  <div className="stat-grid">
                    <div className="stat"><b>{pages.length}</b><span>links</span></div>
                    <div className="stat"><b>{settings.navType}</b><span>layout</span></div>
                    <div className="stat"><b>{settings.responsive ? "on" : "off"}</b><span>responsive</span></div>
                    <div className="stat"><b>{settings.showSearch ? "on" : "off"}</b><span>search</span></div>
                  </div>
                </aside>
              </div>
            </header>

            <main className="app-layout" id="builder">
              <aside className="panel">
                <div className="panel-header">
                  <div>
                    <h2>Builder Controls</h2>
                    <p>Edit layout, style, links, export mode, and accessibility options.</p>
                  </div>
                </div>

                <div className="panel-body">
                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Presets</h3>
                        <p>Instant styles you can customize further.</p>
                      </div>
                    </div>
                    <div className="preset-row">
                      {presets.map((preset) => (
                        <button
                          key={preset.id}
                          className={classNames("chip", settings.navVariant === preset.settings.navVariant && "active")}
                          onClick={() => applyPreset(preset)}
                          type="button"
                        >
                          {preset.name}
                        </button>
                      ))}
                    </div>
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Layout</h3>
                        <p>Original horizontal/vertical option plus modern behavior.</p>
                      </div>
                    </div>
                    <div className="form-grid">
                      <div className="field">
                        <label>Navigation Type</label>
                        <select value={settings.navType} onChange={(e) => updateSetting("navType", e.target.value)}>
                          <option value="horizontal">Horizontal</option>
                          <option value="vertical">Vertical</option>
                        </select>
                      </div>
                      <div className="field">
                        <label>Variant</label>
                        <select value={settings.navVariant} onChange={(e) => updateSetting("navVariant", e.target.value)}>
                          <option value="glass">Glass</option>
                          <option value="pill">Pill</option>
                          <option value="minimal">Minimal</option>
                          <option value="neo">Neo Brutal</option>
                        </select>
                      </div>
                      <div className="field">
                        <label>Position</label>
                        <select value={settings.position} onChange={(e) => updateSetting("position", e.target.value)}>
                          <option value="normal">Normal</option>
                          <option value="sticky">Sticky</option>
                          <option value="fixed">Fixed-like preview</option>
                        </select>
                      </div>
                      <div className="field">
                        <label>Font Size</label>
                        <input type="number" min="11" max="24" value={settings.fontSize} onChange={(e) => updateSetting("fontSize", Number(e.target.value))} />
                      </div>
                    </div>
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Brand</h3>
                        <p>Add logo text and a compact brand mark.</p>
                      </div>
                    </div>
                    <div className="form-grid">
                      <div className="field">
                        <label>Brand Name</label>
                        <input value={settings.brandName} onChange={(e) => updateSetting("brandName", e.target.value)} placeholder="My Site" />
                      </div>
                      <div className="field">
                        <label>Brand Mark</label>
                        <input maxLength="2" value={settings.brandInitial} onChange={(e) => updateSetting("brandInitial", e.target.value)} placeholder="N" />
                      </div>
                    </div>
                    <div className="toggle-row">
                      <div><strong>Show brand</strong><span>Include brand block in generated nav.</span></div>
                      <input type="checkbox" checked={settings.showBrand} onChange={(e) => updateSetting("showBrand", e.target.checked)} />
                    </div>
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Colors & Spacing</h3>
                        <p>Visual controls replace fragile raw inline style strings.</p>
                      </div>
                    </div>
                    <div className="form-grid">
                      <div className="field">
                        <label>Background</label>
                        <input type="color" value={settings.navBg} onChange={(e) => updateSetting("navBg", e.target.value)} />
                      </div>
                      <div className="field">
                        <label>Text</label>
                        <input type="color" value={settings.navText} onChange={(e) => updateSetting("navText", e.target.value)} />
                      </div>
                      <div className="field">
                        <label>Accent</label>
                        <input type="color" value={settings.navAccent} onChange={(e) => updateSetting("navAccent", e.target.value)} />
                      </div>
                      <div className="field">
                        <label>Hover Background</label>
                        <input value={settings.hoverBg} onChange={(e) => updateSetting("hoverBg", e.target.value)} placeholder="rgba(255,255,255,0.14)" />
                      </div>
                      <div className="field">
                        <label>Radius</label>
                        <input type="range" min="0" max="48" value={Math.min(settings.radius, 48)} onChange={(e) => updateSetting("radius", Number(e.target.value))} />
                      </div>
                      <div className="field">
                        <label>Gap</label>
                        <input type="range" min="0" max="28" value={settings.gap} onChange={(e) => updateSetting("gap", Number(e.target.value))} />
                      </div>
                      <div className="field full">
                        <label>Extra Inline Style</label>
                        <input value={settings.extraInlineStyle} onChange={(e) => updateSetting("extraInlineStyle", e.target.value)} placeholder="e.g. max-width: 1100px; margin: auto;" />
                      </div>
                    </div>
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Features</h3>
                        <p>Toggle modern nav features on or off.</p>
                      </div>
                    </div>
                    <div className="toggle-row">
                      <div><strong>Responsive hamburger</strong><span>Creates mobile toggle behavior in exported HTML.</span></div>
                      <input type="checkbox" checked={settings.responsive} onChange={(e) => updateSetting("responsive", e.target.checked)} />
                    </div>
                    <div className="toggle-row">
                      <div><strong>Icons</strong><span>Display emoji/icon field beside each link.</span></div>
                      <input type="checkbox" checked={settings.showIcons} onChange={(e) => updateSetting("showIcons", e.target.checked)} />
                    </div>
                    <div className="toggle-row">
                      <div><strong>Search box</strong><span>Adds an accessible search input in the nav.</span></div>
                      <input type="checkbox" checked={settings.showSearch} onChange={(e) => updateSetting("showSearch", e.target.checked)} />
                    </div>
                    <div className="toggle-row">
                      <div><strong>Animated underline</strong><span>Hover animation for modern feedback.</span></div>
                      <input type="checkbox" checked={settings.animated} onChange={(e) => updateSetting("animated", e.target.checked)} />
                    </div>
                    <div className="toggle-row">
                      <div><strong>Compact mode</strong><span>Reduces padding for dense dashboards.</span></div>
                      <input type="checkbox" checked={settings.compact} onChange={(e) => updateSetting("compact", e.target.checked)} />
                    </div>
                    <div className="toggle-row">
                      <div><strong>Transparent glass</strong><span>Uses blur and translucent background.</span></div>
                      <input type="checkbox" checked={settings.transparent} onChange={(e) => updateSetting("transparent", e.target.checked)} />
                    </div>
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Pages</h3>
                        <p>Original page name/link inputs plus icons, groups, reorder, active state, and target control.</p>
                      </div>
                    </div>
                    <div className="field" style={{ marginBottom: 12 }}>
                      <label>Filter Pages</label>
                      <input value={filter} onChange={(e) => setFilter(e.target.value)} placeholder="Search name, link, group, icon..." />
                    </div>
                    <div className="page-list">
                      {visiblePages.map((page, displayIndex) => {
                        const index = pages.findIndex((item) => item.id === page.id);
                        return (
                          <article className="page-card" key={page.id}>
                            <div className="page-card-header">
                              <div>
                                <strong>Page {index + 1}: {page.name || "Untitled"}</strong>
                                <span>{page.active ? "Active link" : page.group || "Main"}</span>
                              </div>
                              <div className="icon-btns">
                                <button className="btn small" type="button" onClick={() => movePage(page.id, -1)} aria-label="Move page up">↑</button>
                                <button className="btn small" type="button" onClick={() => movePage(page.id, 1)} aria-label="Move page down">↓</button>
                                <button className="btn small" type="button" onClick={() => duplicatePage(page.id)}>Copy</button>
                                <button className="btn small danger" type="button" onClick={() => removePage(page.id)}>Remove</button>
                              </div>
                            </div>
                            <div className="page-card-body">
                              <div className="form-grid">
                                <div className="field">
                                  <label>Page Name</label>
                                  <input value={page.name} onChange={(e) => updatePage(page.id, "name", e.target.value)} placeholder={`Page ${displayIndex + 1}`} />
                                </div>
                                <div className="field">
                                  <label>Page Link</label>
                                  <input value={page.link} onChange={(e) => updatePage(page.id, "link", e.target.value)} placeholder="#section" />
                                </div>
                                <div className="field">
                                  <label>Icon</label>
                                  <input value={page.icon} onChange={(e) => updatePage(page.id, "icon", e.target.value)} placeholder="✨" />
                                </div>
                                <div className="field">
                                  <label>Group</label>
                                  <input value={page.group} onChange={(e) => updatePage(page.id, "group", e.target.value)} placeholder="Main or Resources" />
                                </div>
                              </div>
                              <div className="toggle-row">
                                <div><strong>Active page</strong><span>Adds aria-current and active styling.</span></div>
                                <input type="checkbox" checked={page.active} onChange={() => setActivePage(page.id)} />
                              </div>
                              <div className="toggle-row">
                                <div><strong>Open in new tab</strong><span>Adds target and rel attributes safely.</span></div>
                                <input type="checkbox" checked={page.newTab} onChange={(e) => updatePage(page.id, "newTab", e.target.checked)} />
                              </div>
                            </div>
                          </article>
                        );
                      })}
                    </div>
                    <div className="button-row" style={{ marginTop: 14 }}>
                      <button className="btn primary" type="button" onClick={addPage}>Add Page</button>
                      <button className="btn" type="button" onClick={() => setPages((items) => items.map((item) => ({ ...item, group: "Main" })))}>Flatten Groups</button>
                    </div>
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Advanced CSS</h3>
                        <p>Optional extra styles appended to exported CSS.</p>
                      </div>
                    </div>
                    <textarea value={settings.customCss} onChange={(e) => updateSetting("customCss", e.target.value)} placeholder=".generated-nav { max-width: 1120px; margin: 0 auto; }" />
                  </section>

                  <section className="form-section">
                    <div className="section-title">
                      <div>
                        <h3>Import / Export</h3>
                        <p>Save full HTML, copy code, or reuse a JSON configuration.</p>
                      </div>
                    </div>
                    <input ref={importRef} className="hidden-file" type="file" accept="application/json,.json" onChange={importJson} />
                    <div className="button-row">
                      <button className="btn primary" type="button" onClick={copyCode}>Copy Current Tab</button>
                      <button className="btn success" type="button" onClick={exportHtml}>Download HTML</button>
                      <button className="btn" type="button" onClick={exportJson}>Export JSON</button>
                      <button className="btn" type="button" onClick={() => importRef.current?.click()}>Import JSON</button>
                      <button className="btn danger" type="button" onClick={resetAll}>Reset</button>
                    </div>
                    <div className="notice" style={{ marginTop: 12 }}>
                      The old version tried to read <code>outerHTML</code> from React elements and passed a raw string into the React <code>style</code> prop. This version generates code from structured data, so preview and exported markup stay reliable.
                    </div>
                  </section>
                </div>
              </aside>

              <section className="workspace">
                <div className="preview-stage">
                  <div className="preview-toolbar">
                    <div>
                      <h2>Live Preview</h2>
                      <p style={{ color: "var(--muted)", margin: "4px 0 0" }}>Test desktop, tablet, mobile, dropdown, and responsive behavior.</p>
                    </div>
                    <div className="button-row">
                      <div className="device-tabs" role="tablist" aria-label="Preview device size">
                        {[
                          ["desktop", "Desktop"],
                          ["tablet", "Tablet"],
                          ["mobile", "Mobile"]
                        ].map(([id, label]) => (
                          <button key={id} className={device === id ? "active" : ""} onClick={() => setDevice(id)} type="button">{label}</button>
                        ))}
                      </div>
                      <button className="btn small" type="button" onClick={() => setMobileOpen((value) => !value)}>Toggle mobile menu</button>
                    </div>
                  </div>

                  <div className="preview-canvas">
                    <div className={classNames("device-frame", device)}>
                      <div className="mock-page">
                        {navPreview}
                        <div className="mock-content">
                          <h3>Beautiful navigation, generated safely.</h3>
                          <p>
                            The preview is using the same page data and style variables as the exported code. Group any item outside "Main" to create dropdown menus automatically.
                          </p>
                          <div className="skeleton-row" aria-hidden="true">
                            <div className="skeleton-card"></div>
                            <div className="skeleton-card"></div>
                            <div className="skeleton-card"></div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="code-panel">
                  <div className="code-header">
                    <div>
                      <h2>Generated Code</h2>
                      <p style={{ color: "var(--muted)", margin: "4px 0 0" }}>Copy only the part you need or export a full page.</p>
                    </div>
                    <div className="code-tabs" role="tablist" aria-label="Code type">
                      {[
                        ["full", "Full Page"],
                        ["html", "HTML"],
                        ["css", "CSS"],
                        ["json", "JSON"]
                      ].map(([id, label]) => (
                        <button key={id} className={codeTab === id ? "active" : ""} onClick={() => setCodeTab(id)} type="button">{label}</button>
                      ))}
                    </div>
                    <button className="btn primary" type="button" onClick={copyCode}>Copy</button>
                  </div>
                  <pre><code>{activeCode}</code></pre>
                </div>
              </section>
            </main>

            <footer className="footer">
              <p>Advanced Navigation Generator Pro · Single-file React app · Exports reusable HTML, CSS, and JSON.</p>
            </footer>
          </div>

          <div className="toast" aria-live="polite" aria-atomic="true">
            {toast.map((item) => <div className="toast-item" key={item.id}>{item.message}</div>)}
          </div>
        </>
      );
    }

    function GeneratedNav({ settings, pages, mobileOpen, setMobileOpen }) {
      const grouped = groupPages(pages);
      const mainLinks = grouped
        .filter(([group]) => group.toLowerCase() === "main" || !group.trim())
        .flatMap(([, items]) => items);
      const dropdowns = grouped.filter(([group]) => group.toLowerCase() !== "main" && group.trim());

      const renderLink = (page) => (
        <a
          key={page.id}
          className={classNames("nav-link", page.active && "active")}
          href={safeHref(page.link)}
          target={page.newTab ? "_blank" : undefined}
          rel={page.newTab ? "noopener noreferrer" : undefined}
          aria-current={page.active ? "page" : undefined}
          onClick={(event) => event.preventDefault()}
        >
          {settings.showIcons && page.icon ? <span aria-hidden="true">{page.icon}</span> : null}
          <span>{page.name}</span>
        </a>
      );

      return (
        <nav className={buildNavClass(settings, mobileOpen)} style={{ ...navStyleVars(settings) }} aria-label="Main navigation preview">
          <div className="generated-nav-inner">
            {settings.showBrand && (
              <a className="generated-brand" href="#home" onClick={(event) => event.preventDefault()} aria-label={`${settings.brandName} home`}>
                <span className="generated-brand-mark" aria-hidden="true">{settings.brandInitial || settings.brandName?.[0] || "N"}</span>
                <span>{settings.brandName || "Navigation"}</span>
              </a>
            )}

            {settings.responsive && (
              <button className="generated-mobile-toggle" type="button" aria-label="Toggle navigation" onClick={() => setMobileOpen((value) => !value)}>
                <span></span><span></span><span></span>
              </button>
            )}

            <div className="generated-menu">
              {mainLinks.map(renderLink)}
              {dropdowns.map(([group, items]) => (
                <div className="generated-drop" key={group}>
                  <button className="generated-drop-toggle" type="button" aria-haspopup="true">{group} ▾</button>
                  <div className="generated-drop-menu" role="menu">
                    {items.map(renderLink)}
                  </div>
                </div>
              ))}
            </div>

            {settings.showSearch && (
              <label className="generated-search">
                <span aria-hidden="true">⌕</span>
                <input type="search" placeholder="Search" aria-label="Search navigation" onChange={() => {}} />
              </label>
            )}
          </div>
        </nav>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
