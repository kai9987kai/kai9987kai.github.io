<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Studio: Transformers.js Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
    
    // Configuration
    env.allowLocalModels = false;
    let generator = null;
    let dataset = [];
    let isTrained = false;

    // --- UI Logic ---
    const updateStatus = (msg, color = "bg-indigo-600") => {
      const el = document.getElementById('status-badge');
      el.textContent = msg;
      el.className = `${color} text-white px-3 py-1 rounded-full text-xs font-bold`;
    };

    // --- Core Functions ---
    async function loadModel() {
      updateStatus("Loading Model...", "bg-yellow-500");
      generator = await pipeline('text-generation', 'Xenova/distilgpt2');
      updateStatus("Model Loaded", "bg-green-600");
    }

    // Initialize on load
    loadModel();

    // Event: Add Row
    document.getElementById('add-row').addEventListener('click', () => {
      const input = document.getElementById('input-text').value.trim();
      const output = document.getElementById('output-text').value.trim();
      
      if(!input || !output) return alert("Fill in both fields");
      
      dataset.push({ input, output });
      
      const tbody = document.querySelector('#example-table tbody');
      const row = document.createElement('tr');
      row.innerHTML = `<td class="p-2 border">${input}</td><td class="p-2 border">${output}</td><td class="p-2 border text-orange-500">Pending</td>`;
      tbody.appendChild(row);
      
      document.getElementById('input-text').value = '';
      document.getElementById('output-text').value = '';
    });

    // Event: Train (Simulated)
    document.getElementById('train-model').addEventListener('click', async () => {
      if(dataset.length === 0) return alert("Add data first!");
      
      document.getElementById('train-model').disabled = true;
      updateStatus("Training...", "bg-blue-600");
      
      // Simulate epoch progression
      for(let i = 0; i < 3; i++) {
        await new Promise(r => setTimeout(r, 1000));
        console.log(`Epoch ${i+1}/3 complete`);
      }
      
      document.querySelectorAll('#example-table td:last-child').forEach(td => td.textContent = "Trained");
      isTrained = true;
      document.getElementById('train-model').disabled = false;
      updateStatus("Model Fine-Tuned", "bg-purple-600");
    });

    // Event: Run Inference
    document.getElementById('run-inference').addEventListener('click', async () => {
      if(!generator) return alert("Model still loading...");
      
      const prompt = document.getElementById('test-input').value;
      document.getElementById('inference-output').textContent = "Generating...";
      
      const output = await generator(prompt, { max_new_tokens: 30 });
      document.getElementById('inference-output').textContent = output[0].generated_text;
    });
  </script>
</head>

<body class="bg-gray-100 p-8">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-lg">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">LLM Training Studio</h1>
      <div id="status-badge" class="bg-gray-400 text-white px-3 py-1 rounded-full text-xs font-bold">Initializing...</div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div>
        <h2 class="font-semibold mb-2">1. Add Training Pairs</h2>
        <input id="input-text" type="text" placeholder="Input" class="w-full border p-2 mb-2 rounded" />
        <textarea id="output-text" placeholder="Expected Output" class="w-full border p-2 mb-2 rounded"></textarea>
        <button id="add-row" class="bg-blue-600 text-white px-4 py-2 rounded w-full">Add Row</button>
        
        <table id="example-table" class="w-full mt-4 text-sm border-collapse">
          <thead><tr class="bg-gray-200"><th class="border p-2">In</th><th class="border p-2">Out</th><th class="border p-2">Status</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div>
        <h2 class="font-semibold mb-2">2. Training Control</h2>
        <button id="train-model" class="bg-indigo-600 text-white px-4 py-2 rounded w-full mb-6">Start Training Simulation</button>

        <h2 class="font-semibold mb-2">3. Inference</h2>
        <input id="test-input" type="text" placeholder="Enter prompt..." class="w-full border p-2 mb-2 rounded" />
        <button id="run-inference" class="bg-green-600 text-white px-4 py-2 rounded w-full mb-4">Run Inference</button>
        <div id="inference-output" class="bg-gray-50 p-4 border rounded italic">Result will appear here...</div>
      </div>
    </div>
  </div>
</body>
</html>
