<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enhanced 3D Sun Disintegration Simulation v14</title>
  <style>
    :root {
      --bg: #05060a;
      --panel: rgba(10, 12, 18, 0.72);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f2f6ff;
      --muted: #a9b3c7;
      --accent: #ffb347;
      --accent-2: #ff6b6b;
      --good: #74f1b5;
      --bad: #ff7b7b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      --radius: 18px;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 179, 71, 0.10), transparent 18%),
        radial-gradient(circle at 50% 50%, rgba(255, 107, 107, 0.06), transparent 36%),
        linear-gradient(180deg, #02030a 0%, #05060a 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #controls {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: min(340px, calc(100vw - 32px));
      max-height: calc(100vh - 32px);
      overflow: auto;
      background: linear-gradient(180deg, rgba(18, 22, 33, 0.82), rgba(10, 12, 18, 0.72));
      backdrop-filter: blur(14px);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      box-sizing: border-box;
    }

    #controls h1 {
      margin: 0 0 6px;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
      font-weight: 700;
    }

    #controls .sub {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    #controls label,
    #controls select,
    #controls input,
    #controls button,
    #controls p {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin: 9px 0;
      font-size: 0.92rem;
    }

    #controls label {
      color: var(--text);
    }

    #controls input,
    #controls select {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s, transform 0.2s, background 0.2s;
    }

    #controls input:focus,
    #controls select:focus {
      border-color: rgba(255, 179, 71, 0.55);
      background: rgba(255, 255, 255, 0.08);
    }

    #controls select:disabled,
    #controls input:disabled,
    #controls button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btnrow {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 10px;
    }

    #controls button {
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.03));
      color: var(--text);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    #controls button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(255, 179, 71, 0.35);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.22);
    }

    #controls button.primary {
      background: linear-gradient(180deg, rgba(255, 179, 71, 0.22), rgba(255, 107, 107, 0.16));
      border-color: rgba(255, 179, 71, 0.22);
    }

    #controls button.good {
      background: linear-gradient(180deg, rgba(116, 241, 181, 0.18), rgba(116, 241, 181, 0.08));
      border-color: rgba(116, 241, 181, 0.22);
    }

    #controls button.warn {
      background: linear-gradient(180deg, rgba(255, 123, 123, 0.18), rgba(255, 123, 123, 0.08));
      border-color: rgba(255, 123, 123, 0.22);
    }

    #customControls {
      border-top: 1px solid rgba(255, 255, 255, 0.10);
      margin-top: 12px;
      padding-top: 12px;
    }

    #customControls p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.82rem;
      font-style: italic;
      line-height: 1.45;
    }

    #status {
      margin-top: 12px;
      min-height: 3.2em;
      line-height: 1.45;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-weight: 600;
    }

    .meter {
      margin-top: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .bar {
      margin-top: 8px;
      width: 100%;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .bar > div {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.1s linear;
    }

    #loadingIndicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      z-index: 100;
      background: rgba(5, 6, 10, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.10);
      padding: 18px 20px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
      min-width: 200px;
    }

    #loadingIndicator strong {
      display: block;
      margin-bottom: 8px;
      font-size: 1.02rem;
    }

    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 10px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.16);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #dalleImageDiv {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(10, 12, 18, 0.7);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px;
      border-radius: 16px;
      box-shadow: var(--shadow);
      text-align: center;
      width: 130px;
    }

    #dalleImageDiv img {
      width: 104px;
      height: 104px;
      display: block;
      margin: 0 auto 8px;
      border-radius: 999px;
      box-shadow: 0 0 28px rgba(255, 170, 0, 0.28);
    }

    #dalleImageDiv span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
    }

    @media (max-width: 720px) {
      #controls {
        width: calc(100vw - 24px);
        top: 12px;
        left: 12px;
        max-height: 46vh;
      }

      #dalleImageDiv {
        right: 12px;
        top: auto;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="controls">
    <h1>Enhanced 3D Sun Disintegration</h1>
    <p class="sub">Choose a preset or custom object, tune the physics, then launch it into the sun.</p>

    <label for="objectSelect">Choose an object</label>
    <select id="objectSelect">
      <option value="car" data-url="https://raw.githack.com/mrdoob/three.js/dev/examples/models/gltf/Ferrari.glb" data-scale="0.05" data-y-offset="1">Car (Ferrari)</option>
      <option value="chair" data-url="https://raw.githack.com/mrdoob/three.js/dev/examples/models/gltf/SheenChair.glb" data-scale="5" data-y-offset="3">Chair</option>
      <option value="bus" data-url="https://raw.githack.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb" data-scale="3" data-y-offset="2">Truck (Bus Placeholder)</option>
      <option value="custom" data-url="" data-scale="1" data-y-offset="0" selected>Custom (Sphere + Cone)</option>
    </select>

    <div id="customControls">
      <p>Parameters apply to the selected object.</p>

      <div class="row">
        <label>Threshold
          <input type="number" id="customThreshold" value="50" step="1" min="1">
        </label>
        <label>Speed
          <input type="number" id="customSpeed" value="20" step="1" min="0">
        </label>
      </div>

      <div class="row">
        <label>Disintegration Time
          <input type="number" id="customTime" value="3" step="0.1" min="0.2">
        </label>
        <label>Gravity
          <input type="number" id="customGravity" value="1500" step="100" min="0">
        </label>
      </div>
    </div>

    <div class="btnrow">
      <button id="startButton" class="primary" disabled>Start</button>
      <button id="pauseButton" class="good" disabled>Pause</button>
      <button id="resetButton" class="warn" disabled>Reset</button>
    </div>

    <div class="meter">
      <div>Distance to sun: <span id="distanceValue">—</span></div>
      <div>Speed: <span id="speedValue">—</span></div>
      <div class="bar"><div id="distanceBar"></div></div>
    </div>

    <div id="status">Initializing…</div>
  </div>

  <div id="dalleImageDiv">
    <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAiIGhlaWdodD0iMTAwIj48cmFkaWFsR3JhZGllbnQgaWQ9ImdyYWQiIGN4PSI1MCUiIGN5PSI1MCUiIHI9IjUwJSI+PHN0b3Agb2Zmc2V0PSIwJSIgc3R5bGU9InN0b3AtY29sb3I6cmdiKDI1NSwyNTUsMCk7c3RvcC1vcGFjaXR5OjEiIC8+PHN0b3Agb2Zmc2V0PSIxMDAlIiBzdHlsZT0ic3RvcC1jb2xvcjpyZ2IoMjU1LDE2NSwwKTtzdG9wLW9wYWNpdHk6MSIgLz48L3JhZGlhbEdyYWRpZW50PjxjaXJjbGUgY3g9IjUwIiBjeT0iNTAiIHI9IjUwIiBmaWxsPSJ1cmwoI2dyYWQpIi8+PC9zdmc+" alt="Sun artwork">
    <span>Sun Artwork</span>
  </div>

  <div id="loadingIndicator">
    <div class="spinner"></div>
    <strong>Loading model…</strong>
    <div id="loadingText">Please wait</div>
  </div>

  <canvas id="canvas"></canvas>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>

  <script>
    'use strict';

    let scene, camera, renderer, controls, composer, bloomPass;
    let sun, movingObject, starField;
    let particleSystem, particleGeometry, particleMaterial;

    const clock = new THREE.Clock();
    const particleCount = 5000;
    const objectInitialPosition = new THREE.Vector3(250, 0, 0);
    let animationId = null;
    let loadToken = 0;

    const simulationState = {
      running: false,
      paused: false,
      objectSelected: false,
      isLoading: false,
      disintegrating: false,
      startTime: 0,
      disintegrationStartTime: null,
      currentSpeed: 0,
      distance: Infinity,
      params: {},
      modelData: {},
      objectMaxRadius: 50
    };

    const defaultObjectParams = {
      car:   { threshold: 40, initialSpeed: 25, disintegrationTime: 2.5, gravity: 1500, scale: 0.05, yOffset: 1 },
      chair: { threshold: 30, initialSpeed: 15, disintegrationTime: 2.0, gravity: 1000, scale: 5,    yOffset: 3 },
      bus:   { threshold: 55, initialSpeed: 18, disintegrationTime: 4.0, gravity: 2000, scale: 3,    yOffset: 2 }
    };

    const el = {};
    function cacheUI() {
      el.objectSelect = document.getElementById('objectSelect');
      el.customThreshold = document.getElementById('customThreshold');
      el.customSpeed = document.getElementById('customSpeed');
      el.customTime = document.getElementById('customTime');
      el.customGravity = document.getElementById('customGravity');
      el.startButton = document.getElementById('startButton');
      el.pauseButton = document.getElementById('pauseButton');
      el.resetButton = document.getElementById('resetButton');
      el.status = document.getElementById('status');
      el.loadingIndicator = document.getElementById('loadingIndicator');
      el.loadingText = document.getElementById('loadingText');
      el.distanceValue = document.getElementById('distanceValue');
      el.speedValue = document.getElementById('speedValue');
      el.distanceBar = document.getElementById('distanceBar');
    }

    function setStatus(message, isError = false) {
      el.status.textContent = message;
      el.status.style.color = isError ? 'var(--bad)' : 'var(--text)';
    }

    function readParamsFromUI() {
      return {
        threshold: Math.max(1, parseFloat(el.customThreshold.value) || 1),
        initialSpeed: Math.max(0, parseFloat(el.customSpeed.value) || 0),
        disintegrationTime: Math.max(0.2, parseFloat(el.customTime.value) || 0.2),
        gravity: Math.max(0, parseFloat(el.customGravity.value) || 0)
      };
    }

    function syncUIFromParams(params) {
      el.customThreshold.value = params.threshold;
      el.customSpeed.value = params.initialSpeed;
      el.customTime.value = params.disintegrationTime;
      el.customGravity.value = params.gravity;
    }

    function setButtonsState() {
      const interact = !simulationState.isLoading;
      const canStart = interact && simulationState.objectSelected && !simulationState.running;
      const canPause = interact && simulationState.objectSelected && simulationState.running;
      const canReset = interact && simulationState.objectSelected;

      el.startButton.disabled = !canStart;
      el.pauseButton.disabled = !canPause;
      el.resetButton.disabled = !canReset;
      el.pauseButton.textContent = simulationState.paused ? 'Resume' : 'Pause';
      el.objectSelect.disabled = simulationState.isLoading;
    }

    function showLoading(show, text = 'Please wait') {
      simulationState.isLoading = show;
      el.loadingIndicator.style.display = show ? 'block' : 'none';
      el.loadingText.textContent = text;
      setButtonsState();
    }

    function init() {
      cacheUI();

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x05060a, 0.0008);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
      camera.position.set(300, 200, 300);

      renderer = new THREE.WebGLRenderer({
        canvas: document.getElementById('canvas'),
        antialias: true,
        alpha: true
      });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(100, 200, 100);
      scene.add(directionalLight);

      const fillLight = new THREE.PointLight(0xffb347, 0.75, 1200);
      fillLight.position.set(0, 0, 0);
      scene.add(fillLight);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.06;
      controls.target.set(0, 0, 0);
      controls.update();

      sun = createSun();
      scene.add(sun);

      starField = createStarfield();
      scene.add(starField);

      particleSystem = createParticleSystem();
      particleSystem.visible = false;
      scene.add(particleSystem);

      composer = new THREE.EffectComposer(renderer);
      composer.addPass(new THREE.RenderPass(scene, camera));
      bloomPass = new THREE.UnrealBloomPass(
        new THREE.Vector2(window.innerWidth, window.innerHeight),
        1.45,
        0.42,
        0.82
      );
      composer.addPass(bloomPass);

      window.addEventListener('resize', onWindowResize, false);

      el.startButton.addEventListener('click', startSimulation);
      el.pauseButton.addEventListener('click', togglePause);
      el.resetButton.addEventListener('click', resetSimulation);
      el.objectSelect.addEventListener('change', onObjectSelectChange);

      [el.customThreshold, el.customSpeed, el.customTime, el.customGravity].forEach(input => {
        input.addEventListener('input', () => {
          if (el.objectSelect.value === 'custom') {
            simulationState.params = readParamsFromUI();
          }
        });
      });

      simulationState.objectSelected = true;
      onObjectSelectChange();

      setStatus('Application ready. Choose an object and press Start.');
      animate();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    }

    function createSun() {
      const geometry = new THREE.SphereGeometry(50, 48, 48);
      const texture = createSunTexture();
      const material = new THREE.MeshBasicMaterial({ map: texture });
      const sunMesh = new THREE.Mesh(geometry, material);
      sunMesh.position.set(0, 0, 0);

      const corona = new THREE.PointLight(0xffb347, 3, 700, 2);
      sunMesh.add(corona);

      return sunMesh;
    }

    function createSunTexture() {
      const size = 512;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      gradient.addColorStop(0.00, '#fffde6');
      gradient.addColorStop(0.18, '#fff15a');
      gradient.addColorStop(0.48, '#ffb300');
      gradient.addColorStop(0.78, '#ff7a18');
      gradient.addColorStop(1.00, '#7d1300');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      // subtle solar noise
      const image = ctx.getImageData(0, 0, size, size);
      for (let i = 0; i < image.data.length; i += 4) {
        const n = (Math.random() - 0.5) * 18;
        image.data[i] = Math.min(255, Math.max(0, image.data[i] + n));
        image.data[i + 1] = Math.min(255, Math.max(0, image.data[i + 1] + n));
        image.data[i + 2] = Math.min(255, Math.max(0, image.data[i + 2] + n));
      }
      ctx.putImageData(image, 0, 0);

      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    function createStarfield() {
      const geometry = new THREE.BufferGeometry();
      const count = 12000;
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 3000;
        positions[i * 3 + 1] = (Math.random() - 0.5) * 3000;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 3000;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.15,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.95
      });

      return new THREE.Points(geometry, material);
    }

    function createParticleSystem() {
      particleGeometry = new THREE.BufferGeometry();
      const positions = new Float32Array(particleCount * 3);
      const velocities = new Float32Array(particleCount * 3);
      const life = new Float32Array(particleCount);
      const active = new Float32Array(particleCount);

      for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = 0;
        positions[i * 3 + 1] = 0;
        positions[i * 3 + 2] = 0;
        velocities[i * 3] = 0;
        velocities[i * 3 + 1] = 0;
        velocities[i * 3 + 2] = 0;
        life[i] = 0;
        active[i] = 0;
      }

      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particleGeometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));
      particleGeometry.setAttribute('life', new THREE.BufferAttribute(life, 1));
      particleGeometry.setAttribute('active', new THREE.BufferAttribute(active, 1));

      particleMaterial = new THREE.PointsMaterial({
        color: 0xffb347,
        size: 2.4,
        transparent: true,
        opacity: 0.95,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      return new THREE.Points(particleGeometry, particleMaterial);
    }

    function createCustomObject() {
      const group = new THREE.Group();

      const sphereGeometry = new THREE.SphereGeometry(20, 32, 32);
      const sphereMaterial = new THREE.MeshStandardMaterial({
        color: 0x25e6a2,
        roughness: 0.35,
        metalness: 0.18,
        emissive: 0x062017,
        emissiveIntensity: 0.35
      });
      const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
      group.add(sphere);

      const coneGeometry = new THREE.ConeGeometry(10, 20, 32);
      const coneMaterial = new THREE.MeshStandardMaterial({
        color: 0xff5c5c,
        roughness: 0.32,
        metalness: 0.15,
        emissive: 0x250808,
        emissiveIntensity: 0.3
      });
      const cone = new THREE.Mesh(coneGeometry, coneMaterial);
      cone.position.y = 30;
      group.add(cone);

      const light = new THREE.PointLight(0xffffff, 1.2, 140);
      light.position.set(0, 50, 50);
      group.add(light);

      return group;
    }

    function removeCurrentObject() {
      if (!movingObject) return;
      scene.remove(movingObject);
      movingObject.traverse?.(child => {
        if (child.geometry) child.geometry.dispose?.();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose?.());
          else child.material.dispose?.();
        }
      });
      movingObject = null;
    }

    function computeObjectRadius(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      box.getSize(size);
      return Math.max(size.x, size.y, size.z) * 0.5 || 30;
    }

    function onObjectSelectChange() {
      const selectedOption = el.objectSelect.options[el.objectSelect.selectedIndex];
      const value = selectedOption.value;

      simulationState.running = false;
      simulationState.paused = false;
      simulationState.disintegrating = false;
      simulationState.disintegrationStartTime = null;
      simulationState.currentSpeed = 0;
      simulationState.distance = Infinity;
      simulationState.objectSelected = true;

      removeCurrentObject();

      if (value === 'custom') {
        simulationState.params = readParamsFromUI();
        syncUIFromParams(simulationState.params);
        movingObject = createCustomObject();
        movingObject.position.copy(objectInitialPosition);
        scene.add(movingObject);
        simulationState.objectMaxRadius = computeObjectRadius(movingObject);
        setStatus('Custom object created. Ready to launch.');
      } else {
        const preset = defaultObjectParams[value];
        simulationState.params = { ...preset };
        syncUIFromParams(simulationState.params);

        const url = selectedOption.getAttribute('data-url');
        const scale = parseFloat(selectedOption.getAttribute('data-scale')) || 1;
        const yOffset = parseFloat(selectedOption.getAttribute('data-y-offset')) || 0;
        loadObjectModel(url, scale, yOffset);
      }

      setButtonsState();
      updateMeters();
    }

    function loadObjectModel(url, scale, yOffset) {
      simulationState.isLoading = true;
      setStatus('Loading 3D model…');
      showLoading(true, 'Downloading and building model');

      const currentLoad = ++loadToken;
      const loader = new THREE.GLTFLoader();

      loader.load(
        url,
        gltf => {
          if (currentLoad !== loadToken) return;

          removeCurrentObject();
          movingObject = gltf.scene;

          movingObject.traverse(child => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;

              if (child.material) {
                child.material.metalness = Math.min(0.6, child.material.metalness ?? 0.2);
                child.material.roughness = Math.max(0.25, child.material.roughness ?? 0.4);
              }
            }
          });

          movingObject.scale.setScalar(scale);
          movingObject.position.copy(objectInitialPosition);
          movingObject.position.y += yOffset;
          scene.add(movingObject);

          simulationState.objectMaxRadius = computeObjectRadius(movingObject);

          simulationState.isLoading = false;
          simulationState.objectSelected = true;
          setStatus('Model loaded. Ready to launch.');
          showLoading(false);
          setButtonsState();
          updateMeters();
        },
        undefined,
        error => {
          if (currentLoad !== loadToken) return;

          console.error('Error loading model:', error);
          simulationState.isLoading = false;
          simulationState.objectSelected = false;
          setStatus('Error loading model. Try another preset or custom object.', true);
          showLoading(false);
          setButtonsState();
        }
      );
    }

    function resetParticleState() {
      const pos = particleGeometry.getAttribute('position');
      const vel = particleGeometry.getAttribute('velocity');
      const life = particleGeometry.getAttribute('life');
      const active = particleGeometry.getAttribute('active');

      for (let i = 0; i < particleCount; i++) {
        pos.array[i * 3] = 0;
        pos.array[i * 3 + 1] = 0;
        pos.array[i * 3 + 2] = 0;
        vel.array[i * 3] = 0;
        vel.array[i * 3 + 1] = 0;
        vel.array[i * 3 + 2] = 0;
        life.array[i] = 0;
        active.array[i] = 0;
      }

      pos.needsUpdate = true;
      vel.needsUpdate = true;
      life.needsUpdate = true;
      active.needsUpdate = true;
      particleSystem.visible = false;
    }

    function resetObjectState() {
      if (!movingObject) return;
      movingObject.position.copy(objectInitialPosition);
      movingObject.rotation.set(0, 0, 0);
      movingObject.scale.setScalar(1);
      movingObject.visible = true;
    }

    function startSimulation() {
      if (!simulationState.objectSelected || simulationState.isLoading || simulationState.running) return;

      if (!movingObject) {
        setStatus('No object is loaded yet.', true);
        return;
      }

      simulationState.running = true;
      simulationState.paused = false;
      simulationState.disintegrating = false;
      simulationState.disintegrationStartTime = null;
      simulationState.startTime = clock.getElapsedTime();
      simulationState.currentSpeed = simulationState.params.initialSpeed;

      resetParticleState();
      resetObjectState();

      setStatus('Simulation started.');
      setButtonsState();
    }

    function togglePause() {
      if (!simulationState.running) return;
      simulationState.paused = !simulationState.paused;
      setStatus(simulationState.paused ? 'Simulation paused.' : 'Simulation resumed.');
      setButtonsState();
    }

    function resetSimulation() {
      if (simulationState.isLoading) return;

      simulationState.running = false;
      simulationState.paused = false;
      simulationState.disintegrating = false;
      simulationState.disintegrationStartTime = null;
      simulationState.currentSpeed = 0;
      simulationState.distance = Infinity;

      resetParticleState();
      resetObjectState();

      if (controls) controls.target.copy(sun.position);
      setStatus('Simulation reset. Ready.');
      setButtonsState();
      updateMeters();
    }

    function emitParticlesFromObject() {
      if (!movingObject) return;

      const box = new THREE.Box3().setFromObject(movingObject);
      const center = new THREE.Vector3();
      const size = new THREE.Vector3();
      box.getCenter(center);
      box.getSize(size);

      const pos = particleGeometry.getAttribute('position');
      const vel = particleGeometry.getAttribute('velocity');
      const life = particleGeometry.getAttribute('life');
      const active = particleGeometry.getAttribute('active');

      for (let i = 0; i < particleCount; i++) {
        const rx = (Math.random() - 0.5) * size.x;
        const ry = (Math.random() - 0.5) * size.y;
        const rz = (Math.random() - 0.5) * size.z;

        pos.array[i * 3] = center.x + rx * 0.65;
        pos.array[i * 3 + 1] = center.y + ry * 0.65;
        pos.array[i * 3 + 2] = center.z + rz * 0.65;

        const dir = new THREE.Vector3(rx, ry, rz).normalize();
        const burst = 16 + Math.random() * 34;

        vel.array[i * 3] = dir.x * burst + (Math.random() - 0.5) * 8;
        vel.array[i * 3 + 1] = dir.y * burst + (Math.random() - 0.5) * 8;
        vel.array[i * 3 + 2] = dir.z * burst + (Math.random() - 0.5) * 8;

        life.array[i] = Math.random() * 0.6;
        active.array[i] = 1;
      }

      pos.needsUpdate = true;
      vel.needsUpdate = true;
      life.needsUpdate = true;
      active.needsUpdate = true;
      particleSystem.visible = true;
    }

    function beginDisintegration() {
      simulationState.disintegrating = true;
      simulationState.disintegrationStartTime = clock.getElapsedTime();
      emitParticlesFromObject();
      setStatus('Disintegration initiated.');
    }

    function applyDisintegrationEffects(factor, deltaTime) {
      if (!movingObject) return;

      const scaleFactor = THREE.MathUtils.lerp(1, 0.02, factor);
      movingObject.scale.setScalar(scaleFactor);

      movingObject.rotation.x += deltaTime * (0.7 + factor * 2.0);
      movingObject.rotation.y += deltaTime * (0.9 + factor * 2.0);
      movingObject.rotation.z += deltaTime * (0.3 + factor * 1.4);

      if (movingObject.children) {
        movingObject.children.forEach(child => {
          if (child.isMesh && child.material) {
            child.material.opacity = THREE.MathUtils.lerp(1, 0.0, factor);
            child.material.transparent = true;
          }
        });
      }
    }

    function updateParticles(deltaTime, factor) {
      const pos = particleGeometry.getAttribute('position');
      const vel = particleGeometry.getAttribute('velocity');
      const life = particleGeometry.getAttribute('life');
      const active = particleGeometry.getAttribute('active');

      for (let i = 0; i < particleCount; i++) {
        if (active.array[i] < 0.5) continue;

        life.array[i] += deltaTime;
        vel.array[i * 3 + 1] -= simulationState.params.gravity * 0.014 * deltaTime * (0.35 + factor * 0.65);

        pos.array[i * 3]     += vel.array[i * 3]     * deltaTime * (0.8 + factor * 2.1);
        pos.array[i * 3 + 1] += vel.array[i * 3 + 1] * deltaTime * (0.8 + factor * 2.1);
        pos.array[i * 3 + 2] += vel.array[i * 3 + 2] * deltaTime * (0.8 + factor * 2.1);

        vel.array[i * 3]     *= 0.995;
        vel.array[i * 3 + 1] *= 0.992;
        vel.array[i * 3 + 2] *= 0.995;

        if (life.array[i] > 8) active.array[i] = 0;
      }

      pos.needsUpdate = true;
      vel.needsUpdate = true;
      life.needsUpdate = true;
      active.needsUpdate = true;
    }

    function updateMeters() {
      const distance = Number.isFinite(simulationState.distance) ? simulationState.distance : null;
      el.distanceValue.textContent = distance === null ? '—' : distance.toFixed(1);
      el.speedValue.textContent = simulationState.currentSpeed ? simulationState.currentSpeed.toFixed(1) : '—';

      if (simulationState.objectSelected && simulationState.params.threshold) {
        const pct = distance === null
          ? 0
          : Math.max(0, Math.min(100, 100 - (distance / simulationState.params.threshold) * 100));
        el.distanceBar.style.width = `${pct}%`;
      } else {
        el.distanceBar.style.width = '0%';
      }
    }

    function updateSimulation(deltaTime) {
      if (!simulationState.running || simulationState.paused || !movingObject) return;

      const toSun = new THREE.Vector3().subVectors(sun.position, movingObject.position);
      const distance = toSun.length();
      simulationState.distance = distance;

      const direction = toSun.normalize();
      movingObject.position.addScaledVector(direction, simulationState.currentSpeed * deltaTime);

      const safeDistance = Math.max(distance, 1);
      const acceleration = simulationState.params.gravity / (safeDistance * safeDistance);
      simulationState.currentSpeed += acceleration * deltaTime;

      if (distance < simulationState.params.threshold && !simulationState.disintegrating) {
        beginDisintegration();
      }

      if (simulationState.disintegrating) {
        const elapsed = clock.getElapsedTime() - simulationState.disintegrationStartTime;
        const factor = Math.min(elapsed / simulationState.params.disintegrationTime, 1);

        applyDisintegrationEffects(factor, deltaTime);
        updateParticles(deltaTime, factor);

        if (factor >= 1) {
          simulationState.running = false;
          setStatus('Object fully disintegrated.');
          setButtonsState();
        }
      }

      updateMeters();
    }

    function animate() {
      animationId = requestAnimationFrame(animate);

      const deltaTime = Math.min(clock.getDelta(), 0.033);

      if (controls) controls.update();
      if (sun) sun.rotation.y += 0.0004;
      if (starField) starField.rotation.y += 0.00003;

      updateSimulation(deltaTime);

      if (composer) composer.render(deltaTime);
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
