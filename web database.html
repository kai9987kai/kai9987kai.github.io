<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinkLab - Smart Link Database</title>

  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #38bdf8;
      --danger: #fb7185;
      --good: #4ade80;
      --border: rgba(255,255,255,0.12);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56,189,248,0.2), transparent 35%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.18), transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -1px;
    }

    header p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .app {
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 18px;
      padding: 18px;
    }

    .panel {
      background: rgba(17,24,39,0.82);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    input,
    select,
    button,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      font: inherit;
      background: var(--panel-2);
      color: var(--text);
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.18);
    }

    button {
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #334155;
    }

    .primary {
      background: linear-gradient(135deg, #0284c7, #7c3aed);
      border: none;
    }

    .danger {
      background: rgba(251,113,133,0.15);
      border-color: rgba(251,113,133,0.4);
      color: #fecdd3;
    }

    .success {
      background: rgba(74,222,128,0.13);
      border-color: rgba(74,222,128,0.35);
      color: #bbf7d0;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .link-list {
      margin-top: 14px;
      display: grid;
      gap: 10px;
      max-height: 56vh;
      overflow: auto;
      padding-right: 4px;
    }

    .card {
      background: rgba(31,41,55,0.8);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .card.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }

    .card-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      font-weight: 800;
    }

    .url {
      color: var(--muted);
      overflow-wrap: anywhere;
      font-size: 13px;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      font-size: 12px;
      background: rgba(56,189,248,0.12);
      color: #bae6fd;
      border: 1px solid rgba(56,189,248,0.25);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .mini-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .mini-actions button {
      padding: 8px;
      font-size: 12px;
    }

    .preview {
      min-height: calc(100vh - 160px);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    .preview-top {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .preview-title {
      min-width: 240px;
    }

    .preview-title strong {
      display: block;
      font-size: 20px;
    }

    .preview-title span {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 620px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: white;
    }

    .notice {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .stat {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      iframe {
        min-height: 480px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>LinkLab</h1>
    <p>A smarter browser-based link database with preview, search, tags, favourites, random links, import and export.</p>
  </header>

  <main class="app">
    <section class="panel">
      <div class="controls">
        <input id="searchInput" placeholder="Search links..." />

        <div class="row">
          <select id="tagFilter">
            <option value="all">All tags</option>
          </select>

          <select id="sortMode">
            <option value="newest">Newest first</option>
            <option value="az">A-Z</option>
            <option value="visits">Most visited</option>
            <option value="favourites">Favourites first</option>
          </select>
        </div>

        <div class="row">
          <button id="randomBtn" class="success">Random Link</button>
          <button id="exportBtn">Export JSON</button>
        </div>

        <input id="importFile" type="file" accept="application/json" hidden />
        <button id="importBtn">Import JSON</button>

        <hr style="width:100%; border:0; border-top:1px solid var(--border);" />

        <input id="titleInput" placeholder="Link title e.g. Google" />
        <input id="urlInput" placeholder="URL e.g. https://google.com" />
        <input id="tagsInput" placeholder="Tags e.g. search, tools, fun" />

        <button id="addBtn" class="primary">Add Link</button>
      </div>

      <div class="stats">
        <span class="stat" id="totalStat">0 links</span>
        <span class="stat" id="favStat">0 favourites</span>
      </div>

      <div id="linkList" class="link-list"></div>
    </section>

    <section class="panel preview">
      <div class="preview-top">
        <div class="preview-title">
          <strong id="previewName">No link selected</strong>
          <span id="previewUrl">Add or select a link to preview it.</span>
        </div>

        <div class="row" style="max-width:360px;">
          <button id="openBtn">Open Tab</button>
          <button id="copyBtn">Copy URL</button>
        </div>

        <p class="notice">
          Some websites block iframe previews for security. If the preview stays blank, use “Open Tab”.
        </p>
      </div>

      <iframe
        id="previewFrame"
        title="Website preview"
        referrerpolicy="no-referrer"
        sandbox="allow-scripts allow-forms allow-popups allow-popups-to-escape-sandbox"
      ></iframe>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "linklab.links.v2";

    const starterLinks = [
      {
        id: crypto.randomUUID(),
        title: "Google",
        url: "https://www.google.com",
        tags: ["search"],
        favourite: true,
        visits: 0,
        createdAt: Date.now()
      },
      {
        id: crypto.randomUUID(),
        title: "Wikipedia",
        url: "https://www.wikipedia.org",
        tags: ["knowledge", "reference"],
        favourite: false,
        visits: 0,
        createdAt: Date.now()
      },
      {
        id: crypto.randomUUID(),
        title: "MDN Web Docs",
        url: "https://developer.mozilla.org",
        tags: ["coding", "docs"],
        favourite: true,
        visits: 0,
        createdAt: Date.now()
      }
    ];

    let links = loadLinks();
    let selectedId = links[0]?.id || null;

    const el = {
      searchInput: document.getElementById("searchInput"),
      tagFilter: document.getElementById("tagFilter"),
      sortMode: document.getElementById("sortMode"),
      titleInput: document.getElementById("titleInput"),
      urlInput: document.getElementById("urlInput"),
      tagsInput: document.getElementById("tagsInput"),
      addBtn: document.getElementById("addBtn"),
      randomBtn: document.getElementById("randomBtn"),
      exportBtn: document.getElementById("exportBtn"),
      importBtn: document.getElementById("importBtn"),
      importFile: document.getElementById("importFile"),
      linkList: document.getElementById("linkList"),
      previewFrame: document.getElementById("previewFrame"),
      previewName: document.getElementById("previewName"),
      previewUrl: document.getElementById("previewUrl"),
      openBtn: document.getElementById("openBtn"),
      copyBtn: document.getElementById("copyBtn"),
      totalStat: document.getElementById("totalStat"),
      favStat: document.getElementById("favStat")
    };

    function loadLinks() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length) return saved;
      } catch {
        console.warn("Could not load saved links.");
      }

      return starterLinks;
    }

    function saveLinks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
    }

    function normaliseUrl(value) {
      let raw = value.trim();

      if (!raw) {
        throw new Error("URL is empty.");
      }

      if (!/^https?:\/\//i.test(raw)) {
        raw = "https://" + raw;
      }

      const url = new URL(raw);

      if (!["http:", "https:"].includes(url.protocol)) {
        throw new Error("Only HTTP and HTTPS links are allowed.");
      }

      if (url.protocol === "http:") {
        url.protocol = "https:";
      }

      return url.toString();
    }

    function getSelectedLink() {
      return links.find(link => link.id === selectedId) || null;
    }

    function getTags() {
      return [...new Set(links.flatMap(link => link.tags))].sort();
    }

    function getFilteredLinks() {
      const query = el.searchInput.value.trim().toLowerCase();
      const tag = el.tagFilter.value;

      let result = links.filter(link => {
        const matchesSearch =
          link.title.toLowerCase().includes(query) ||
          link.url.toLowerCase().includes(query) ||
          link.tags.join(" ").toLowerCase().includes(query);

        const matchesTag = tag === "all" || link.tags.includes(tag);

        return matchesSearch && matchesTag;
      });

      const sort = el.sortMode.value;

      if (sort === "az") {
        result.sort((a, b) => a.title.localeCompare(b.title));
      }

      if (sort === "newest") {
        result.sort((a, b) => b.createdAt - a.createdAt);
      }

      if (sort === "visits") {
        result.sort((a, b) => b.visits - a.visits);
      }

      if (sort === "favourites") {
        result.sort((a, b) => Number(b.favourite) - Number(a.favourite));
      }

      return result;
    }

    function renderTags() {
      const current = el.tagFilter.value;
      el.tagFilter.innerHTML = `<option value="all">All tags</option>`;

      for (const tag of getTags()) {
        const option = document.createElement("option");
        option.value = tag;
        option.textContent = tag;
        el.tagFilter.appendChild(option);
      }

      el.tagFilter.value = getTags().includes(current) ? current : "all";
    }

    function renderStats() {
      el.totalStat.textContent = `${links.length} link${links.length === 1 ? "" : "s"}`;
      el.favStat.textContent = `${links.filter(x => x.favourite).length} favourite${links.filter(x => x.favourite).length === 1 ? "" : "s"}`;
    }

    function renderList() {
      const filtered = getFilteredLinks();
      el.linkList.innerHTML = "";

      if (!filtered.length) {
        el.linkList.innerHTML = `<div class="empty">No links found.</div>`;
        return;
      }

      for (const link of filtered) {
        const card = document.createElement("article");
        card.className = "card" + (link.id === selectedId ? " active" : "");

        card.innerHTML = `
          <div class="card-title">
            <span>${escapeHtml(link.title)}</span>
            <span title="Favourite">${link.favourite ? "★" : "☆"}</span>
          </div>

          <div class="url">${escapeHtml(link.url)}</div>

          <div class="tags">
            ${link.tags.map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}
          </div>

          <div class="mini-actions">
            <button data-action="select" data-id="${link.id}">Preview</button>
            <button data-action="fav" data-id="${link.id}">${link.favourite ? "Unfav" : "Fav"}</button>
            <button class="danger" data-action="delete" data-id="${link.id}">Delete</button>
          </div>
        `;

        el.linkList.appendChild(card);
      }
    }

    function renderPreview() {
      const link = getSelectedLink();

      if (!link) {
        el.previewName.textContent = "No link selected";
        el.previewUrl.textContent = "Add or select a link to preview it.";
        el.previewFrame.removeAttribute("src");
        return;
      }

      el.previewName.textContent = link.title;
      el.previewUrl.textContent = link.url;
      el.previewFrame.src = link.url;
    }

    function render() {
      renderTags();
      renderStats();
      renderList();
      renderPreview();
      saveLinks();
    }

    function addLink() {
      try {
        const title = el.titleInput.value.trim();
        const url = normaliseUrl(el.urlInput.value);
        const tags = el.tagsInput.value
          .split(",")
          .map(tag => tag.trim().toLowerCase())
          .filter(Boolean);

        if (!title) {
          alert("Please add a title.");
          return;
        }

        const link = {
          id: crypto.randomUUID(),
          title,
          url,
          tags: tags.length ? tags : ["uncategorised"],
          favourite: false,
          visits: 0,
          createdAt: Date.now()
        };

        links.unshift(link);
        selectedId = link.id;

        el.titleInput.value = "";
        el.urlInput.value = "";
        el.tagsInput.value = "";

        render();
      } catch (error) {
        alert(error.message);
      }
    }

    function selectLink(id) {
      const link = links.find(x => x.id === id);
      if (!link) return;

      link.visits += 1;
      selectedId = id;
      render();
    }

    function toggleFavourite(id) {
      const link = links.find(x => x.id === id);
      if (!link) return;

      link.favourite = !link.favourite;
      render();
    }

    function deleteLink(id) {
      const link = links.find(x => x.id === id);
      if (!link) return;

      const ok = confirm(`Delete "${link.title}"?`);
      if (!ok) return;

      links = links.filter(x => x.id !== id);

      if (selectedId === id) {
        selectedId = links[0]?.id || null;
      }

      render();
    }

    function openSelected() {
      const link = getSelectedLink();
      if (!link) return;

      window.open(link.url, "_blank", "noopener,noreferrer");
    }

    async function copySelected() {
      const link = getSelectedLink();
      if (!link) return;

      await navigator.clipboard.writeText(link.url);
      el.copyBtn.textContent = "Copied!";

      setTimeout(() => {
        el.copyBtn.textContent = "Copy URL";
      }, 900);
    }

    function randomLink() {
      const pool = getFilteredLinks().length ? getFilteredLinks() : links;
      if (!pool.length) return;

      const choice = pool[Math.floor(Math.random() * pool.length)];
      selectLink(choice.id);
    }

    function exportLinks() {
      const data = JSON.stringify(links, null, 2);
      const blob = new Blob([data], { type: "application/json" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "linklab-export.json";
      a.click();

      URL.revokeObjectURL(url);
    }

    function importLinks(file) {
      const reader = new FileReader();

      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);

          if (!Array.isArray(imported)) {
            throw new Error("JSON must be an array of links.");
          }

          const cleaned = imported.map(item => ({
            id: crypto.randomUUID(),
            title: String(item.title || "Untitled Link").trim(),
            url: normaliseUrl(String(item.url || "")),
            tags: Array.isArray(item.tags) && item.tags.length
              ? item.tags.map(tag => String(tag).trim().toLowerCase()).filter(Boolean)
              : ["imported"],
            favourite: Boolean(item.favourite),
            visits: Number(item.visits || 0),
            createdAt: Number(item.createdAt || Date.now())
          }));

          links = [...cleaned, ...links];
          selectedId = links[0]?.id || null;
          render();
        } catch (error) {
          alert("Import failed: " + error.message);
        }
      };

      reader.readAsText(file);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    el.addBtn.addEventListener("click", addLink);

    el.urlInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addLink();
    });

    el.searchInput.addEventListener("input", renderList);
    el.tagFilter.addEventListener("change", renderList);
    el.sortMode.addEventListener("change", renderList);

    el.linkList.addEventListener("click", event => {
      const button = event.target.closest("button");
      if (!button) return;

      const id = button.dataset.id;
      const action = button.dataset.action;

      if (action === "select") selectLink(id);
      if (action === "fav") toggleFavourite(id);
      if (action === "delete") deleteLink(id);
    });

    el.openBtn.addEventListener("click", openSelected);
    el.copyBtn.addEventListener("click", copySelected);
    el.randomBtn.addEventListener("click", randomLink);
    el.exportBtn.addEventListener("click", exportLinks);

    el.importBtn.addEventListener("click", () => {
      el.importFile.click();
    });

    el.importFile.addEventListener("change", event => {
      const file = event.target.files[0];
      if (file) importLinks(file);
      event.target.value = "";
    });

    render();
  </script>
</body>
</html>
