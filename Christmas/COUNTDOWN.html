  <script>
    $(document).ready(function() {
      const today = new Date();
      let year = today.getFullYear();
      const christmasThisYear = new Date(year, 11, 25); // December 25 of the current year
      if (today > christmasThisYear) {
        year++; // If today's date is past this year's Christmas, use next year
      }
      const nextChristmas = `${year}/12/25`;

      $('#christmasCountdown').countdown(nextChristmas, function(event) {
        // Formatted to look a bit cleaner with the new CSS
        $(this).html(event.strftime('%D Days %H:%M:%S'));
      });
    });
