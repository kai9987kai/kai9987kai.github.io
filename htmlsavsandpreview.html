<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced HTML Sandbox Viewer</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --surface: #ffffff;
      --primary: #4361ee;
      --primary-hover: #3a53d0;
      --danger: #ef233c;
      --danger-hover: #d90429;
      --text-main: #2b2d42;
      --border: #e0e0e0;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      color: var(--text-main);
    }

    .editor-section {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: var(--radius);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      margin-bottom: 2rem;
    }

    textarea {
      width: 100%;
      min-height: 250px;
      padding: 1rem;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      background-color: #1e1e1e;
      color: #d4d4d4;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      resize: vertical;
      line-height: 1.5;
    }

    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
    }

    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
    }

    .btn-danger {
      background-color: var(--danger);
      color: white;
    }

    .btn-danger:hover {
      background-color: var(--danger-hover);
    }

    /* Preview Grid */
    #preview-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .preview-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .preview-header {
      padding: 0.5rem 1rem;
      background: #f8f9fa;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #6c757d;
    }

    .delete-btn {
      background: transparent;
      color: var(--danger);
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      padding: 0 0.5rem;
    }

    .delete-btn:hover {
      color: var(--danger-hover);
      transform: scale(1.1);
    }

    iframe {
      width: 100%;
      height: 250px;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>

  <header>
    <h1>HTML Sandbox Viewer</h1>
    <button id="clear-all-btn" class="btn-danger">Clear All Saved</button>
  </header>

  <div class="editor-section">
    <textarea id="input-html" placeholder="<!-- Enter your custom HTML, CSS, and JS here -->&#10;<h1>Hello World</h1>&#10;<style> h1 { color: blue; } </style>"></textarea>
    <div class="actions">
      <button id="save-btn" class="btn-primary">Save & Preview</button>
    </div>
  </div>

  <div id="preview-container"></div>

  <script>
    const inputHtml = document.getElementById('input-html');
    const saveBtn = document.getElementById('save-btn');
    const clearAllBtn = document.getElementById('clear-all-btn');
    const previewContainer = document.getElementById('preview-container');

    // Enable Tab key support in textarea
    inputHtml.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + "  " + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    });

    // Core Functions
    const getSavedApps = () => JSON.parse(localStorage.getItem('advancedCustomApps')) || [];
    
    const setSavedApps = (apps) => localStorage.setItem('advancedCustomApps', JSON.stringify(apps));

    const renderCard = (app) => {
      const card = document.createElement('div');
      card.classList.add('preview-card');
      card.id = `app-${app.id}`;

      // Create Header
      const header = document.createElement('div');
      header.classList.add('preview-header');
      const dateStr = new Date(app.id).toLocaleString();
      header.innerHTML = `<span>Saved: ${dateStr}</span>`;
      
      // Delete Button
      const delBtn = document.createElement('button');
      delBtn.classList.add('delete-btn');
      delBtn.innerHTML = '&times;';
      delBtn.title = "Delete this snippet";
      delBtn.onclick = () => deleteApp(app.id);
      header.appendChild(delBtn);

      // Create isolated iframe
      const iframe = document.createElement('iframe');
      // allow-scripts allows JS to run, but isolates from parent window
      iframe.setAttribute('sandbox', 'allow-scripts'); 
      iframe.srcdoc = app.code;

      card.appendChild(header);
      card.appendChild(iframe);
      
      // Prepend so newest is first
      previewContainer.prepend(card); 
    };

    const loadApps = () => {
      previewContainer.innerHTML = '';
      const savedApps = getSavedApps();
      // Render in reverse order so newest is at the top
      savedApps.forEach(renderCard);
    };

    const saveApp = () => {
      const code = inputHtml.value.trim();
      if (!code) return alert("Please enter some HTML first.");

      const newApp = {
        id: Date.now(),
        code: code
      };

      const savedApps = getSavedApps();
      savedApps.push(newApp);
      setSavedApps(savedApps);

      renderCard(newApp);
      inputHtml.value = ''; // Clear input after save
    };

    const deleteApp = (id) => {
      if(confirm("Are you sure you want to delete this snippet?")) {
        let savedApps = getSavedApps();
        savedApps = savedApps.filter(app => app.id !== id);
        setSavedApps(savedApps);
        
        // Remove from DOM
        const card = document.getElementById(`app-${id}`);
        if(card) card.remove();
      }
    };

    // Event Listeners
    saveBtn.addEventListener('click', saveApp);
    
    clearAllBtn.addEventListener('click', () => {
      if(confirm("Are you sure you want to delete ALL saved snippets?")) {
        localStorage.removeItem('advancedCustomApps');
        previewContainer.innerHTML = '';
      }
    });

    // Load on start
    window.addEventListener('load', loadApps);

  </script>
</body>
</html>
