<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Classifier - TensorFlow.js</title>
  
  <!-- TensorFlow.js -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>

  <style>
    /* Clean, modern typography and reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: #f1f5f9;
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Container Card */
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      text-align: center;
    }

    .header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 0.875rem;
      color: #64748b;
    }

    /* Status Badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 9999px;
      font-size: 0.813rem;
      font-weight: 500;
      background-color: #fef3c7;
      color: #d97706;
      align-self: center;
      transition: all 0.3s ease;
    }

    .status-badge.ready {
      background-color: #dcfce7;
      color: #15803d;
    }

    .status-badge.error {
      background-color: #fee2e2;
      color: #b91c1c;
    }

    /* Spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Image Preview Container */
    .preview-container {
      width: 100%;
      height: 260px;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: #f8fafc;
      position: relative;
    }

    #img1 {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Stylized Upload Input */
    .file-input-wrapper {
      position: relative;
      text-align: center;
    }

    /* Hide the default input, style the label as a button */
    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #f1f5f9;
      color: #475569;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid #cbd5e1;
      transition: background-color 0.2s;
    }

    .file-label:hover {
      background-color: #e2e8f0;
    }

    #input_button {
      display: none;
    }

    /* Main Action Button */
    .btn-predict {
      width: 100%;
      background-color: #4f46e5;
      color: #ffffff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, opacity 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-predict:hover:not(:disabled) {
      background-color: #4338ca;
    }

    .btn-predict:disabled {
      background-color: #94a3b8;
      cursor: not-allowed;
      opacity: 0.7;
    }

    /* Results Panel */
    .results-panel {
      border-top: 1px solid #e2e8f0;
      padding-top: 16px;
      display: none; /* Hidden until a prediction is made */
    }

    .results-panel.visible {
      display: block;
    }

    .result-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
      text-transform: capitalize;
      margin-bottom: 8px;
    }

    /* Progress/Confidence Bar */
    .progress-container {
      background-color: #e2e8f0;
      border-radius: 9999px;
      height: 8px;
      width: 100%;
      overflow: hidden;
    }

    .progress-bar {
      background-color: #10b981;
      height: 100%;
      width: 0%;
      transition: width 0.4s ease-out;
    }

    .confidence-label {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 4px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <h1>Image Classifier</h1>
      <p>Upload an image and run a prediction locally</p>
    </div>

    <!-- Status indicator for model state -->
    <div id="status-badge" class="status-badge">
      <div id="status-spinner" class="spinner"></div>
      <span id="status-text">Loading Model...</span>
    </div>

    <!-- Image Display Area -->
    <div class="preview-container">
      <img id="img1" src="./image.jpg" alt="Preview" />
    </div>

    <!-- Styled File Input -->
    <div class="file-input-wrapper">
      <label for="input_button" class="file-label">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: middle;">
          <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5z"/>
          <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708l3-3z"/>
        </svg>
        Choose Image
      </label>
      <input accept="image/*" type="file" id="input_button" />
    </div>

    <!-- Prediction Action Button -->
    <button id="predict_button" class="btn-predict" onclick="predict()" disabled>
      Please Wait
    </button>

    <!-- Detailed Results Panel -->
    <div id="results-panel" class="results-panel">
      <p id="result-text" class="result-text">Result</p>
      <div class="progress-container">
        <div id="progress-bar" class="progress-bar"></div>
      </div>
      <span id="confidence-label" class="confidence-label">Confidence: 0%</span>
    </div>
  </div>

  <script>
    let model;
    const MODEL_INPUT_SIZE = 224; // Standard size for most CNN models

    const imageElement = document.getElementById('img1');
    const inputButton = document.getElementById('input_button');
    const predictButton = document.getElementById('predict_button');
    const statusBadge = document.getElementById('status-badge');
    const statusSpinner = document.getElementById('status-spinner');
    const statusText = document.getElementById('status-text');
    const resultsPanel = document.getElementById('results-panel');
    const resultText = document.getElementById('result-text');
    const progressBar = document.getElementById('progress-bar');
    const confidenceLabel = document.getElementById('confidence-label');

    // Handle uploaded file changes
    inputButton.onchange = () => {
      const [file] = inputButton.files;
      if (file) {
        imageElement.src = URL.createObjectURL(file);
        // Reset the results panel when a new image is loaded
        resultsPanel.classList.remove('visible');
      }
    };

    // Load model on page startup
    async function initModel() {
      try {
        model = await tf.loadGraphModel('./model.json');
        
        // Update UI to "Ready" state
        statusBadge.className = 'status-badge ready';
        statusSpinner.style.display = 'none';
        statusText.innerText = 'Model Ready';
        
        predictButton.innerText = 'Predict';
        predictButton.disabled = false;
      } catch (error) {
        statusBadge.className = 'status-badge error';
        statusSpinner.style.display = 'none';
        statusText.innerText = 'Initialization Error';
        console.error("Model loading failed:", error);
      }
    }

    // Process image and generate prediction
    async function predict() {
      if (!model) return;

      // Update button state while processing
      predictButton.disabled = true;
      predictButton.innerHTML = '<div class="spinner"></div> Processing...';

      let rawTensor = null;
      let resizedTensor = null;
      let normalizedTensor = null;
      let batchedTensor = null;
      let prediction = null;

      try {
        // Read, resize, and normalize the image preview
        rawTensor = tf.browser.fromPixels(imageElement, 3);
        resizedTensor = tf.image.resizeBilinear(rawTensor, [MODEL_INPUT_SIZE, MODEL_INPUT_SIZE]);
        normalizedTensor = resizedTensor.cast('float32').div(255.0);
        batchedTensor = normalizedTensor.expandDims(0);

        // Run the model
        prediction = await model.predict(batchedTensor);
        const classScores = await prediction.data();

        // Calculate maximum confidence score index and percentage value
        const maxScoreId = classScores.indexOf(Math.max(...classScores));
        const confidenceValue = classScores[maxScoreId];

        const classes = [
          "cat", "dog", "alouatta_palliata", "aotus_nigriceps", "cacajao_calvus", 
          "cebuella_pygmea", "cebus_capucinus", "erythrocebus_patas", "macaca_fuscata", 
          "mico_argentatus", "saimiri_sciureus", "trachypithecus_johnii", "penrose", 
          "random", "bird of paradise", "english marigold", "globe thistle", 
          "monkshood", "pink primrose", "pocket orchid", "sweet pea", "tiger lily", 
          "agnistambhasana", "bakasana", "dandasana", "halasana", "marichyasana i", 
          "parivrtta janu sirsasana", "salamba bhujangasana"
        ];

        const detectedLabel = classes[maxScoreId] || "Unknown";
        const confidencePercentage = Math.min(Math.max(confidenceValue * 100, 0), 100).toFixed(1);

        // Update Results Panel and render bar transitions
        resultText.innerText = detectedLabel;
        progressBar.style.width = `${confidencePercentage}%`;
        confidenceLabel.innerText = `Confidence: ${confidencePercentage}%`;
        resultsPanel.classList.add('visible');

      } catch (error) {
        alert("An error occurred during prediction. Check developer console for errors.");
        console.error("Prediction process error:", error);
      } finally {
        // Re-enable original button state
        predictButton.disabled = false;
        predictButton.innerText = 'Predict';

        // Free up memory manually
        if (rawTensor) rawTensor.dispose();
        if (resizedTensor) resizedTensor.dispose();
        if (normalizedTensor) normalizedTensor.dispose();
        if (batchedTensor) batchedTensor.dispose();
        if (prediction) prediction.dispose();
      }
    }

    window.onload = initModel;
  </script>
</body>
</html>
