<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Browser & OS Detection Tool Pro</title>
  <meta name="description" content="Detect your browser, version, operating system, device capabilities, privacy exposure, storage, network, and security support." />
  <meta name="theme-color" content="#6d5dfc" />
  <meta name="color-scheme" content="light dark" />

  <!-- Open Graph / Twitter -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Browser & OS Detection Tool Pro" />
  <meta property="og:description" content="Instant browser analysis with technical details, privacy checks, capability scoring, and security recommendations." />

  <link rel="icon" href="https://kai9987kai.github.io/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />

  <style>
    :root {
      --bg: #f6f7fb;
      --bg-2: #ffffff;
      --card: rgba(255, 255, 255, 0.82);
      --card-solid: #ffffff;
      --text: #151728;
      --muted: #667085;
      --muted-2: #98a2b3;
      --line: rgba(21, 23, 40, 0.12);
      --primary: #6d5dfc;
      --primary-2: #22c1c3;
      --good: #12b76a;
      --warn: #f79009;
      --bad: #f04438;
      --info: #2e90fa;
      --shadow: 0 28px 90px rgba(16, 24, 40, 0.14);
      --radius: 24px;
      --radius-sm: 16px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --font: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    [data-theme="dark"] {
      --bg: #070912;
      --bg-2: #0d111c;
      --card: rgba(18, 24, 38, 0.82);
      --card-solid: #121826;
      --text: #edf2ff;
      --muted: #a7b0c0;
      --muted-2: #778295;
      --line: rgba(255, 255, 255, 0.12);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background:
        radial-gradient(circle at 10% 5%, rgba(109, 93, 252, 0.24), transparent 34rem),
        radial-gradient(circle at 90% 10%, rgba(34, 193, 195, 0.20), transparent 30rem),
        radial-gradient(circle at 60% 92%, rgba(247, 144, 9, 0.12), transparent 26rem),
        var(--bg);
      color: var(--text);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    code,
    pre {
      font-family: var(--mono);
    }

    a {
      color: inherit;
    }

    .app-shell {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 26px 0 52px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 0;
      backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      color: white;
      box-shadow: 0 16px 32px rgba(109, 93, 252, 0.28);
      font-size: 1.4rem;
      flex: 0 0 auto;
    }

    .brand h1 {
      font-size: clamp(1rem, 2vw, 1.25rem);
      margin: 0;
      letter-spacing: -0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 999px;
      display: inline-flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      box-shadow: 0 10px 24px rgba(16, 24, 40, 0.06);
    }

    .btn:hover {
      transform: translateY(-1px);
      border-color: rgba(109, 93, 252, 0.38);
    }

    .btn.primary {
      color: white;
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), #8f7cff);
      box-shadow: 0 16px 34px rgba(109, 93, 252, 0.32);
    }

    .btn.danger {
      border-color: rgba(240, 68, 56, 0.28);
      color: var(--bad);
    }

    .hero {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 10px);
      background:
        linear-gradient(135deg, rgba(109, 93, 252, 0.16), rgba(34, 193, 195, 0.10)),
        var(--card);
      backdrop-filter: blur(24px);
      padding: clamp(22px, 5vw, 44px);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -15% -50% auto;
      width: 430px;
      aspect-ratio: 1;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      filter: blur(4px);
      z-index: -1;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.45fr 0.55fr;
      gap: 26px;
      align-items: center;
    }

    .eyebrow {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      width: fit-content;
      margin-bottom: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(109, 93, 252, 0.12);
      color: var(--primary);
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.02em;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.75rem);
      line-height: 0.94;
      letter-spacing: -0.08em;
      max-width: 860px;
    }

    .hero p {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: clamp(0.98rem, 1.5vw, 1.12rem);
      line-height: 1.65;
      max-width: 760px;
    }

    .hero-stats {
      display: grid;
      gap: 12px;
    }

    .score-ring {
      display: grid;
      place-items: center;
      min-height: 212px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle, var(--card-solid) 0 55%, transparent 56%),
        conic-gradient(var(--primary) calc(var(--score) * 1%), rgba(109, 93, 252, 0.12) 0);
      box-shadow: inset 0 0 0 12px rgba(255, 255, 255, 0.08);
    }

    .score-ring strong {
      font-size: 3.1rem;
      letter-spacing: -0.08em;
    }

    .score-ring span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      letter-spacing: 0;
    }

    .status-line {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 18px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 12px;
      border-radius: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      min-width: 0;
    }

    .status-pill b,
    .status-pill span {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-pill b {
      font-size: 0.83rem;
    }

    .status-pill span {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 2px;
    }

    .section {
      margin-top: 24px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      margin: 34px 0 14px;
    }

    .section-head h3 {
      margin: 0;
      font-size: clamp(1.32rem, 2vw, 1.85rem);
      letter-spacing: -0.05em;
    }

    .section-head p {
      margin: 6px 0 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .search-wrap {
      position: relative;
      min-width: min(100%, 340px);
    }

    .search-wrap input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--card);
      color: var(--text);
      padding: 12px 16px 12px 40px;
      outline: none;
    }

    .search-wrap span {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    .grid {
      display: grid;
      gap: 14px;
    }

    .grid.cols-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid.cols-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid.cols-4 {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--card);
      backdrop-filter: blur(18px);
      box-shadow: 0 16px 42px rgba(16, 24, 40, 0.06);
    }

    .card.pad {
      padding: 20px;
    }

    .card h4 {
      margin: 0;
      font-size: 1.04rem;
      letter-spacing: -0.035em;
    }

    .card h5 {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .detail-card {
      min-height: 185px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .detail-card .big-icon {
      font-size: 2.35rem;
      line-height: 1;
      margin-bottom: 12px;
    }

    .kv {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .kv-row {
      display: grid;
      grid-template-columns: minmax(115px, 0.7fr) minmax(0, 1.3fr);
      gap: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }

    .kv-row:first-child {
      padding-top: 0;
      border-top: none;
    }

    .kv-row span:first-child {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .kv-row span:last-child {
      min-width: 0;
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .metric {
      display: grid;
      gap: 12px;
      padding: 18px;
    }

    .metric-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
    }

    .metric-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(109, 93, 252, 0.13);
      font-size: 1.3rem;
      flex: 0 0 auto;
    }

    .metric strong {
      display: block;
      font-size: 1.34rem;
      letter-spacing: -0.04em;
      overflow-wrap: anywhere;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .bar {
      height: 10px;
      border-radius: 999px;
      background: rgba(109, 93, 252, 0.12);
      overflow: hidden;
    }

    .bar > i {
      display: block;
      height: 100%;
      width: var(--value);
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--primary-2));
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .feature {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 18px;
      padding: 13px;
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
    }

    .feature.hidden-by-search {
      display: none;
    }

    .feature b {
      display: block;
      font-size: 0.88rem;
      overflow-wrap: anywhere;
    }

    .feature span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.42;
    }

    .ok {
      color: var(--good);
    }

    .warn {
      color: var(--warn);
    }

    .bad {
      color: var(--bad);
    }

    .info {
      color: var(--info);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      border: 1px solid var(--line);
      background: rgba(109, 93, 252, 0.08);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 0.78rem;
      font-weight: 650;
    }

    .insight-list {
      display: grid;
      gap: 10px;
    }

    .insight {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.04);
    }

    .insight p {
      margin: 3px 0 0;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.88rem;
    }

    .panel-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      border-radius: 999px;
      padding: 9px 12px;
      font-weight: 700;
      font-size: 0.82rem;
    }

    .tab-btn[aria-selected="true"] {
      color: white;
      border-color: transparent;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
    }

    .tab-panel[hidden] {
      display: none;
    }

    .code-box {
      width: 100%;
      max-height: 260px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.05);
      padding: 14px;
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.6;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    [data-theme="dark"] .code-box {
      background: rgba(0, 0, 0, 0.25);
    }

    details {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.04);
    }

    details + details {
      margin-top: 10px;
    }

    summary {
      cursor: pointer;
      font-weight: 750;
    }

    .history-list {
      display: grid;
      gap: 10px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid var(--line);
    }

    .history-item strong {
      display: block;
      margin-bottom: 3px;
    }

    .history-item span {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .toast {
      position: fixed;
      z-index: 100;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: 0.22s ease;
      background: var(--text);
      color: var(--bg-2);
      padding: 12px 14px;
      border-radius: 999px;
      box-shadow: var(--shadow);
      font-weight: 750;
      font-size: 0.88rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .skeleton {
      position: relative;
      overflow: hidden;
      background: rgba(109, 93, 252, 0.10);
      border-radius: 12px;
      min-height: 16px;
    }

    .skeleton::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
      animation: shimmer 1.1s infinite;
    }

    @keyframes shimmer {
      to {
        transform: translateX(100%);
      }
    }

    @media (max-width: 980px) {
      .hero-grid,
      .grid.cols-2,
      .grid.cols-3,
      .grid.cols-4 {
        grid-template-columns: 1fr;
      }

      .feature-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .status-line {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        justify-content: flex-start;
      }

      .feature-list,
      .status-line {
        grid-template-columns: 1fr;
      }

      .kv-row {
        grid-template-columns: 1fr;
      }

      .section-head {
        align-items: stretch;
        flex-direction: column;
      }

      .btn {
        padding-inline: 11px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .topbar,
      .btn,
      .search-wrap,
      .panel-tabs,
      .toast {
        display: none !important;
      }

      .app-shell {
        width: 100%;
        padding: 0;
      }

      .card,
      .hero {
        box-shadow: none;
        break-inside: avoid;
      }
    }
  </style>
</head>

<body>
  <div id="app" class="app-shell" aria-live="polite">
    <div class="topbar">
      <div class="brand">
        <div class="brand-mark">🧭</div>
        <div>
          <h1>Browser & OS Detection Tool Pro</h1>
          <p>Loading local diagnostics...</p>
        </div>
      </div>
    </div>
    <main class="hero">
      <div class="skeleton" style="width: 35%; height: 18px; margin-bottom: 18px;"></div>
      <div class="skeleton" style="width: 75%; height: 58px; margin-bottom: 14px;"></div>
      <div class="skeleton" style="width: 55%; height: 18px;"></div>
    </main>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const APP_VERSION = "3.0.0";
      const HISTORY_KEY = "browser-os-tool-pro-history";
      const THEME_KEY = "browser-os-tool-pro-theme";
      const MAX_HISTORY = 8;

      const state = {
        report: null,
        featureFilter: "",
        activeTab: "ua"
      };

      const $ = (selector, root = document) => root.querySelector(selector);
      const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));

      const escapeHTML = (value) => String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");

      const clamp = (number, min, max) => Math.max(min, Math.min(max, number));

      const formatBytes = (bytes) => {
        if (!Number.isFinite(bytes)) return "Unknown";
        if (bytes === 0) return "0 B";
        const units = ["B", "KB", "MB", "GB", "TB"];
        const index = Math.floor(Math.log(bytes) / Math.log(1024));
        return `${(bytes / Math.pow(1024, index)).toFixed(index === 0 ? 0 : 1)} ${units[index]}`;
      };

      const safeJson = (value) => JSON.stringify(value, null, 2);

      const showToast = (message) => {
        const toast = $("#toast");
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
      };

      const writeClipboard = async (text, success = "Copied") => {
        try {
          if (!navigator.clipboard || !window.isSecureContext) {
            const temp = document.createElement("textarea");
            temp.value = text;
            temp.setAttribute("readonly", "");
            temp.style.position = "fixed";
            temp.style.left = "-9999px";
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            temp.remove();
          } else {
            await navigator.clipboard.writeText(text);
          }
          showToast(success);
        } catch (error) {
          console.error(error);
          showToast("Copy failed");
        }
      };

      const downloadText = (filename, text, type = "application/json") => {
        const blob = new Blob([text], { type });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast("Download started");
      };

      const readHistory = () => {
        try {
          return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]");
        } catch {
          return [];
        }
      };

      const writeHistory = (report) => {
        try {
          const history = readHistory();
          const small = {
            createdAt: report.createdAt,
            browserName: report.browser.name,
            browserVersion: report.browser.version,
            osName: report.os.name,
            deviceType: report.device.type,
            score: report.scores.capability,
            privacy: report.scores.privacyExposure
          };
          const next = [small, ...history].slice(0, MAX_HISTORY);
          localStorage.setItem(HISTORY_KEY, JSON.stringify(next));
        } catch (error) {
          console.warn("Could not save history", error);
        }
      };

      const getStoredTheme = () => localStorage.getItem(THEME_KEY) || "auto";

      const applyTheme = (theme = getStoredTheme()) => {
        if (theme === "auto") {
          const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          document.documentElement.dataset.theme = dark ? "dark" : "light";
        } else {
          document.documentElement.dataset.theme = theme;
        }
      };

      const cycleTheme = () => {
        const current = getStoredTheme();
        const next = current === "auto" ? "light" : current === "light" ? "dark" : "auto";
        localStorage.setItem(THEME_KEY, next);
        applyTheme(next);
        showToast(`Theme: ${next}`);
        render();
      };

      const detectBrowserFromUA = (ua) => {
        const lower = ua.toLowerCase();
        const rules = [
          {
            name: "Microsoft Edge",
            icon: "🟦",
            test: /edg\/|edgios\/|edga\//i,
            version: /(?:edg|edgios|edga)\/([\d.]+)/i
          },
          {
            name: "Opera",
            icon: "🎭",
            test: /opr\/|opera\//i,
            version: /(?:opr|opera)\/([\d.]+)/i
          },
          {
            name: "Vivaldi",
            icon: "🔴",
            test: /vivaldi\//i,
            version: /vivaldi\/([\d.]+)/i
          },
          {
            name: "Samsung Internet",
            icon: "📱",
            test: /samsungbrowser\//i,
            version: /samsungbrowser\/([\d.]+)/i
          },
          {
            name: "Firefox",
            icon: "🦊",
            test: /firefox\/|fxios\//i,
            version: /(?:firefox|fxios)\/([\d.]+)/i
          },
          {
            name: "Chrome",
            icon: "🟡",
            test: /chrome\/|crios\/|chromium\//i,
            version: /(?:chrome|crios|chromium)\/([\d.]+)/i
          },
          {
            name: "Safari",
            icon: "🍏",
            test: /safari\//i,
            version: /version\/([\d.]+)/i
          },
          {
            name: "Internet Explorer",
            icon: "🌐",
            test: /trident\/|msie /i,
            version: /(?:rv:|msie )([\d.]+)/i
          }
        ];

        const match = rules.find((rule) => rule.test.test(lower));
        const browser = match
          ? {
              name: match.name,
              version: ua.match(match.version)?.[1] || "N/A",
              icon: match.icon,
              engine: detectEngine(ua)
            }
          : {
              name: "Unknown",
              version: "N/A",
              icon: "🌐",
              engine: detectEngine(ua)
            };

        return browser;
      };

      const detectEngine = (ua) => {
        if (/applewebkit/i.test(ua) && /chrome|chromium|crios|edg|opr|samsungbrowser|vivaldi/i.test(ua)) return "Blink";
        if (/applewebkit/i.test(ua) && /safari/i.test(ua)) return "WebKit";
        if (/gecko/i.test(ua) && /firefox|fxios/i.test(ua)) return "Gecko";
        if (/trident|msie/i.test(ua)) return "Trident";
        return "Unknown";
      };

      const detectOSFromUA = (ua, uaData = null) => {
        const platform = uaData?.platform || navigator.platform || "Unknown";
        let os = { name: "Unknown", version: "N/A", icon: "💻", platform };

        if (/windows phone/i.test(ua)) {
          os = { name: "Windows Phone", version: ua.match(/windows phone (?:os )?([\d.]+)/i)?.[1] || "N/A", icon: "🪟", platform };
        } else if (/windows/i.test(ua)) {
          const nt = ua.match(/windows nt ([\d.]+)/i)?.[1] || "N/A";
          const friendly = {
            "10.0": "10/11",
            "6.3": "8.1",
            "6.2": "8",
            "6.1": "7",
            "6.0": "Vista",
            "5.1": "XP"
          }[nt] || nt;
          os = { name: "Windows", version: friendly, icon: "🪟", platform };
        } else if (/android/i.test(ua)) {
          os = { name: "Android", version: ua.match(/android ([\d.]+)/i)?.[1] || "N/A", icon: "🤖", platform };
        } else if (/iphone|ipad|ipod/i.test(ua)) {
          os = { name: /ipad/i.test(ua) ? "iPadOS" : "iOS", version: ua.match(/os ([\d_]+)/i)?.[1]?.replaceAll("_", ".") || "N/A", icon: "📱", platform };
        } else if (/macintosh|mac os x/i.test(ua)) {
          os = { name: "macOS", version: ua.match(/mac os x ([\d_]+)/i)?.[1]?.replaceAll("_", ".") || "N/A", icon: "🍎", platform };
        } else if (/cros/i.test(ua)) {
          os = { name: "ChromeOS", version: ua.match(/cros [^ ]+ ([\d.]+)/i)?.[1] || "N/A", icon: "💻", platform };
        } else if (/linux/i.test(ua)) {
          os = { name: "Linux", version: "N/A", icon: "🐧", platform };
        }

        return os;
      };

      const detectDevice = (ua) => {
        const touch = navigator.maxTouchPoints || 0;
        const isTablet = /ipad|tablet|kindle|playbook/i.test(ua) || (touch > 1 && /macintosh/i.test(ua));
        const isMobile = /mobi|iphone|ipod|android.*mobile|windows phone/i.test(ua);
        const type = isTablet ? "Tablet" : isMobile ? "Phone" : "Desktop / laptop";
        return {
          type,
          touchPoints: touch,
          platform: navigator.platform || "Unknown",
          vendor: navigator.vendor || "Unknown",
          language: navigator.language || "Unknown",
          languages: Array.isArray(navigator.languages) ? navigator.languages : [],
          cookieEnabled: navigator.cookieEnabled,
          doNotTrack: navigator.doNotTrack || window.doNotTrack || navigator.msDoNotTrack || "unspecified"
        };
      };

      const getUAData = async () => {
        if (!navigator.userAgentData) return null;
        const basic = {
          brands: navigator.userAgentData.brands || [],
          mobile: navigator.userAgentData.mobile,
          platform: navigator.userAgentData.platform
        };

        try {
          const highEntropy = await navigator.userAgentData.getHighEntropyValues([
            "architecture",
            "bitness",
            "formFactors",
            "fullVersionList",
            "model",
            "platformVersion",
            "uaFullVersion",
            "wow64"
          ]);
          return { ...basic, ...highEntropy };
        } catch {
          return basic;
        }
      };

      const getBrave = async () => {
        try {
          return Boolean(await navigator.brave?.isBrave?.());
        } catch {
          return false;
        }
      };

      const getBattery = async () => {
        if (!navigator.getBattery) return { supported: false };
        try {
          const battery = await navigator.getBattery();
          return {
            supported: true,
            charging: battery.charging,
            level: Math.round(battery.level * 100),
            chargingTime: battery.chargingTime,
            dischargingTime: battery.dischargingTime
          };
        } catch {
          return { supported: false };
        }
      };

      const getStorage = async () => {
        const result = {
          supported: Boolean(navigator.storage?.estimate),
          quota: null,
          usage: null,
          usagePercent: null,
          persistent: null
        };

        try {
          if (navigator.storage?.estimate) {
            const estimate = await navigator.storage.estimate();
            result.quota = estimate.quota;
            result.usage = estimate.usage;
            result.usagePercent = estimate.quota ? Math.round((estimate.usage / estimate.quota) * 1000) / 10 : null;
          }
          if (navigator.storage?.persisted) {
            result.persistent = await navigator.storage.persisted();
          }
        } catch (error) {
          result.error = error.message;
        }

        return result;
      };

      const queryPermission = async (name) => {
        if (!navigator.permissions?.query) return { name, state: "unsupported" };
        try {
          const status = await navigator.permissions.query({ name });
          return { name, state: status.state };
        } catch {
          return { name, state: "unsupported" };
        }
      };

      const getPermissions = async () => {
        const names = ["geolocation", "notifications", "camera", "microphone", "clipboard-read", "clipboard-write", "persistent-storage"];
        const permissions = await Promise.all(names.map(queryPermission));
        return permissions.reduce((acc, item) => {
          acc[item.name] = item.state;
          return acc;
        }, {});
      };

      const getGraphicsInfo = () => {
        const canvas = document.createElement("canvas");
        let webgl1 = false;
        let webgl2 = false;
        let renderer = "Unavailable";

        try {
          const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");
          webgl1 = Boolean(gl);
          if (gl) {
            const debug = gl.getExtension("WEBGL_debug_renderer_info");
            renderer = debug
              ? gl.getParameter(debug.UNMASKED_RENDERER_WEBGL)
              : gl.getParameter(gl.RENDERER);
          }
        } catch {
          webgl1 = false;
        }

        try {
          webgl2 = Boolean(canvas.getContext("webgl2"));
        } catch {
          webgl2 = false;
        }

        return {
          canvas: Boolean(window.HTMLCanvasElement),
          webGL: webgl1,
          webGL2: webgl2,
          webGPU: Boolean(navigator.gpu),
          webAssembly: Boolean(window.WebAssembly),
          offscreenCanvas: Boolean(window.OffscreenCanvas),
          webCodecs: Boolean(window.VideoEncoder || window.AudioEncoder),
          renderer
        };
      };

      const getFeatureMatrix = () => {
        const graphics = getGraphicsInfo();

        const groups = [
          {
            title: "Graphics & compute",
            icon: "🎮",
            items: [
              ["Canvas", graphics.canvas, "2D drawing and chart rendering."],
              ["WebGL", graphics.webGL, "GPU-accelerated 3D graphics."],
              ["WebGL 2", graphics.webGL2, "Modern WebGL pipeline support."],
              ["WebGPU", graphics.webGPU, "Next-gen GPU compute and rendering."],
              ["WebAssembly", graphics.webAssembly, "Fast compiled code in the browser."],
              ["OffscreenCanvas", graphics.offscreenCanvas, "Background canvas rendering."],
              ["WebCodecs", graphics.webCodecs, "Low-level audio/video encoding APIs."]
            ]
          },
          {
            title: "App & offline",
            icon: "📦",
            items: [
              ["Service Workers", "serviceWorker" in navigator, "Offline apps, caching, and background behavior."],
              ["Cache Storage", "caches" in window, "Stores app/network responses."],
              ["IndexedDB", "indexedDB" in window, "Large structured browser database."],
              ["LocalStorage", (() => { try { localStorage.setItem("__test", "1"); localStorage.removeItem("__test"); return true; } catch { return false; } })(), "Small persistent key-value storage."],
              ["Notifications", "Notification" in window, "Desktop/mobile notifications."],
              ["Push API", "PushManager" in window, "Server push notifications."],
              ["Background Sync", "SyncManager" in window, "Retry tasks when online."]
            ]
          },
          {
            title: "Media & input",
            icon: "🎙️",
            items: [
              ["WebRTC", Boolean(window.RTCPeerConnection), "Realtime peer-to-peer audio/video/data."],
              ["Media Devices", Boolean(navigator.mediaDevices?.getUserMedia), "Camera and microphone access."],
              ["Screen Capture", Boolean(navigator.mediaDevices?.getDisplayMedia), "Share or record screen."],
              ["Speech Recognition", "SpeechRecognition" in window || "webkitSpeechRecognition" in window, "Speech-to-text support."],
              ["Speech Synthesis", "speechSynthesis" in window, "Text-to-speech support."],
              ["Vibration", "vibrate" in navigator, "Haptic feedback on supported devices."],
              ["Pointer Events", "PointerEvent" in window, "Mouse, pen, and touch input model."]
            ]
          },
          {
            title: "Security & platform",
            icon: "🛡️",
            items: [
              ["Secure Context", window.isSecureContext, "HTTPS or localhost security context."],
              ["Crypto Subtle", Boolean(window.crypto?.subtle), "Modern cryptographic operations."],
              ["Permissions API", Boolean(navigator.permissions?.query), "Query browser permission states."],
              ["Credential Management", "credentials" in navigator, "Password/passkey integrations."],
              ["Payment Request", "PaymentRequest" in window, "Browser-native payment flows."],
              ["Clipboard API", Boolean(navigator.clipboard), "Modern copy/paste API."],
              ["File System Access", "showOpenFilePicker" in window, "Local file picker and writing support."]
            ]
          },
          {
            title: "Sharing & UX",
            icon: "✨",
            items: [
              ["Web Share", Boolean(navigator.share), "Native share sheet support."],
              ["Fullscreen", Boolean(document.fullscreenEnabled), "Fullscreen app experiences."],
              ["View Transitions", "startViewTransition" in document, "Smooth page/view animations."],
              ["Popover", Boolean(HTMLElement.prototype.showPopover), "Native popover UI."],
              ["Dialog", Boolean(window.HTMLDialogElement), "Native modal dialog support."],
              ["IntersectionObserver", "IntersectionObserver" in window, "Efficient visibility tracking."],
              ["ResizeObserver", "ResizeObserver" in window, "Efficient element size tracking."]
            ]
          }
        ];

        const flat = groups.flatMap((group) => group.items.map(([name, supported, description]) => ({
          group: group.title,
          groupIcon: group.icon,
          name,
          supported: Boolean(supported),
          description
        })));

        return { groups, flat, graphics };
      };

      const getNetwork = () => {
        const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
        return {
          online: navigator.onLine,
          connectionSupported: Boolean(connection),
          effectiveType: connection?.effectiveType || "Unknown",
          downlink: Number.isFinite(connection?.downlink) ? `${connection.downlink} Mbps` : "Unknown",
          rtt: Number.isFinite(connection?.rtt) ? `${connection.rtt} ms` : "Unknown",
          saveData: Boolean(connection?.saveData)
        };
      };

      const getScreenInfo = () => ({
        viewport: `${window.innerWidth} × ${window.innerHeight}`,
        screen: `${window.screen?.width || "?"} × ${window.screen?.height || "?"}`,
        available: `${window.screen?.availWidth || "?"} × ${window.screen?.availHeight || "?"}`,
        devicePixelRatio: window.devicePixelRatio || 1,
        colorDepth: window.screen?.colorDepth ? `${window.screen.colorDepth}-bit` : "Unknown",
        orientation: window.screen?.orientation?.type || "Unknown"
      });

      const buildScores = (features, reportBase) => {
        const total = features.flat.length || 1;
        const supported = features.flat.filter((item) => item.supported).length;
        const capability = Math.round((supported / total) * 100);

        let security = 100;
        if (!window.isSecureContext) security -= 34;
        if (!("serviceWorker" in navigator)) security -= 8;
        if (!Boolean(window.crypto?.subtle)) security -= 18;
        if (!navigator.cookieEnabled) security -= 3;
        if (reportBase.browser.name === "Internet Explorer") security -= 40;

        let privacyExposure = 22;
        if (navigator.cookieEnabled) privacyExposure += 10;
        if (Boolean(window.RTCPeerConnection)) privacyExposure += 8;
        if ((navigator.languages || []).length > 1) privacyExposure += 6;
        if (navigator.hardwareConcurrency) privacyExposure += 5;
        if (navigator.deviceMemory) privacyExposure += 5;
        if (navigator.userAgentData) privacyExposure += 5;
        if (features.graphics.webGL) privacyExposure += 8;
        if (reportBase.device.doNotTrack === "1" || reportBase.device.doNotTrack === "yes") privacyExposure -= 12;

        return {
          capability: clamp(capability, 0, 100),
          security: clamp(security, 0, 100),
          privacyExposure: clamp(privacyExposure, 0, 100),
          supportedFeatures: supported,
          totalFeatures: total
        };
      };

      const makeInsights = (report) => {
        const insights = [];

        const add = (tone, icon, title, body) => insights.push({ tone, icon, title, body });

        if (!window.isSecureContext) {
          add("bad", "🔓", "Not running in a secure context", "Some modern APIs are blocked outside HTTPS or localhost. Host this page over HTTPS for full diagnostics.");
        } else {
          add("ok", "🔒", "Secure context detected", "This page is running in a browser context where modern security-sensitive APIs can work.");
        }

        if (report.browser.name === "Internet Explorer") {
          add("bad", "⚠️", "Legacy browser detected", "Internet Explorer lacks modern security and web platform support. Use a modern browser for safer browsing.");
        }

        if (!report.features.flat.find((item) => item.name === "Service Workers")?.supported) {
          add("warn", "📦", "Offline support is limited", "Service Workers are unavailable, so advanced caching and offline web-app features may not work.");
        }

        if (!report.features.flat.find((item) => item.name === "WebGL")?.supported) {
          add("warn", "🎮", "GPU acceleration may be limited", "WebGL is not available, so 3D content, visualisers, and GPU-heavy apps may perform poorly or fail.");
        }

        if (report.features.flat.find((item) => item.name === "WebGPU")?.supported) {
          add("ok", "🚀", "WebGPU is available", "Your browser exposes newer GPU features for advanced rendering and compute workloads.");
        }

        if (report.network.saveData) {
          add("info", "📉", "Data Saver is enabled", "The browser has requested reduced data usage, so sites may serve lighter media or delay downloads.");
        }

        if (report.scores.privacyExposure >= 70) {
          add("warn", "🕵️", "High privacy exposure surface", "Your browser exposes many device and capability signals. This is normal for modern browsers, but privacy extensions/settings can reduce it.");
        } else if (report.scores.privacyExposure <= 35) {
          add("ok", "🛡️", "Lower privacy exposure surface", "Fewer browser/device signals are exposed to this page compared with many modern setups.");
        }

        if (report.storage.supported && report.storage.quota && report.storage.usagePercent > 70) {
          add("warn", "💾", "Storage usage is high", "Browser storage for this origin appears heavily used. Clearing unused site data may improve reliability.");
        }

        if (report.permissions.camera === "granted" || report.permissions.microphone === "granted") {
          add("warn", "🎙️", "Media permission already granted", "Camera or microphone access is already granted for this origin. Review site permissions if that was not intentional.");
        }

        if (insights.length === 0) {
          add("ok", "✅", "No major issues detected", "Your browser has a healthy modern feature set based on these local checks.");
        }

        return insights;
      };

      const generateReport = async () => {
        const createdAt = new Date().toISOString();
        const ua = navigator.userAgent || "";
        const [uaData, isBrave, battery, storage, permissions] = await Promise.all([
          getUAData(),
          getBrave(),
          getBattery(),
          getStorage(),
          getPermissions()
        ]);

        let browser = detectBrowserFromUA(ua);
        if (isBrave) {
          browser = { ...browser, name: "Brave", icon: "🦁" };
        }

        const os = detectOSFromUA(ua, uaData);
        const device = detectDevice(ua);
        const features = getFeatureMatrix();
        const network = getNetwork();
        const screen = getScreenInfo();

        const base = {
          appVersion: APP_VERSION,
          createdAt,
          browser,
          os,
          device,
          userAgent: ua,
          uaData,
          network,
          screen,
          battery,
          storage,
          permissions,
          features,
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "Unknown",
          localTime: new Date().toLocaleString(),
          hardware: {
            cpuCores: navigator.hardwareConcurrency || "Unknown",
            deviceMemory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : "Unknown"
          }
        };

        const scores = buildScores(features, base);
        const report = { ...base, scores };
        report.insights = makeInsights(report);

        return report;
      };

      const featureIcon = (supported) => supported ? '<span class="ok">✅</span>' : '<span class="bad">❌</span>';

      const permissionBadge = (value) => {
        const map = {
          granted: ["ok", "Granted"],
          prompt: ["warn", "Ask first"],
          denied: ["bad", "Denied"],
          unsupported: ["info", "Unsupported"]
        };
        const [cls, label] = map[value] || ["info", value || "Unknown"];
        return `<span class="${cls}">${escapeHTML(label)}</span>`;
      };

      const card = (title, value, note, icon, percent = null) => `
        <article class="card metric">
          <div class="metric-top">
            <div>
              <span>${escapeHTML(title)}</span>
              <strong>${escapeHTML(value)}</strong>
            </div>
            <div class="metric-icon" aria-hidden="true">${icon}</div>
          </div>
          <span>${escapeHTML(note)}</span>
          ${percent === null ? "" : `<div class="bar" aria-label="${escapeHTML(title)} ${percent}%"><i style="--value:${clamp(percent, 0, 100)}%"></i></div>`}
        </article>
      `;

      const renderTopbar = (report) => `
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">🧭</div>
            <div>
              <h1>Browser & OS Detection Tool Pro</h1>
              <p>Local-only diagnostics · v${APP_VERSION} · ${escapeHTML(report.localTime)}</p>
            </div>
          </div>
          <div class="top-actions">
            <button class="btn" data-action="theme" type="button">🌓 Theme</button>
            <button class="btn" data-action="copy-report" type="button">📋 Copy report</button>
            <button class="btn" data-action="export-json" type="button">⬇️ Export JSON</button>
            <button class="btn" data-action="share" type="button">📤 Share</button>
            <button class="btn primary" data-action="refresh" type="button">🔄 Rescan</button>
          </div>
        </header>
      `;

      const renderHero = (report) => `
        <section class="hero">
          <div class="hero-grid">
            <div>
              <div class="eyebrow">✨ Modern local browser diagnostics</div>
              <h2>${report.browser.icon} ${escapeHTML(report.browser.name)} on ${report.os.icon} ${escapeHTML(report.os.name)}</h2>
              <p>
                Detected ${escapeHTML(report.browser.name)} ${escapeHTML(report.browser.version || "N/A")}
                using the ${escapeHTML(report.browser.engine)} engine on ${escapeHTML(report.os.name)}
                ${escapeHTML(report.os.version || "N/A")}. Nothing is uploaded; every check runs in this browser.
              </p>
              <div class="status-line">
                <div class="status-pill"><span aria-hidden="true">🧠</span><div><b>${escapeHTML(report.hardware.cpuCores)}</b><span>CPU threads</span></div></div>
                <div class="status-pill"><span aria-hidden="true">💾</span><div><b>${escapeHTML(report.hardware.deviceMemory)}</b><span>Device memory</span></div></div>
                <div class="status-pill"><span aria-hidden="true">🌍</span><div><b>${escapeHTML(report.timezone)}</b><span>Timezone</span></div></div>
                <div class="status-pill"><span aria-hidden="true">${report.network.online ? "🟢" : "🔴"}</span><div><b>${report.network.online ? "Online" : "Offline"}</b><span>Network status</span></div></div>
              </div>
            </div>
            <div class="hero-stats">
              <div class="score-ring" style="--score:${report.scores.capability}">
                <div>
                  <strong>${report.scores.capability}</strong>
                  <span>Capability score</span>
                </div>
              </div>
              <div class="chips">
                <span class="chip">🛡️ Security ${report.scores.security}/100</span>
                <span class="chip">🕵️ Privacy exposure ${report.scores.privacyExposure}/100</span>
              </div>
            </div>
          </div>
        </section>
      `;

      const renderIdentity = (report) => `
        <section class="section">
          <div class="section-head">
            <div>
              <h3>Detected identity</h3>
              <p>Core browser, operating system, and device details from user-agent plus safer feature checks.</p>
            </div>
          </div>

          <div class="grid cols-3">
            <article class="card detail-card">
              <div>
                <div class="big-icon">${report.browser.icon}</div>
                <h4>Browser details</h4>
                <div class="kv">
                  <div class="kv-row"><span>Name</span><span>${escapeHTML(report.browser.name)}</span></div>
                  <div class="kv-row"><span>Version</span><span>${escapeHTML(report.browser.version || "N/A")}</span></div>
                  <div class="kv-row"><span>Engine</span><span>${escapeHTML(report.browser.engine)}</span></div>
                </div>
              </div>
            </article>

            <article class="card detail-card">
              <div>
                <div class="big-icon">${report.os.icon}</div>
                <h4>Operating system</h4>
                <div class="kv">
                  <div class="kv-row"><span>Name</span><span>${escapeHTML(report.os.name)}</span></div>
                  <div class="kv-row"><span>Version</span><span>${escapeHTML(report.os.version || "N/A")}</span></div>
                  <div class="kv-row"><span>Platform</span><span>${escapeHTML(report.os.platform || "Unknown")}</span></div>
                </div>
              </div>
            </article>

            <article class="card detail-card">
              <div>
                <div class="big-icon">📱</div>
                <h4>Device profile</h4>
                <div class="kv">
                  <div class="kv-row"><span>Type</span><span>${escapeHTML(report.device.type)}</span></div>
                  <div class="kv-row"><span>Touch points</span><span>${escapeHTML(report.device.touchPoints)}</span></div>
                  <div class="kv-row"><span>Language</span><span>${escapeHTML(report.device.language)}</span></div>
                </div>
              </div>
            </article>
          </div>
        </section>
      `;

      const renderMetrics = (report) => `
        <section class="section">
          <div class="section-head">
            <div>
              <h3>Live system metrics</h3>
              <p>Useful environment signals for debugging layout, performance, offline support, and installability.</p>
            </div>
          </div>

          <div class="grid cols-4">
            ${card("Viewport", report.screen.viewport, `Screen ${report.screen.screen}, DPR ${report.screen.devicePixelRatio}`, "🖥️")}
            ${card("Network", report.network.effectiveType, `${report.network.downlink}, ${report.network.rtt}, save data ${report.network.saveData ? "on" : "off"}`, "📡")}
            ${card("Storage used", report.storage.usagePercent === null ? "Unknown" : `${report.storage.usagePercent}%`, `${formatBytes(report.storage.usage)} of ${formatBytes(report.storage.quota)}`, "💾", report.storage.usagePercent ?? 0)}
            ${card("Battery", report.battery.supported ? `${report.battery.level}%` : "Unsupported", report.battery.supported ? `${report.battery.charging ? "Charging" : "Not charging"}` : "Battery Status API not exposed", "🔋", report.battery.supported ? report.battery.level : 0)}
          </div>
        </section>
      `;

      const renderFeatures = (report) => {
        const filter = state.featureFilter.toLowerCase().trim();

        return `
          <section class="section">
            <div class="section-head">
              <div>
                <h3>Feature support</h3>
                <p>${report.scores.supportedFeatures} of ${report.scores.totalFeatures} tested APIs are available in this browser.</p>
              </div>
              <label class="search-wrap">
                <span aria-hidden="true">🔎</span>
                <input id="featureSearch" type="search" placeholder="Search features..." value="${escapeHTML(state.featureFilter)}" autocomplete="off" />
              </label>
            </div>

            <div class="panel-tabs" role="tablist" aria-label="Feature groups">
              ${report.features.groups.map((group, index) => `
                <button class="tab-btn" type="button" role="tab" aria-selected="${index === 0 ? "true" : "false"}" data-feature-group="${escapeHTML(group.title)}">
                  ${group.icon} ${escapeHTML(group.title)}
                </button>
              `).join("")}
            </div>

            ${report.features.groups.map((group, index) => `
              <div class="tab-panel feature-list" data-feature-panel="${escapeHTML(group.title)}" ${index === 0 ? "" : "hidden"}>
                ${group.items.map(([name, supported, description]) => {
                  const visible = !filter || `${name} ${description} ${group.title}`.toLowerCase().includes(filter);
                  return `
                    <article class="feature ${visible ? "" : "hidden-by-search"}" data-feature-text="${escapeHTML(`${name} ${description} ${group.title}`.toLowerCase())}">
                      <div aria-hidden="true">${featureIcon(supported)}</div>
                      <div>
                        <b>${escapeHTML(name)}</b>
                        <span>${escapeHTML(description)}</span>
                      </div>
                    </article>
                  `;
                }).join("")}
              </div>
            `).join("")}
          </section>
        `;
      };

      const renderPermissions = (report) => `
        <section class="section">
          <div class="section-head">
            <div>
              <h3>Permissions & privacy</h3>
              <p>Permission state checks are local and only report what this origin can query.</p>
            </div>
          </div>

          <div class="grid cols-2">
            <article class="card pad">
              <h4>Permission states</h4>
              <div class="kv">
                ${Object.entries(report.permissions).map(([key, value]) => `
                  <div class="kv-row">
                    <span>${escapeHTML(key)}</span>
                    <span>${permissionBadge(value)}</span>
                  </div>
                `).join("")}
              </div>
            </article>

            <article class="card pad">
              <h4>Privacy signals</h4>
              <div class="kv">
                <div class="kv-row"><span>Cookies</span><span>${report.device.cookieEnabled ? '<span class="ok">Enabled</span>' : '<span class="warn">Disabled</span>'}</span></div>
                <div class="kv-row"><span>Do Not Track</span><span>${escapeHTML(report.device.doNotTrack)}</span></div>
                <div class="kv-row"><span>Languages</span><span>${escapeHTML(report.device.languages.join(", ") || "Unknown")}</span></div>
                <div class="kv-row"><span>WebGL renderer</span><span>${escapeHTML(report.features.graphics.renderer)}</span></div>
                <div class="kv-row"><span>UA Client Hints</span><span>${report.uaData ? '<span class="ok">Available</span>' : '<span class="info">Not available</span>'}</span></div>
              </div>
            </article>
          </div>
        </section>
      `;

      const renderInsights = (report) => `
        <section class="section">
          <div class="section-head">
            <div>
              <h3>Smart insights</h3>
              <p>Heuristic recommendations based on detected support, permissions, privacy surface, and security context.</p>
            </div>
          </div>

          <div class="grid cols-2">
            <article class="card pad">
              <h4>Recommendations</h4>
              <div class="insight-list" style="margin-top: 14px;">
                ${report.insights.map((item) => `
                  <div class="insight">
                    <div class="${escapeHTML(item.tone)}" aria-hidden="true">${escapeHTML(item.icon)}</div>
                    <div>
                      <b>${escapeHTML(item.title)}</b>
                      <p>${escapeHTML(item.body)}</p>
                    </div>
                  </div>
                `).join("")}
              </div>
            </article>

            <article class="card pad">
              <h4>Scores explained</h4>
              <div class="kv">
                <div class="kv-row"><span>Capability</span><span>${report.scores.capability}/100 · API support breadth</span></div>
                <div class="kv-row"><span>Security</span><span>${report.scores.security}/100 · secure context and platform safety</span></div>
                <div class="kv-row"><span>Privacy exposure</span><span>${report.scores.privacyExposure}/100 · lower usually means fewer fingerprinting signals</span></div>
              </div>
              <div class="chips">
                <span class="chip">🔐 ${window.isSecureContext ? "HTTPS/local secure" : "Insecure context"}</span>
                <span class="chip">🧭 ${escapeHTML(report.browser.engine)} engine</span>
                <span class="chip">🧩 ${report.scores.supportedFeatures} features</span>
              </div>
            </article>
          </div>
        </section>
      `;

      const renderTechnical = (report) => {
        const uaDataText = report.uaData ? safeJson(report.uaData) : "UA Client Hints are not available in this browser.";
        const fullReport = safeJson(report);

        return `
          <section class="section">
            <div class="section-head">
              <div>
                <h3>Technical details</h3>
                <p>Copy the user-agent, inspect UA Client Hints, or export the full diagnostics report.</p>
              </div>
            </div>

            <article class="card pad">
              <div class="panel-tabs" role="tablist" aria-label="Technical detail tabs">
                <button class="tab-btn tech-tab" type="button" data-tab="ua" aria-selected="${state.activeTab === "ua"}">🧾 User Agent</button>
                <button class="tab-btn tech-tab" type="button" data-tab="hints" aria-selected="${state.activeTab === "hints"}">🧠 Client Hints</button>
                <button class="tab-btn tech-tab" type="button" data-tab="json" aria-selected="${state.activeTab === "json"}">{} Full JSON</button>
              </div>

              <div class="tab-panel tech-panel" data-tab-panel="ua" ${state.activeTab === "ua" ? "" : "hidden"}>
                <div class="code-box" id="uaBox">${escapeHTML(report.userAgent)}</div>
                <div class="chips">
                  <button class="btn" data-action="copy-ua" type="button">📋 Copy user agent</button>
                </div>
              </div>

              <div class="tab-panel tech-panel" data-tab-panel="hints" ${state.activeTab === "hints" ? "" : "hidden"}>
                <pre class="code-box">${escapeHTML(uaDataText)}</pre>
              </div>

              <div class="tab-panel tech-panel" data-tab-panel="json" ${state.activeTab === "json" ? "" : "hidden"}>
                <pre class="code-box">${escapeHTML(fullReport)}</pre>
              </div>
            </article>
          </section>
        `;
      };

      const renderHistory = () => {
        const history = readHistory();

        return `
          <section class="section">
            <div class="section-head">
              <div>
                <h3>Local scan history</h3>
                <p>Saved only in this browser with localStorage so you can compare recent scans.</p>
              </div>
              <button class="btn danger" data-action="clear-history" type="button">🗑️ Clear history</button>
            </div>

            <article class="card pad">
              ${history.length ? `
                <div class="history-list">
                  ${history.map((item) => `
                    <div class="history-item">
                      <div>
                        <strong>${escapeHTML(item.browserName)} on ${escapeHTML(item.osName)}</strong>
                        <span>${escapeHTML(new Date(item.createdAt).toLocaleString())} · ${escapeHTML(item.deviceType)}</span>
                      </div>
                      <div class="chips" style="margin:0;">
                        <span class="chip">Score ${escapeHTML(item.score)}</span>
                        <span class="chip">Privacy ${escapeHTML(item.privacy)}</span>
                      </div>
                    </div>
                  `).join("")}
                </div>
              ` : `<p style="color: var(--muted); margin: 0;">No saved scans yet. Run a scan and it will appear here.</p>`}
            </article>
          </section>
        `;
      };

      const renderFooter = () => `
        <footer class="section card pad">
          <h4>What changed in this upgraded version?</h4>
          <div class="chips">
            <span class="chip">✅ Kept browser/OS detection</span>
            <span class="chip">✅ Kept feature support</span>
            <span class="chip">✅ Kept user-agent copy</span>
            <span class="chip">✅ Kept dark-mode support</span>
            <span class="chip">✨ Added privacy/security scores</span>
            <span class="chip">✨ Added export/share/history</span>
            <span class="chip">✨ Added permissions, storage, network, battery</span>
            <span class="chip">✨ Safer rendering and clipboard handling</span>
          </div>
        </footer>
      `;

      const render = () => {
        const report = state.report;
        if (!report) return;

        const app = $("#app");
        app.innerHTML = `
          ${renderTopbar(report)}
          <main>
            ${renderHero(report)}
            ${renderIdentity(report)}
            ${renderMetrics(report)}
            ${renderFeatures(report)}
            ${renderPermissions(report)}
            ${renderInsights(report)}
            ${renderTechnical(report)}
            ${renderHistory()}
            ${renderFooter()}
          </main>
        `;

        attachEvents();
      };

      const attachEvents = () => {
        $$("[data-action]").forEach((button) => {
          button.addEventListener("click", async () => {
            const action = button.dataset.action;
            if (action === "theme") cycleTheme();
            if (action === "refresh") await boot(true);
            if (action === "copy-ua") writeClipboard(state.report.userAgent, "User agent copied");
            if (action === "copy-report") writeClipboard(safeJson(state.report), "Report copied");
            if (action === "export-json") {
              const stamp = new Date().toISOString().replaceAll(":", "-").slice(0, 19);
              downloadText(`browser-os-report-${stamp}.json`, safeJson(state.report));
            }
            if (action === "share") {
              const text = `${state.report.browser.name} ${state.report.browser.version} on ${state.report.os.name} ${state.report.os.version}. Capability score ${state.report.scores.capability}/100.`;
              if (navigator.share) {
                try {
                  await navigator.share({ title: "Browser diagnostics report", text });
                  showToast("Share opened");
                } catch {
                  showToast("Share cancelled");
                }
              } else {
                writeClipboard(text, "Share text copied");
              }
            }
            if (action === "clear-history") {
              localStorage.removeItem(HISTORY_KEY);
              showToast("History cleared");
              render();
            }
          });
        });

        const search = $("#featureSearch");
        if (search) {
          search.addEventListener("input", (event) => {
            state.featureFilter = event.target.value;
            const value = state.featureFilter.toLowerCase().trim();
            $$(".feature").forEach((feature) => {
              const visible = !value || feature.dataset.featureText.includes(value);
              feature.classList.toggle("hidden-by-search", !visible);
            });
          });
        }

        $$("[data-feature-group]").forEach((button) => {
          button.addEventListener("click", () => {
            const group = button.dataset.featureGroup;
            $$("[data-feature-group]").forEach((tab) => tab.setAttribute("aria-selected", String(tab === button)));
            $$("[data-feature-panel]").forEach((panel) => {
              panel.hidden = panel.dataset.featurePanel !== group;
            });
          });
        });

        $$(".tech-tab").forEach((button) => {
          button.addEventListener("click", () => {
            state.activeTab = button.dataset.tab;
            $$(".tech-tab").forEach((tab) => tab.setAttribute("aria-selected", String(tab === button)));
            $$(".tech-panel").forEach((panel) => {
              panel.hidden = panel.dataset.tabPanel !== state.activeTab;
            });
          });
        });
      };

      const boot = async (manual = false) => {
        applyTheme();
        if (manual) {
          showToast("Rescanning...");
        }

        try {
          state.report = await generateReport();
          writeHistory(state.report);
          render();
        } catch (error) {
          console.error(error);
          $("#app").innerHTML = `
            <main class="app-shell">
              <section class="hero">
                <div class="eyebrow">⚠️ Error</div>
                <h2>Diagnostics failed</h2>
                <p>${escapeHTML(error.message || "Unknown error")}</p>
                <button class="btn primary" onclick="location.reload()" type="button">Reload</button>
              </section>
            </main>
          `;
        }
      };

      window.addEventListener("resize", () => {
        if (!state.report) return;
        clearTimeout(window.__resizeTimer);
        window.__resizeTimer = setTimeout(() => {
          state.report.screen = getScreenInfo();
          render();
        }, 180);
      });

      window.addEventListener("online", () => {
        if (state.report) {
          state.report.network = getNetwork();
          render();
        }
      });

      window.addEventListener("offline", () => {
        if (state.report) {
          state.report.network = getNetwork();
          render();
        }
      });

      window.matchMedia("(prefers-color-scheme: dark)").addEventListener?.("change", () => {
        if (getStoredTheme() === "auto") {
          applyTheme("auto");
          render();
        }
      });

      boot();
    })();
  </script>
</body>
</html>
